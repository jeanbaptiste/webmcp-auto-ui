# mcp-datagouv — CORS reverse proxy to mcp.data.gouv.fr
location /mcp-datagouv/ {
    # Preflight CORS
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Accept, Mcp-Session-Id";
        add_header Access-Control-Max-Age 86400;
        return 204;
    }

    proxy_pass https://mcp.data.gouv.fr/;
    proxy_http_version 1.1;
    proxy_set_header Host mcp.data.gouv.fr;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_ssl_server_name on;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Accept, Mcp-Session-Id" always;
}
