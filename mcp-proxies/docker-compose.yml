# MCP Proxies -- local development with Docker
#
# Usage:
#   docker compose up -d              # all proxies
#   docker compose up -d hackernews   # single proxy
#   docker compose logs -f openmeteo  # follow logs
#
# The bridge image is built once and shared by all services.

x-bridge-common: &bridge-common
  build:
    context: .
    dockerfile_inline: |
      FROM python:3.12-slim
      RUN apt-get update && apt-get install -y curl && rm -rf /var/lib/apt/lists/*
      RUN curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs
      COPY bridge/mcp-stdio-bridge.py /opt/mcp-bridge/mcp-stdio-bridge.py
      COPY bridge/inaturalist-mcp.py /opt/mcp-bridge/inaturalist-mcp.py
      RUN chmod +x /opt/mcp-bridge/*.py
      WORKDIR /opt/mcp-bridge
  restart: unless-stopped

services:
  hackernews:
    <<: *bridge-common
    command: >
      python3 /opt/mcp-bridge/mcp-stdio-bridge.py
      --cmd "npx -y hn-mcp-server"
      --port 9006
    ports:
      - "9006:9006"

  metmuseum:
    <<: *bridge-common
    command: >
      python3 /opt/mcp-bridge/mcp-stdio-bridge.py
      --cmd "npx -y metmuseum-mcp"
      --port 9001
    ports:
      - "9001:9001"

  openmeteo:
    <<: *bridge-common
    command: >
      python3 /opt/mcp-bridge/mcp-stdio-bridge.py
      --cmd "npx -y open-meteo-mcp"
      --port 9002
    ports:
      - "9002:9002"

  wikipedia:
    <<: *bridge-common
    command: >
      python3 /opt/mcp-bridge/mcp-stdio-bridge.py
      --cmd "npx -y wikipedia-mcp"
      --port 9005
    ports:
      - "9005:9005"

  inaturalist:
    <<: *bridge-common
    command: >
      python3 /opt/mcp-bridge/mcp-stdio-bridge.py
      --cmd "python3 /opt/mcp-bridge/inaturalist-mcp.py"
      --port 9007
    ports:
      - "9007:9007"

  nasa:
    <<: *bridge-common
    command: >
      python3 /opt/mcp-bridge/mcp-stdio-bridge.py
      --cmd "npx -y @programcomputer/nasa-mcp-server@latest"
      --port 9008
    environment:
      - NASA_API_KEY=${NASA_API_KEY:-YOUR_NASA_API_KEY}
    ports:
      - "9008:9008"
