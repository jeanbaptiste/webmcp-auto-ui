# -- datagouv (CORS reverse proxy to upstream, no local bridge) --
location /mcp-datagouv/ {
    proxy_pass https://mcp.data.gouv.fr/;
    proxy_http_version 1.1;
    proxy_set_header Host mcp.data.gouv.fr;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_ssl_server_name on;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Accept, Mcp-Session-Id" always;
    if ($request_method = OPTIONS) { return 204; }
}
