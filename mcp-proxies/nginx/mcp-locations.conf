# MCP proxy location blocks
# Include this file inside a server {} block:
#   include /etc/nginx/snippets/mcp-locations.conf;

# -- hackernews (bridge on port 9006) --
location /mcp-hackernews/ {
    proxy_pass http://127.0.0.1:9006/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Accept, Mcp-Session-Id" always;
    if ($request_method = OPTIONS) { return 204; }
}

