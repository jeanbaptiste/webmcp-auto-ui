# =============================================================================
# protomaps-cors.conf â Reverse proxy CORS pour le bucket dĂŠmo Protomaps
# =============================================================================
#
# Contexte :
#   Les widgets `protomaps-*` (packages/servers/src/protomaps/widgets/) servis
#   depuis https://demos.hyperskills.net/flex/ tentaient de fetch le pmtiles
#   directement sur https://demo-bucket.protomaps.com/v4.pmtiles. Ce bucket
#   ne sert pas les headers CORS pour les origines tierces, ce qui bloque
#   les requĂŞtes (cf. _retex_flex/05-protomaps-cors.md).
#
# Ce snippet expose un endpoint CORS-friendly :
#   https://demos.hyperskills.net/pmtiles/v4.pmtiles
# qui reverse-proxy vers demo-bucket.protomaps.com tout en :
#   - exposant les bons headers CORS (origin *, range, etag)
#   - gĂŠrant le preflight OPTIONS
#   - propageant les Range requests (clĂŠ pour pmtiles : seul un range du
#     fichier est lu cĂ´tĂŠ client, jamais le fichier entier)
#   - cachant localement les ranges chauds via proxy_cache (header pmtiles +
#     tiles frĂŠquemment lues), TTL 7j
#
# Inclusion dans le server { ... } de demos.hyperskills.net :
#   include /etc/nginx/snippets/protomaps-cors.conf;
#
# PrĂŠ-requis VM :
#   mkdir -p /var/cache/nginx/pmtiles
#   chown -R www-data:www-data /var/cache/nginx/pmtiles
# =============================================================================

# -----------------------------------------------------------------------------
# Cache disque pour les ranges pmtiles
# Doit ĂŞtre dĂŠclarĂŠ au niveau http { } â si nginx rĂ˘le parce qu'on est dans
# un server { }, dĂŠplacer cette directive dans /etc/nginx/conf.d/pmtiles-cache.conf
# qui sera inclus avant les server blocks.
# -----------------------------------------------------------------------------
proxy_cache_path /var/cache/nginx/pmtiles
    levels=1:2
    keys_zone=pmtiles_cache:10m
    max_size=2g
    inactive=7d
    use_temp_path=off;

# -----------------------------------------------------------------------------
# Endpoint public : /pmtiles/<path>
# -----------------------------------------------------------------------------
location /pmtiles/ {
    # ---- Preflight OPTIONS --------------------------------------------------
    # MapLibre/pmtiles envoient un preflight quand un header `Range` custom
    # est posĂŠ sur fetch(). RĂŠpondre 204 sans toucher l'upstream.
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin      "*";
        add_header Access-Control-Allow-Methods     "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers     "Range, If-Match, If-None-Match, If-Range";
        add_header Access-Control-Expose-Headers    "Content-Range, Accept-Ranges, Content-Length, ETag";
        add_header Access-Control-Max-Age           86400;
        add_header Content-Length                   0;
        add_header Content-Type                     "text/plain charset=UTF-8";
        return 204;
    }

    # ---- Reverse proxy vers le bucket dĂŠmo Protomaps ------------------------
    proxy_pass                  https://demo-bucket.protomaps.com/;
    proxy_http_version          1.1;
    proxy_set_header            Host             demo-bucket.protomaps.com;
    proxy_set_header            User-Agent       $http_user_agent;
    proxy_pass_request_headers  on;

    # Range requests : transmettre le header Range du client tel quel.
    # Indispensable pour pmtiles (lecture par chunks).
    proxy_set_header            Range            $http_range;
    proxy_set_header            If-Range         $http_if_range;

    # SNI + verify pour TLS upstream
    proxy_ssl_server_name       on;
    proxy_ssl_verify            off;

    # ---- Cache local --------------------------------------------------------
    # ClĂŠ inclut le Range pour cacher chaque range sĂŠparĂŠment.
    proxy_cache                 pmtiles_cache;
    proxy_cache_key             "$scheme$request_method$host$request_uri$http_range";
    proxy_cache_valid           200 206 7d;
    proxy_cache_valid           404 1m;
    proxy_cache_use_stale       error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_lock            on;
    add_header X-Cache-Status   $upstream_cache_status always;

    # ---- CORS sur la rĂŠponse ------------------------------------------------
    # `always` => les headers sont posĂŠs y compris sur les rĂŠponses 4xx/5xx
    # et sur les 206 Partial Content (range responses).
    add_header Access-Control-Allow-Origin      "*"                                                  always;
    add_header Access-Control-Allow-Methods     "GET, HEAD, OPTIONS"                                 always;
    add_header Access-Control-Expose-Headers    "Content-Range, Accept-Ranges, Content-Length, ETag" always;
    add_header Cache-Control                    "public, max-age=86400"                              always;
}
