<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Public notebook viewer — nb.hyperskills.net" />
    <meta property="og:site_name" content="nb.hyperskills.net" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('nb-theme');
          if (t === 'dark') document.documentElement.dataset.theme = 'dark';
        } catch (e) {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body>
    <div>%sveltekit.body%</div>
  </body>
</html>
