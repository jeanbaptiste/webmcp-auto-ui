<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="12" fill="#ffffff"/>

  <!-- Barre du A : centrée entre les pics x=14 et x=30, flottante (ne touche pas les jambages) -->
  <line x1="20" y1="34" x2="24" y2="34" stroke="#1a1a26" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Point du i, violet pulsant -->
  <circle cx="50" cy="11" r="2.8" fill="#6366f1">
    <animate attributeName="r" values="2.6;4;2.6" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Serpentin -->
  <path d="M 14 48 L 14 24 Q 14 18 20 18 L 22 18 Q 30 18 30 26 L 30 42 Q 30 50 38 50 L 42 50 Q 50 50 50 42 L 50 20"
        stroke="#1a1a26"
        stroke-width="4.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
