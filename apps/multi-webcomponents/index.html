<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto-UI Web Components</title>
  <style>
    /* ── Reset + Dark theme ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #12121a;
      --surface2:  #1a1a26;
      --border:    #2a2a3a;
      --border2:   #3a3a4e;
      --text1:     #e8e8f0;
      --text2:     #8888a0;
      --accent:    #6c8cff;
      --accent2:   #ff6c8c;
      --teal:      #4cd4b0;
      --radius:    8px;
      --mono:      'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    }

    html, body { height: 100%; font-family: var(--mono); background: var(--bg); color: var(--text1); }
    body { display: flex; flex-direction: column; overflow: hidden; }

    /* ── Scrollbar ──────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── Layout ─────────────────────────────────────────────────────── */
    header {
      height: 48px; display: flex; align-items: center; gap: 12px;
      padding: 0 16px; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    header .logo { font-size: 14px; font-weight: 700; }
    header .logo .accent { color: var(--accent); }

    .shell {
      flex: 1; display: grid; overflow: hidden;
      grid-template-columns: 280px 1fr;
      grid-template-rows: 1fr;
    }

    /* ── Sidebar ────────────────────────────────────────────────────── */
    .sidebar {
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow-y: auto; padding: 12px;
    }

    /* ── Main area ──────────────────────────────────────────────────── */
    .main {
      display: flex; flex-direction: column; overflow: hidden;
    }
  </style>
</head>
<body>
  <header>
    <span class="logo">Auto-UI <span class="accent">webcomponents</span></span>
  </header>
  <div class="shell">
    <aside class="sidebar">
      <wm-mcp-connector></wm-mcp-connector>
      <wm-server-selector></wm-server-selector>
    </aside>
    <main class="main">
      <wm-widget-grid></wm-widget-grid>
      <wm-chat></wm-chat>
    </main>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
