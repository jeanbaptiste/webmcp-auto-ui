# Guide d'installation

WebMCP Auto-UI en local en moins de 5 minutes.

## Prerequis

- **Node.js 22+** (`node -v`)
- **npm 10+** (`npm -v`)
- Une **cle API Anthropic** (pour les features LLM)

## Cloner et installer

```bash
git clone https://github.com/jeanbaptiste/webmcp-auto-ui.git
cd webmcp-auto-ui
npm install
```

`npm install` resout tous les workspaces automatiquement (packages + apps).

## Structure du projet

```
webmcp-auto-ui/
  packages/
    core/       @webmcp-auto-ui/core   -- W3C WebMCP polyfill + MCP client
    sdk/        @webmcp-auto-ui/sdk    -- HyperSkill format, skills registry, canvas store
    agent/      @webmcp-auto-ui/agent  -- Agent loop + 4 providers + ToolLayers + recettes
    ui/         @webmcp-auto-ui/ui     -- 34+ Svelte 5 components + agent UI widgets
  apps/
    home/       Landing page + app launcher
    flex/       Canvas drag & resize, multi-MCP, ephemeral chat
    flex2/      Layers, component() unique, debug panel, mode composeur/consommateur
    todo/       Todo app demo (MCP-powered)
    todo2/      Todo WebMCP, template minimal
    viewer/     HyperSkill URL viewer / renderer
    viewer2/    Lecteur HyperSkills read-only avec CRUD, DAG, paste URI
    showcase/   Component showcase + WebMCP tool demos
    showcase2/  Demo dynamique avec agent + MCP + 3 themes
    recipes/    Explorateur de recettes MCP + WebMCP avec test live
```

## Builder les packages

Les packages doivent etre buildes dans l'ordre de dependance :

```bash
# 1. core (pas de deps)
npm -w packages/core run build

# 2. sdk (pas de deps package, partage des types)
npm -w packages/sdk run build

# 3. agent (depend de core)
npm -w packages/agent run build

# 4. ui (standalone, builder en dernier par securite)
npm -w packages/ui run build
```

## Lancer les serveurs dev

Toutes les apps v1 en parallele :

```bash
npm run dev
```

Ou une app specifique :

```bash
npm run dev:home
npm run dev:flex
npm run dev:todo
npm run dev:viewer
npm run dev:showcase
```

Pour les nouvelles apps (v2), lancer individuellement :

```bash
npm -w apps/flex2 run dev
npm -w apps/viewer2 run dev
npm -w apps/todo2 run dev
npm -w apps/showcase2 run dev
npm -w apps/recipes run dev
```

## Ports

| App       | Port | URL                    |
|-----------|------|------------------------|
| home      | 5173 | http://localhost:5173   |
| todo      | 5175 | http://localhost:5175   |
| viewer    | 5176 | http://localhost:5176   |
| showcase  | 5177 | http://localhost:5177   |
| flex      | 5179 | http://localhost:5179   |

Les apps v2 (flex2, viewer2, todo2, showcase2, recipes) sont assignees a des ports par Vite au lancement.

## Variables d'environnement

| Variable           | Apps                    | Role                                          |
|--------------------|-------------------------|-----------------------------------------------|
| `ANTHROPIC_API_KEY`| flex, flex2, todo, todo2 | Proxy server-side pour l'API Anthropic Claude |
| `PUBLIC_BASE_URL`  | home                    | Base URL pour les liens (default: localhost)   |

```bash
export ANTHROPIC_API_KEY="sk-ant-..."
```

## Problemes courants

**`Cannot find module '@webmcp-auto-ui/core'`**
Builder core d'abord : `npm -w packages/core run build`

**Port deja utilise**
`lsof -ti:5173 | xargs kill` ou changer le port dans `vite.config.ts`.

**`ERR_MODULE_NOT_FOUND` sur les imports agent**
Le package agent depend de core via `file:../core`. Builder core avant.

**Svelte check errors dans le package UI**
`npm -w packages/ui run check` pour les diagnostics. Les peer deps (`svelte`, `d3`, `leaflet`) doivent etre installees a la racine.

## Deployer en production

Utiliser le script deploy -- il gere l'ordre de build, les chemins corrects, et le nettoyage :

```bash
./scripts/deploy.sh              # deployer toutes les apps
./scripts/deploy.sh flex         # deployer une app
```

Voir le [tutoriel deploy](tutorials/deploy.md) pour les details.

**Ne JAMAIS deployer manuellement avec scp** -- les chemins de deploy different par app (flex = racine, viewer = `build/`).

# Architecture

Structure monorepo, dependances entre packages, et decisions de design (v0.7.0).

## Structure monorepo

```
webmcp-auto-ui/
 |
 +-- packages/
 |    +-- core/          W3C WebMCP polyfill + MCP Streamable HTTP client
 |    +-- sdk/           HyperSkill format, skills CRUD, canvas store (Svelte 5)
 |    +-- agent/         LLM agent loop, 4 providers, ToolLayers, recettes, component()
 |    +-- ui/            34+ Svelte 5 components (primitives, widgets, WM)
 |
 +-- apps/
 |    +-- home/          Landing page, app launcher (port 5173)
 |    +-- todo/          MCP-powered todo demo (port 5175)
 |    +-- viewer/        HyperSkill URL renderer (port 5176)
 |    +-- showcase/      Component showcase + WebMCP tool demos (port 5177)
 |    +-- flex/          Canvas drag & resize, multi-MCP, chat (port 5179)
 |    +-- flex2/         Layers, component() unique, debug panel, mode composeur/consommateur
 |    +-- viewer2/       Lecteur HyperSkills read-only avec CRUD, DAG, paste URI
 |    +-- showcase2/     Demo dynamique avec agent + MCP + 3 themes
 |    +-- todo2/         Todo WebMCP, template minimal
 |    +-- recipes/       Explorateur de recettes MCP + WebMCP avec test live
 |
 +-- docs/               Documentation
 +-- package.json        Root workspace config
```

## Graphe de dependances

```
                +----------+
                |   core   |  (zero deps, framework-agnostic)
                +----+-----+
                     |
              +------+------+
              |             |
         +----v----+   +----v----+
         |   sdk   |   |  agent  |
         +---------+   +---------+
              |
         (Svelte 5 runes)

         +---------+
         |   ui    |  (standalone -- pas de deps internes)
         +---------+
```

- **core** : zero dependances externes. TypeScript pur.
- **sdk** : depend de Svelte 5 (peer) pour le canvas store. Fournit aussi un store vanilla a `@webmcp-auto-ui/sdk/canvas-vanilla`. Shippe `MCP_DEMO_SERVERS`.
- **agent** : depend de core (`McpClient`, `sanitizeSchema`, types). 4 providers LLM. ToolLayers. Recettes. ComponentAdapter.
- **ui** : standalone. Peer deps : `svelte ^5`, `d3 ^7`, `leaflet >=1.9`.

## Les 3 couches (v0.7.0)

L'architecture v0.7.0 structure les outils en 3 couches via les `ToolLayer[]` :

```
+--------------------------------------------------+
|                    ToolLayer[]                     |
|                                                    |
|  +-- McpLayer (par serveur) ---+  +-- UILayer --+ |
|  |  tools: MCP tools           |  | component() | |
|  |  recipes: MCP recipes       |  | adapter?    | |
|  |  serverName, serverUrl      |  | recipes: UI | |
|  +-----------------------------+  +-------------+ |
+--------------------------------------------------+
         |                               |
    buildSystemPrompt()          buildToolsFromLayers()
         |                               |
    Prompt structure:            AnthropicTool[]:
    ## mcp (servers)             - MCP tools
    ## webmcp                    - component() (smart)
                                 - ou render_* (explicit)
```

### McpLayer

Un par serveur MCP connecte. Porte les outils DATA (query, fetch) et les recettes serveur (ce que les outils retournent).

### UILayer

Un seul par app. Porte `component()`, le `ComponentAdapter` optionnel (pour filtrer les composants en mode explicit), et les recettes WebMCP (comment presenter les donnees).

### Recettes

Deux types de recettes cohabitent :

| Type | Source | Role | Section prompt |
|------|--------|------|---------------|
| **Recette MCP** | Serveur (`list_recipes`) | Decrit les donnees retournees | `## mcp > recettes serveur` |
| **Recette WebMCP** | Package agent (fichiers .md) | Guide la presentation UI | `## webmcp > recettes UI` |

## Description des apps

| App | Description |
|-----|------------|
| **home** | Landing page avec liens vers toutes les apps. Configurable via `PUBLIC_BASE_URL`. |
| **flex** | Canvas drag & resize, multi-MCP, ephemeral chat, HyperSkills export, Gemma WASM. |
| **flex2** | Version layers : component() unique, debug panel, badges provenance, mode composeur/consommateur, panneau recettes, agent logs. |
| **todo** | Todo app demontrant l'integration MCP CRUD. |
| **todo2** | Todo WebMCP, template minimal avec la nouvelle architecture layers. |
| **viewer** | Decode une HyperSkill URL (`?hs=...`) et rend le skill en read-only. |
| **viewer2** | Lecteur HyperSkills read-only avec CRUD, DAG de versions, paste URI. |
| **showcase** | Catalogue interactif des composants UI + demo WebMCP tools. |
| **showcase2** | Demo dynamique avec agent + MCP + 3 themes. |
| **recipes** | Explorateur de recettes MCP + WebMCP avec test live. |

## Stack technique

| Couche | Technologie |
|--------|-----------|
| Framework | SvelteKit (apps), Svelte 5 (composants) |
| Styling | Tailwind CSS 4 + CSS variables theming |
| UI base | bits-ui (shadcn-svelte pattern), tailwind-variants |
| Charting | D3.js v7 (Chart, Sankey, Hemicycle, D3Widget) |
| Maps | Leaflet (MapView) |
| LLM | Anthropic Claude API (via server proxy), Gemma 4 LiteRT (in-browser, OPFS), Ollama/Llamafile (local) |
| Protocol | MCP Streamable HTTP (JSON-RPC 2.0) |
| Build | TypeScript, svelte-package, Vite |

## Decisions de design

### ToolLayers (v0.7.0)

Les outils ne sont plus passes en tableau plat (`mcpTools[]`). Ils sont structures en couches typees (`McpLayer`, `UILayer`) qui portent chacune leurs outils et recettes. `buildSystemPrompt()` et `buildToolsFromLayers()` consomment ces layers pour produire le prompt et les outils.

### Mode smart vs explicit

Le mode `smart` (defaut) n'expose qu'un seul tool `component()` au LLM. Le LLM decouvre les composants via `component("help")` et les rend via `component("nom", {params})`. Cela economise ~2800 tokens de schema par rapport au mode `explicit` (31 render_* individuels).

### Recettes WebMCP

Les recettes sont des fichiers `.md` avec frontmatter YAML. Elles guident le LLM sur le choix des composants en fonction des donnees retournees par le serveur MCP. Le parser est tolerant : il accepte aussi les fichiers sans frontmatter (freeform).

### ComponentAdapter

Decouple les definitions d'outils (ce que le LLM voit) des renderers (ce que l'utilisateur voit). Les apps enregistrent uniquement les composants dont elles ont besoin via des presets (`minimalPreset`, `nativePreset`, `allNativePreset`).

### CSS variables theming

Tokens (couleurs, radii, fonts) en CSS custom properties dans `ThemeProvider`. Deux modes built-in (`light`, `dark`) avec override complet via `theme.json` ou le canvas store.

### FONC message bus

Les composants ne s'appellent jamais directement. Le bus `bus` singleton implemente le principe "messaging not calling" d'Alan Kay.

### BlockRenderer dispatch

`BlockRenderer` recoit `{ type, data }` et dispatche vers le widget. Pipeline : **LLM -> tool call -> block -> store -> renderer**.

### HyperSkill URL format

Skill serialisee en JSON -> base64 -> `?hs=`. Gzip au-dela de 6KB. SHA-256 pour tracabilite.

### LiteRT migration (v0.5.0)

Le provider Gemma WASM a migre de ONNX (`@huggingface/transformers` + Web Worker) a LiteRT (`@mediapipe/tasks-genai` main thread). 2-4x plus rapide sur WebGPU. Cache OPFS.

### Vanilla canvas store

En plus du store Svelte 5 runes (`@webmcp-auto-ui/sdk/canvas`), un store vanilla framework-agnostic a `@webmcp-auto-ui/sdk/canvas-vanilla` pour React/Vue/vanilla.

### Agent loop architecture

`runAgentLoop` accepte soit `layers` (nouvelle API) soit `mcpTools` (legacy). Les UI tools sont executes localement via callbacks. Les DATA tools sont forwards au serveur MCP via `McpClient.callTool()`. Arret sur `end_turn` ou `max_iterations`.

# @webmcp-auto-ui/core

W3C WebMCP polyfill and MCP Streamable HTTP client. Zero dependencies, framework-agnostic, SSR-safe.

## What it does

- Implements the W3C WebMCP Draft CG Report (2026-03-27) as a polyfill on `navigator.modelContext`
- Provides `McpClient` for connecting to MCP servers over Streamable HTTP (JSON-RPC 2.0)
- Includes a postMessage bridge for cross-frame tool invocation
- Ships result builders and a lightweight skill registry for WebMCP tool registration

## Exports

### Polyfill

```ts
import {
  initializeWebMCPPolyfill,
  cleanupWebMCPPolyfill,
  hasNativeWebMCP,
  executeToolInternal,
} from '@webmcp-auto-ui/core';
```

**`initializeWebMCPPolyfill(options?)`** — Installs the polyfill on `navigator.modelContext`. Call once at app startup.

```ts
initializeWebMCPPolyfill({
  confirmationPolicy: 'auto', // 'auto' | 'always' | 'never'
});
```

**`cleanupWebMCPPolyfill()`** — Removes the polyfill and restores previous descriptors.

**`hasNativeWebMCP()`** — Returns `true` if the browser has native WebMCP support.

**`executeToolInternal(name, args)`** — Executes a registered tool by name. Used internally by the polyfill.

### McpMultiClient

```ts
import { McpMultiClient } from '@webmcp-auto-ui/core';
```

Manages simultaneous connections to multiple MCP servers. Aggregates tool lists from all servers and routes `callTool` to the correct server based on tool name.

```ts
const multi = new McpMultiClient();
await multi.addServer('https://mcp1.example.com/mcp');
await multi.addServer('https://mcp2.example.com/mcp');

const allTools = multi.listAllTools();  // tools from both servers
const result = await multi.callTool('query_sql', { sql: 'SELECT 1' });  // routes automatically

await multi.removeServer('https://mcp1.example.com/mcp');
await multi.disconnectAll();
```

### Prompt caching fix

The `cache_control` property is applied on the tools array (not individual tools) to work correctly with Anthropic's prompt caching API. This ensures cache hits when the tool set is stable across consecutive requests, reducing latency and cost.

### MCP Client

```ts
import { McpClient } from '@webmcp-auto-ui/core';
```

Streamable HTTP client for MCP servers. Uses native `fetch`, no dependencies.

```ts
const client = new McpClient('https://mcp.example.com/mcp', {
  clientName: 'my-app',
  clientVersion: '1.0.0',
  timeout: 30000,
  headers: { Authorization: 'Bearer ...' },
});

// Connect (sends initialize + notifications/initialized)
const info = await client.connect();
console.log(info.serverInfo.name);

// List available tools
const tools = await client.listTools();

// Call a tool
const result = await client.callTool('get_weather', { city: 'Paris' });
console.log(result.content);

// Disconnect
await client.disconnect();
```

#### McpClient API

| Method | Returns | Description |
|--------|---------|-------------|
| `connect()` | `McpInitializeResult` | Initializes the MCP session |
| `listTools()` | `McpTool[]` | Lists all tools from the server |
| `callTool(name, args?)` | `McpToolResult` | Calls a tool with optional arguments |
| `disconnect()` | `void` | Ends the session |

### postMessage bridge

```ts
import {
  listenForAgentCalls,
  stopListening,
  callToolViaPostMessage,
  isWebMCPEvent,
} from '@webmcp-auto-ui/core';
```

**`listenForAgentCalls(handler)`** — Listens for `webmcp:call-tool` events from iframes or other windows.

```ts
const cleanup = listenForAgentCalls(async (event) => {
  const result = await executeToolInternal(event.name, event.args);
  return result;
});
// later: cleanup()
```

**`callToolViaPostMessage(target, name, args)`** — Sends a tool call to a parent/child window via postMessage.

```ts
const result = await callToolViaPostMessage(window.parent, 'get_data', { id: 42 });
```

**`isWebMCPEvent(event)`** — Type guard for WebMCP postMessage events.

### Utilities

```ts
import {
  dispatchAndWait,
  signalCompletion,
  sanitizeSchema,
  createToolGroup,
} from '@webmcp-auto-ui/core';
```

**`dispatchAndWait(eventName, detail?, options?)`** — Dispatches a CustomEvent and waits for a matching completion event. Solves the "execute must return after UI updates" pattern.

**`signalCompletion(requestId, result?)`** — Fires the completion event for `dispatchAndWait`.

**`sanitizeSchema(schema)`** — Cleans a JSON Schema for Anthropic API compatibility (removes unsupported fields).

**`createToolGroup(prefix, tools)`** — Groups related tools under a common prefix for registration.

### Result builders and skill registry

```ts
import {
  textResult,
  jsonResult,
  registerSkill,
  unregisterSkill,
  getSkill,
  listSkills,
  clearSkills,
} from '@webmcp-auto-ui/core';
```

**`textResult(text)`** — Creates a `ToolExecuteResult` with a text content block.

```ts
return textResult('Operation completed successfully');
```

**`jsonResult(data)`** — Creates a `ToolExecuteResult` with JSON-stringified content.

```ts
return jsonResult({ count: 42, items: ['a', 'b'] });
```

**`registerSkill(skill)`** — Exposes a skill as a WebMCP tool on `navigator.modelContext`, making it discoverable and invocable by an agent.

```ts
registerSkill({
  id: 'weather',
  name: 'Weather Dashboard',
  description: 'Shows local weather conditions',
  component: 'WeatherDash',
});
```

### Validation

```ts
import { validateJsonSchema } from '@webmcp-auto-ui/core';

const result = validateJsonSchema(someSchema);
if (!result.valid) {
  console.error(result.errors);
}
```

## Types

All types are exported and documented via JSDoc. Key types:

- `ModelContext`, `ModelContextTool` — W3C WebMCP spec types
- `McpClient`, `McpTool`, `McpToolResult` — MCP protocol types
- `WebMCPCallToolEvent`, `PostMessageBridgeOptions` — bridge types
- `JsonSchema`, `JsonSchemaObject` — schema validation types
- `SkillDef` — skill registry entry

## FONC message bus

Inter-component messaging inspired by Alan Kay's FONC/STEPS. Components never call each other directly.

```ts
import { bus } from '@webmcp-auto-ui/ui';
import type { BusMessage } from '@webmcp-auto-ui/ui';
```

### Register a component

```ts
const unregister = bus.register(
  'my-chart',        // unique ID
  'Chart',           // component type
  ['data', 'theme'], // channels to listen on
  (msg: BusMessage) => {
    console.log(`Received ${msg.channel} from ${msg.from}:`, msg.payload);
  }
);
// later: unregister()
```

### Send a message

```ts
// To a specific component
bus.send('my-panel', 'my-chart', 'data', { values: [1, 2, 3] });

// Broadcast to all listeners on a channel
bus.broadcast('my-panel', 'theme', { mode: 'dark' });
```

### Subscribe without registering a component

```ts
const unsub = bus.subscribe(['data'], (msg) => {
  console.log('Data update:', msg.payload);
});
```

### Inspect the bus

```ts
bus.listPeers();  // [{ id: 'my-chart', type: 'Chart' }, ...]
bus.peerCount;    // 3
bus.lastMessage;  // most recent BusMessage or null
```

### BusMessage shape

```ts
interface BusMessage {
  from: string;       // sender ID
  to: string | '*';   // target ID or broadcast
  channel: string;    // channel name
  payload: unknown;   // message data
  timestamp: number;  // Date.now()
}
```

# @webmcp-auto-ui/sdk

HyperSkill encode/decode, skills registry, and Svelte 5 canvas store.

## What it does

- Encodes/decodes HyperSkill URLs (base64 + optional gzip for skills > 6KB)
- Provides an in-memory skills CRUD registry with change notifications
- Exposes a reactive canvas store (Svelte 5 runes) for blocks, chat, MCP state, and theme
- Provides a vanilla (framework-agnostic) canvas store at `@webmcp-auto-ui/sdk/canvas-vanilla`
- Ships `MCP_DEMO_SERVERS` — a registry of 7 demo MCP server endpoints
- Supports `chatSummary` and `provenance` fields in `HyperSkillMeta` for traceability

## HyperSkill format

A HyperSkill URL embeds a complete skill definition in the `?hs=` query parameter.

The SDK re-exports `encode`, `decode`, `hash`, `diff`, and `getHsParam` directly from the [`hyperskills`](https://www.npmjs.com/package/hyperskills) NPM package. Apps should import from `@webmcp-auto-ui/sdk` (not from `hyperskills` directly).

```ts
import {
  encode,
  decode,
  hash,
  diff,
  getHsParam,
} from '@webmcp-auto-ui/sdk';
```

### Types

```ts
interface HyperSkillMeta {
  title?: string;
  description?: string;
  version?: string;
  created?: string;
  mcp?: string;
  mcpName?: string;
  llm?: string;
  tags?: string[];
  theme?: Record<string, string>;
  hash?: string;
  previousHash?: string;
  chatSummary?: string;       // anonymized summary of the chat that produced the skill
  provenance?: {              // records how the skill was created
    model?: string;
    mcp?: string;
    timestamp?: number;
  };
}

interface HyperSkill {
  meta: HyperSkillMeta;
  content: unknown;
}

interface HyperSkillVersion {
  hash: string;
  previousHash?: string;
  timestamp: number;
  skill: HyperSkill;
}
```

### Encode

```ts
import type { HyperSkill } from '@webmcp-auto-ui/sdk';

const skill: HyperSkill = {
  meta: {
    title: 'Weather Dashboard',
    mcp: 'https://mcp.example.com/mcp',
    llm: 'haiku',
  },
  content: [
    { type: 'stat', data: { label: 'Temp', value: '14C' } },
    { type: 'chart', data: { title: 'Forecast', bars: [['Mon', 12], ['Tue', 15]] } },
  ],
};

const url = await encode('https://app.example.com/viewer', JSON.stringify(skill));
// https://app.example.com/viewer?hs=eyJtZXRhIjp7...
```

Skills larger than 6KB are automatically gzip-compressed (prefix `gz.`).

### Decode

```ts
const { content: raw } = await decode('https://app.example.com/viewer?hs=eyJtZXRh...');
const skill = JSON.parse(raw);
console.log(skill.meta.title);  // "Weather Dashboard"
console.log(skill.content);     // [{ type: 'stat', ... }, ...]
```

Also accepts a raw `hs` parameter value (without the full URL).

### Hashing and versioning

```ts
const h = await hash('https://app.example.com', JSON.stringify(skill.content));
```

Each version carries a SHA-256 hash for traceability. Versions can be chained via `previousHash`.

### Utilities

- **`getHsParam(url)`** -- Extracts the raw `hs` parameter from a URL.
- **`diff(a, b)`** -- Compares two objects and returns an array of changed top-level keys.

## Skills registry

In-memory CRUD for skills. Each skill is a set of instructions that help an agent use tools.

```ts
import {
  createSkill,
  updateSkill,
  deleteSkill,
  getSkill,
  listSkills,
  clearSkills,
  loadSkills,
  loadDemoSkills,
  onSkillsChange,
} from '@webmcp-auto-ui/sdk';
```

### Types

```ts
interface SkillBlock {
  type: string;
  data: Record<string, unknown>;
}

interface Skill {
  id: string;
  name: string;
  description?: string;
  mcp?: string;
  mcpName?: string;
  llm?: string;
  tags?: string[];
  theme?: Record<string, string>;
  blocks: SkillBlock[];
  createdAt: number;
  updatedAt: number;
}
```

### CRUD operations

```ts
// Create
const skill = createSkill({
  name: 'kpi-dashboard',
  description: 'Revenue and user metrics',
  mcp: 'https://mcp.example.com/mcp',
  blocks: [
    { type: 'stat', data: { label: 'Revenue', value: '
  <script>
42K' } },
    { type: 'stat', data: { label: 'Users', value: '8,204' } },
  ],
});

// Update
updateSkill(skill.id, { description: 'Updated KPI dashboard' });

// Get
const s = getSkill(skill.id);

// List (sorted by createdAt descending)
const all = listSkills();

// Delete
deleteSkill(skill.id);

// Clear all
clearSkills();

// Bulk load (replaces all)
loadSkills(skillArray);
```

// No-op if skills already exist
```

  console.log('Skills changed:', listSkills().length);
});
// later: unsubscribe()
```

# @webmcp-auto-ui/agent

Boucle agent LLM avec providers Anthropic, Gemma LiteRT et locaux (Ollama/Llamafile), ToolLayers structurés, recettes WebMCP, `component()` unifié (56 composants), TokenTracker et summarizeChat.

## Ce que fait le package

- Boucle agent itérative : prompt -> tool calls -> LLM -> repeat jusqu'à `end_turn`
- **ToolLayers** : structuration des outils en couches `McpLayer` (données) et `UILayer` (affichage)
- **Mode smart/explicit** : `toolMode: 'smart'` = 1 seul tool `component()`, `'explicit'` = 31 `render_*`
- **Recettes WebMCP** : fichiers `.md` avec frontmatter, parsées et injectées dans le prompt
- **ComponentAdapter** : filtrage/personnalisation des composants UI exposés au LLM
- 4 providers LLM : `RemoteLLMProvider`, `WasmProvider`, `LocalLLMProvider`, + legacy `AnthropicProvider`/`GemmaProvider`
- TokenTracker temps réel + summarizeChat pour la provenance HyperSkill

## Providers

### RemoteLLMProvider (nouveau)

Provider unifié pour les API cloud (Anthropic et compatibles). Remplace `AnthropicProvider` (qui reste disponible en alias).

```ts
import { RemoteLLMProvider } from '@webmcp-auto-ui/agent';

const provider = new RemoteLLMProvider({
  proxyUrl: '/api/chat',
  model: 'haiku',          // 'haiku' | 'sonnet' | 'opus' | string
  apiKey: 'sk-ant-...',    // optionnel
});
```

### WasmProvider (nouveau)

Provider unifié pour les modèles WASM in-browser. Remplace `GemmaProvider` (qui reste disponible en alias).

```ts
import { WasmProvider } from '@webmcp-auto-ui/agent';

const provider = new WasmProvider({
  model: 'gemma-e2b',      // 'gemma-e2b' | 'gemma-e4b' | string
  onProgress: (pct, status, loaded, total) => console.log(`${pct}%`),
  onStatusChange: (status) => console.log(status),
});
```

Tourne sur le main thread via `@mediapipe/tasks-genai` (LiteRT). WebGPU si disponible. Cache OPFS.

### LocalLLMProvider (nouveau)

Provider pour les LLM locaux via API OpenAI-compatible (Ollama, Llamafile, LM Studio).

```ts
import { LocalLLMProvider } from '@webmcp-auto-ui/agent';

const provider = new LocalLLMProvider({
  baseUrl: 'http://localhost:11434',  // Ollama
  model: 'llama3.2',
  backend: 'ollama',                  // 'ollama' | 'llamafile' | 'lm-studio' | string
});
```

### createProvider (factory)

Crée un provider à partir d'un objet de configuration :

```ts
import { createProvider, type LLMConfig } from '@webmcp-auto-ui/agent';

const config: LLMConfig = { type: 'remote', model: 'sonnet', proxyUrl: '/api/chat' };
const provider = createProvider(config);
```

Types de config : `{ type: 'remote' }`, `{ type: 'wasm' }`, `{ type: 'local' }`.

### LLMProvider interface

```ts
interface LLMProvider {
  readonly name: string;
  readonly model: string;
  chat(
    messages: ChatMessage[],
    tools: AnthropicTool[],
    options?: {
      signal?: AbortSignal;
      cacheEnabled?: boolean;
      system?: string;
      temperature?: number;
      topK?: number;
      maxTokens?: number;
      onToken?: (token: string) => void;
    }
  ): Promise<LLMResponse>;
}
```

### TokenTracker

```ts
import { TokenTracker } from '@webmcp-auto-ui/agent';

const tracker = new TokenTracker();
tracker.record({ inputTokens: 500, outputTokens: 120, cached: 400, latencyMs: 850 });
console.log(tracker.stats);
// { reqPerMin, inputPerMin, outputPerMin, cachedPerMin, totalRequests, totalInput, totalOutput }
```

### summarizeChat

```ts
import { summarizeChat } from '@webmcp-auto-ui/agent';

const summary = summarizeChat(messages);
// Résumé anonymisé sans PII pour la provenance HyperSkill
```

## ToolLayers

Les ToolLayers structurent les outils en couches typées. C'est la nouvelle API (v0.7.0) qui remplace le passage plat de `mcpTools[]`.

### Types

```ts
/** Couche MCP — outils et recettes d'un serveur connecté */
interface McpLayer {
  source: 'mcp';
  serverUrl: string;
  serverName?: string;
  tools: McpToolDef[];
  recipes?: McpRecipe[];
}

/** Couche UI — component() + recettes WebMCP */
interface UILayer {
  source: 'ui';
  adapter?: ComponentAdapter;  // filtrage des composants (mode explicit uniquement)
  recipes?: Recipe[];
}

type ToolLayer = McpLayer | UILayer;
```

### buildToolsFromLayers

Convertit les layers en `AnthropicTool[]` envoyés au LLM :

```ts
import { buildToolsFromLayers } from '@webmcp-auto-ui/agent';

const tools = buildToolsFromLayers(layers, 'smart');
// Mode smart : tools MCP + 1 seul tool component()
// Mode explicit : tools MCP + 31 render_* + component()
```

### buildSystemPrompt

Génère le prompt système structuré en sections markdown `## mcp` et `## webmcp` :

```ts
import { buildSystemPrompt } from '@webmcp-auto-ui/agent';

// Nouvelle API — depuis les layers
const prompt = buildSystemPrompt(layers, { toolMode: 'smart' });

// Legacy — depuis un tableau plat de McpToolDef[]
const prompt2 = buildSystemPrompt(mcpTools);
```

Le prompt généré contient :
- `## mcp (serverName)` — liste des outils DATA + recettes serveur
- `## webmcp` — instructions pour `component()` (mode smart) ou liste des `render_*` (mode explicit) + recettes UI

## Mode smart vs explicit

| | Smart (defaut) | Explicit |
|--|---------------|----------|
| **Outils UI** | 1 seul : `component()` | 31 `render_*` + `component()` |
| **Discovery** | `component("help")` pour lister | Le LLM voit tous les tools |
| **Tokens** | Economique (~200 tokens schema) | Couteux (~3000 tokens) |
| **Recommandation** | Cloud (Claude) | WASM (Gemma) ou debug |

En mode smart, le LLM appelle `component("help")` pour decouvrir les composants disponibles, puis `component("nom", {params})` pour rendre.

## Agent loop

### runAgentLoop

```ts
import { runAgentLoop } from '@webmcp-auto-ui/agent';

const result = await runAgentLoop('Montre-moi le CA par trimestre', {
  provider,
  layers: [mcpLayer, uiLayer],   // nouvelle API
  toolMode: 'smart',
  maxIterations: 5,
  cacheEnabled: true,
  initialMessages: history,       // historique conversation
  callbacks: {
    onBlock: (type, data) => canvas.addBlock(type, data),
    onText: (text) => console.log('LLM:', text),
    onToolCall: (call) => console.log('Tool:', call.name),
    onToken: (token) => process.stdout.write(token),
  },
  signal: abortController.signal,
});

console.log(result.text);
console.log(result.toolCalls);
console.log(result.metrics);
console.log(result.stopReason);  // 'end_turn' | 'max_iterations' | 'error'
console.log(result.messages);    // conversation complete pour reprise
```

### AgentLoopOptions

```ts
interface AgentLoopOptions {
  provider: LLMProvider;
  client?: McpClient;
  mcpTools?: McpToolDef[];       // legacy — prefer layers
  layers?: ToolLayer[];          // nouvelle API
  toolMode?: 'smart' | 'explicit';
  maxIterations?: number;        // default: 5
  maxTokens?: number;
  temperature?: number;
  topK?: number;
  cacheEnabled?: boolean;
  systemPrompt?: string;         // override le prompt auto-genere
  initialMessages?: ChatMessage[];
  callbacks?: AgentCallbacks;
  signal?: AbortSignal;
}
```

### AgentCallbacks

```ts
interface AgentCallbacks {
  onIterationStart?: (iteration: number, maxIterations: number) => void;
  onLLMRequest?: (messages: ChatMessage[], tools: AnthropicTool[]) => void;
  onLLMResponse?: (response: LLMResponse, latencyMs: number, tokens?: { input: number; output: number }) => void;
  onToolCall?: (call: ToolCall) => void;
  onBlock?: (type: string, data: Record<string, unknown>) => { id: string } | void;
  onClear?: () => void;
  onText?: (text: string) => void;
  onToken?: (token: string) => void;
  onDone?: (metrics: AgentMetrics) => void;
  onUpdate?: (id: string, data: Record<string, unknown>) => void;
  onMove?: (id: string, x: number, y: number) => void;
  onResize?: (id: string, w: number, h: number) => void;
  onStyle?: (id: string, styles: Record<string, string>) => void;
}
```

### trimConversationHistory

Tronque l'historique pour respecter un budget de tokens :

```ts
import { trimConversationHistory } from '@webmcp-auto-ui/agent';

const trimmed = trimConversationHistory(messages, 4096);
// Supprime les paires user/assistant les plus anciennes en preservant les system messages
```

- **`mcpToolsToAnthropic(tools)`** — Convertit `McpToolDef[]` en `AnthropicTool[]`
- **`fromMcpTools(mcpTools)`** — Convertit `McpTool[]` (from core) en `McpToolDef[]`

## component() unifie

Tool unique qui expose 56 composants (31 renderable, 25 non-renderable). En mode smart, c'est le seul outil UI visible par le LLM.

```ts
import { COMPONENT_TOOL, executeComponent, componentRegistry } from '@webmcp-auto-ui/agent';
```

### Trois modes d'appel

| Appel | Retour |
|-------|--------|
| `component("help")` | Liste des 56 composants avec nom, description, flag `renderable` |
| `component("help", "stat-card")` | Schema + description + renderability d'un composant |
| `component("stat-card", { label: "Revenue", value: "
  <script>
42K" })` | Rend le composant |

Les noms utilisent des tirets (`stat-card`). Les noms `render_*` sont acceptes en backward compat.

### Composants custom

```ts
componentRegistry.set('my-widget', {
  name: 'my-widget',
  toolName: 'my-widget',
  description: 'Widget custom.',
  inputSchema: { type: 'object', properties: { title: { type: 'string' } } },
  renderable: false,
});
```

## ComponentAdapter

Filtre et personnalise les composants UI exposes au LLM. Utile en mode explicit pour limiter les tools envoyes.

```ts
import { ComponentAdapter, nativePreset, allNativePreset, minimalPreset } from '@webmcp-auto-ui/agent';

// Preset minimal : stat, kv, chart, table, text + clear, update
const adapter = new ComponentAdapter();
adapter.registerAll(minimalPreset());

// Preset complet
adapter.registerAll(allNativePreset());

// Preset par groupes
adapter.registerAll(nativePreset('simple', 'rich', 'canvas'));

// Utilisation dans un UILayer
const uiLayer: UILayer = { source: 'ui', adapter, recipes: myRecipes };
```

### Groupes disponibles

| Groupe | Composants |
|--------|-----------|
| `simple` | stat, kv, list, chart, alert, code, text, actions, tags |
| `rich` | table, timeline, profile, trombinoscope, json, hemicycle, chart-rich, cards, sankey, log, stat-card, grid |
| `media` | gallery, carousel, map |
| `advanced` | d3, js-sandbox |
| `canvas` | clear, update, move, resize, style |

### API

```ts
class ComponentAdapter {
  register(def: ComponentDef): this;
  registerAll(defs: ComponentDef[]): this;
  unregister(type: string): this;
  tools(): AnthropicTool[];         // definitions a envoyer au LLM
  types(): string[];
  get(type: string): ComponentDef | undefined;
  getRenderer(type: string): unknown | undefined;
  byGroup(group: string): ComponentDef[];
  get size(): number;
}
```

## Recettes WebMCP

Les recettes guident le LLM sur comment presenter les donnees. Ce sont des fichiers `.md` avec un frontmatter YAML.

### Format d'une recette

```markdown
---
id: composer-tableau-de-bord-kpi
name: Composer un tableau de bord KPI
components_used: [stat-card, chart, table, kv]
when: les donnees contiennent des metriques numeriques
servers: []
layout:
  type: grid
  columns: 3
---

## Quand utiliser
Les resultats MCP contiennent des metriques numeriques...

## Comment
1. Identifier les 3-5 KPIs principaux
2. Afficher chaque KPI en stat-card
3. Ajouter un chart pour les series temporelles
```

### Types

```ts
interface Recipe {
  id: string;
  name: string;
  description?: string;
  components_used?: string[];
  layout?: { type: string; columns?: number; arrangement?: string };
  when: string;
  servers?: string[];
  body: string;
}

interface McpRecipe {
  name: string;
  description?: string;
}
```

### API

```ts
import {
  WEBMCP_RECIPES,        // recettes built-in parsees
  parseRecipe,            // parser une recette .md brute
  parseRecipes,           // parser un lot de recettes
  recipeRegistry,         // registre singleton (read-only)
  registerRecipes,        // populer le registre
  filterRecipesByServer,  // filtrer par nom de serveur connecte
  formatRecipesForPrompt, // formater pour injection dans le prompt
} from '@webmcp-auto-ui/agent';

// Les recettes built-in sont auto-enregistrees a l'import
console.log(WEBMCP_RECIPES.length); // 8+ recettes

// Filtrer par serveur connecte
const relevant = filterRecipesByServer(WEBMCP_RECIPES, ['tricoteuses']);

// Formater pour le prompt (compact, <500 tokens pour 5 recettes)
const text = formatRecipesForPrompt(relevant);
```

### Recettes MCP (serveur)

Les recettes MCP viennent du serveur via `list_recipes` / `get_recipe`. Elles decrivent ce que les outils retournent et comment les combiner. Elles sont portees par `McpLayer.recipes` et injectees dans la section `## mcp` du prompt.

## Workflow complet (v0.7.0)

```
1. L'app construit des ToolLayer[]
   - McpLayer pour chaque serveur MCP connecte
   - UILayer avec adapter optionnel + recettes WebMCP

2. buildSystemPrompt(layers, { toolMode })
   -> prompt francais structure: ## mcp / ## webmcp

3. buildToolsFromLayers(layers, toolMode)
   -> AnthropicTool[] (smart: MCP + component(), explicit: MCP + 31 render_* + component())

4. runAgentLoop(msg, { layers, toolMode, ... })
   -> boucle LLM iterative

5. En mode smart:
   LLM appelle component("help") -> decouverte
   LLM appelle component("stat-card", {params}) -> rendu
   LLM appelle query_sql({sql}) -> donnees MCP
   LLM appelle component("table", {rows}) -> affichage

6. Les recettes WebMCP guident le LLM sur le choix des composants
7. Les recettes MCP decrivent les donnees retournees par les outils
```

# Deployer en production

## Deploy rapide (recommande)

```bash
./scripts/deploy.sh                # deployer toutes les apps
./scripts/deploy.sh flex           # deployer une app
./scripts/deploy.sh home viewer    # deployer certaines apps
```

Le script gere tout : build des packages, **build des apps**, nettoyage des anciens fichiers sur le serveur, copie au bon endroit, **verification sha256**, restart services, confirmation.

**Toujours utiliser ce script. Jamais de deploy manuel avec scp.**

---

## Architecture serveur

```
/opt/webmcp-demos/
  home/              # static -- nginx sert directement
  todo/              # static -- nginx sert directement
  showcase/          # static -- nginx sert directement
  flex/              # Node -- systemd : node index.js
  viewer/build/      # Node -- systemd : node build/index.js
```

### CRITIQUE : Les chemins de deploy ne sont PAS les memes pour toutes les apps Node

| App | systemd ExecStart | Destination deploy | Pourquoi |
|-----|-------------------|--------------------|----------|
| **flex** | `node index.js` | `/opt/webmcp-demos/flex/` (racine) | ExecStart sans prefix `build/` |
| **viewer** | `node build/index.js` | `/opt/webmcp-demos/viewer/build/` | ExecStart inclut `build/` |
| home | static (nginx) | `/opt/webmcp-demos/home/` | -- |
| todo | static (nginx) | `/opt/webmcp-demos/todo/` | -- |
| showcase | static (nginx) | `/opt/webmcp-demos/showcase/` | -- |

**Si vous deployez au mauvais chemin, l'ancien code continue de tourner.**

### Nouvelles apps (v2)

Les nouvelles apps (flex2, viewer2, todo2, showcase2, recipes) ne sont pas encore deployees en production. Quand elles le seront, elles seront ajoutees au script `deploy.sh` avec leurs chemins specifiques.

---

## Deploy manuel (si absolument necessaire)

### Apps statiques (home, todo, showcase)

```bash
# Builder avec l'URL de production (REQUIS pour home)
PUBLIC_BASE_URL=https://demos.hyperskills.net npm -w apps/home run build

# Nettoyer et copier
ssh bot "rm -rf /opt/webmcp-demos/home/_app"
scp -r apps/home/build/* bot:/opt/webmcp-demos/home/
```

### Apps Node -- flex (deploy racine)

```bash
npm -w apps/flex run build

# OBLIGATOIRE : nettoyer les anciens fichiers d'abord
ssh bot "cd /opt/webmcp-demos/flex && rm -f index.js handler.js env.js shims.js && rm -rf client server"
scp -r apps/flex/build/* bot:/opt/webmcp-demos/flex/
ssh bot "systemctl restart webmcp-flex"
```

### Apps Node -- viewer (deploy build/)

```bash
npm -w apps/viewer run build

ssh bot "rm -rf /opt/webmcp-demos/viewer/build"
ssh bot "mkdir -p /opt/webmcp-demos/viewer/build"
scp -r apps/viewer/build/* bot:/opt/webmcp-demos/viewer/build/
ssh bot "systemctl restart webmcp-viewer"
```

---

## Erreurs courantes

### 1. Deploy au mauvais chemin

**Symptome** : Deploy + restart, mais l'ancienne version persiste.

**Cause** : Fichiers copies dans `flex/build/` mais le service execute `node index.js` depuis `flex/`.

**Fix** : `./scripts/deploy.sh` ou verifier le ExecStart du service systemd.

### 2. Anciens chunks non nettoyes

**Symptome** : Nouveau code deploye mais le navigateur montre un mix ancien/nouveau.

**Cause** : SvelteKit produit des fichiers hasches. `scp` ajoute sans supprimer. Le navigateur charge les anciens chunks caches.

**Fix** : Toujours supprimer les anciens fichiers avant de copier :
```bash
ssh bot "rm -rf /opt/webmcp-demos/flex/{client,server,index.js,handler.js}"
```

### 3. PUBLIC_BASE_URL oublie pour home

**Symptome** : Les liens de home pointent vers `localhost:5173`.

**Fix** : Builder avec `PUBLIC_BASE_URL=https://demos.hyperskills.net`.

### 4. .env manquant apres deploy

**Symptome** : Service crash "ANTHROPIC_API_KEY is not defined".

**Cause** : Le .env a ete supprime pendant le nettoyage.

**Fix** : Le script deploy preserve les .env. En manual, ne pas `rm -rf *`.

### 5. rsync au lieu de scp

**Jamais rsync.** `rsync --delete` a deja supprime les `.env` de production.

### 6. Deploy sans rebuild de l'app

**Symptome** : Bug fixe dans le code, deploye, bug toujours la.

**Cause** : L'ancien deploy.sh rebuildait les packages mais pas les apps. Tout changement dans `apps/*/src/` etait ignore.

**Fix applique** : `deploy.sh` rebuild chaque app avant de copier. La verification sha256 confirme.

---

## Verifier un deploy

```bash
# Toutes les pages retournent 200
for p in / /flex/ /viewer/ /showcase/ /todo/; do
  echo "$(curl -s -o /dev/null -w '%{http_code}' -L https://demos.hyperskills.net$p) $p"
done

# L'API chat fonctionne (apps Node)
curl -s https://demos.hyperskills.net/flex/api/chat \
  -X POST -H 'Content-Type: application/json' \
  -d '{"messages":[{"role":"user","content":"hi"}],"model":"claude-haiku-4-5-20251001","max_tokens":5}' \
  | head -c 50

# Services actifs
ssh bot "systemctl is-active webmcp-flex webmcp-viewer"
```

---

## Environnement

| Variable | Apps | Localisation serveur |
|----------|------|--------------------|
| `ANTHROPIC_API_KEY` | flex, viewer | `/opt/webmcp-demos/{app}/.env` |
| `PUBLIC_BASE_URL` | home (build-time) | Variable shell avant `npm run build` |
| `PORT` | flex(3004), viewer(3002) | systemd `Environment=PORT=...` |

# Build a Themed Demo from Scratch

This tutorial walks through creating a complete themed demo using webmcp-auto-ui. We will build a "Nature Observatory" dashboard that displays wildlife sightings with a nature-inspired color palette.

By the end, you will have a working SvelteKit page with themed components, wired together with the FONC event bus, exportable as a shareable HyperSkill URL.

## Prerequisites

- The monorepo is cloned and `npm install` has been run
- Packages are built (see the [Deploy tutorial](./deploy.md), Step 1)
- Basic familiarity with Svelte 5 and JSON

---

## Step 1: Create the theme

Create a file `theme.json` at the root of your app (for example, `apps/showcase/theme.json`):

```json

  "name": "nature-observatory",
  "tokens": {
    "color-bg":       "#f4f1eb",
    "color-surface":  "#ffffff",
    "color-surface2": "#ede8df",
    "color-border":   "rgba(101, 78, 50, 0.10)",
    "color-border2":  "rgba(101, 78, 50, 0.20)",
    "color-accent":   "#2d6a4f",
    "color-accent2":  "#bc4749",
    "color-amber":    "#b07d1e",
    "color-teal":     "#40916c",
    "color-text1":    "#2b2118",
    "color-text2":    "#7a6e5d"

    "color-border":   "rgba(210, 190, 160, 0.10)",

This theme uses earthy greens and browns:
- **accent** (`#2d6a4f`): deep forest green for primary actions and links

## Step 5: Wire the FONC bus between components

FONC (Functions On Named Channels) is the event system built into webmcp-auto-ui. Every block rendered by `BlockRenderer` auto-registers WebMCP tools when `navigator.modelContext` is available. But you can also wire blocks together manually for inter-component communication.

### How it works

Each block rendered via `BlockRenderer` exposes three WebMCP tools:
- `block_<id>_get` -- read the block's current data
- `block_<id>_update` -- update the block's data
- `block_<id>_remove` -- remove the block

To make blocks react to each other, give them explicit IDs and use the update tools:

```svelte
<script lang="ts">
  import { BlockRenderer } from '@webmcp-auto-ui/ui';
  import { onMount } from 'svelte';

  let selectedSpecies = $state('all');
  let tableData = $state(skillJson.blocks[4].data);
  let allRows = skillJson.blocks[4].data.rows;

  function filterBySpecies(species: string) {
    selectedSpecies = species;
    if (species === 'all') {
      tableData = { ...skillJson.blocks[4].data, rows: allRows };
    } else {
      tableData = {
        ...skillJson.blocks[4].data,
        rows: allRows.filter(r => r.species === species)
      };
    }
  }
<\/script>

<!-- Tags block for filtering -->
<BlockRenderer
  type="tags"
  data={{
    label: "Filter by species",
    tags: [
      { text: "All", active: selectedSpecies === 'all' },
      { text: "Red-tailed Hawk", active: selectedSpecies === 'Red-tailed Hawk' },
      { text: "River Otter", active: selectedSpecies === 'River Otter' },
      { text: "Bald Eagle", active: selectedSpecies === 'Bald Eagle' }
    ]
  }}
  on:tagClick={(e) => filterBySpecies(e.detail.text === 'All' ? 'all' : e.detail.text)}
/>

<!-- Filtered data table -->
<BlockRenderer type="data-table" data={tableData} />
```

This pattern lets you build interactive dashboards where selecting a tag filters the table, clicking a map marker highlights a row, or toggling a stat drills down into the chart.

## Step 6: Export as a HyperSkill URL

Once your demo looks right, export it as a portable HyperSkill URL that anyone can open.

The SDK re-exports `encode` and `decode` from the [`hyperskills`](https://www.npmjs.com/package/hyperskills) NPM package:

```typescript
import { encode, decode } from '@webmcp-auto-ui/sdk';

// Encode a skill into a shareable URL
const url = await encode('https://app.example.com/viewer', JSON.stringify(skillData));

// Decode from a URL
const { content } = await decode(url);
const skill = JSON.parse(content);
```

### Using the SDK

```typescript
import { encode } from '@webmcp-auto-ui/sdk';

const skill = {
  version: '1.0',
  name: 'nature-observatory',
  description: 'Wildlife sighting dashboard for North Ridge Reserve',
  theme: themeJson.tokens,
  blocks: skillJson.blocks
};

const shareUrl = await encode('https://demos.hyperskills.net/viewer', JSON.stringify(skill));

console.log(shareUrl);
// Copy this URL -- anyone who opens it will see the full themed dashboard
```

### Using the Flex app

1. Open Flex at `http://localhost:5179`
2. Import the skill JSON via the HyperSkill URL (`?hs=...`)
3. Click "Export" and copy the generated URL
4. The URL contains the theme + all blocks, base64-encoded (gzip-compressed if > 6 KB)

### How the URL works

```
https://demos.hyperskills.net/viewer?hs=eyJ2ZXJzaW9uIjoiMS4wI...

                                        ^^^^^^^^^^^^^^^^^^^^^^^^^
                                        base64(JSON.stringify(skill))
                                        or gz.base64(gzip(JSON.stringify(skill)))
                                        if the payload exceeds 6 KB
```

When someone opens the URL:
1. The Viewer reads the `hs` query parameter
2. Decodes base64 (decompresses gzip if `gz.` prefix)
3. Parses the JSON skill object
4. ThemeProvider applies the embedded `theme` tokens
5. BlockRenderer renders each block in sequence

# Theming Guide

This guide explains how to define and apply a custom design system to any
webmcp-auto-ui project. No Svelte knowledge is required — you write a single
JSON file and the entire UI adapts.

---

## How it works

```
                          theme.json
                      (you write this)
                              |
              +---------------+---------------+
              |               |               |
              v               v               v
        ThemeProvider     Tailwind CSS      Components
        (runtime)        (build-time)      (auto-adapt)
              |               |               |
              v               v               v
        Sets CSS vars    Generates        Read vars via
        on :root         utility classes  bg-surface, etc.
              |               |               |
              +-------+-------+               |
                      |                       |
                      v                       v
               Every element on the page picks up
               the same tokens — one change, everything updates
```

There is **one source of truth**: CSS custom properties on `:root`. The
`theme.json` file defines what those properties should be. The ThemeProvider
injects them at runtime. Tailwind reads them at build time. Every component
— whether it's a simple StatBlock or a complex Hemicycle — consumes them
automatically.

---

## Quick start

### 1. Create `theme.json` at your project root

```json
{
  "name": "my-dashboard",
  "tokens": {
    "color-bg":       "#fafafa",
    "color-surface":  "#ffffff",
    "color-surface2": "#f5f5f5",
    "color-border":   "rgba(0,0,0,0.06)",
    "color-border2":  "rgba(0,0,0,0.12)",
    "color-accent":   "#6c5ce7",
    "color-accent2":  "#e84855",
    "color-amber":    "#d48806",
    "color-teal":     "#0d9488",
    "color-text1":    "#1a1a2e",
    "color-text2":    "#8c8ca0"
  }
}
```

### 2. Pass it to ThemeProvider in your layout

```svelte
<script>
  import { ThemeProvider } from '@webmcp-auto-ui/ui';
  import themeJson from '../theme.json';

  let { children } = $props();
<\/script>

<ThemeProvider defaultMode="light" overrides={themeJson.tokens}>
  {@render children()}
</ThemeProvider>
```

### 3. Done

Every component in the page now uses your colors, automatically.

---

## Token reference

### Core tokens

Every token maps to a CSS custom property `--{token-name}` and a Tailwind
utility class.

```
Token name        CSS variable          Tailwind class     Used for
─────────────────────────────────────────────────────────────────────
color-bg          --color-bg            bg-bg              Page background
color-surface     --color-surface       bg-surface         Card/panel bg
color-surface2    --color-surface2      bg-surface2        Nested surfaces,
                                                           table headers,
                                                           hover states
color-border      --color-border        border-border      Subtle borders
color-border2     --color-border2       border-border2     Stronger borders,
                                                           active states
color-accent      --color-accent        text-accent        Primary accent,
                                        bg-accent          links, buttons
color-accent2     --color-accent2       text-accent2       Destructive/error
                                        bg-accent2         accent
color-amber       --color-amber         text-amber         Warnings, trends
color-teal        --color-teal          text-teal          Success, positive
                                                           trends
color-text1       --color-text1         text-text1         Primary text
color-text2       --color-text2         text-text2         Secondary/muted
                                                           text
```

### How tokens flow through the UI

```
    theme.json                 CSS                    Component
    ──────────                 ───                    ─────────

    "color-accent":    -->   --color-accent    -->   class="text-accent"
    "#6c5ce7"                on :root                 |
                                                      v
                                                   color: var(--color-accent)
                                                      |
                                                      v
                                                   rendered as #6c5ce7
```

When you change the token value, **every component** using that token
updates — buttons, charts, links, stat cards, borders, everything.

---

## Dark mode

Add a `dark` key to override tokens for dark mode:

```json
{
  "name": "my-dashboard",
  "tokens": {
    "color-bg":      "#fafafa",
    "color-surface": "#ffffff",
    "color-text1":   "#1a1a2e"
  },
  "dark": {
    "color-bg":      "#0e0e11",
    "color-surface": "#16161a",
    "color-text1":   "#e8e8f0"
  }
}
```

Only override what changes — tokens not listed in `dark` keep their light
values. The toggle is handled by ThemeProvider:

```
    User clicks toggle
           |
           v
    ThemeProvider.toggle()
           |
           v
    Swaps token set (light <-> dark)
           |
           v
    Updates CSS variables on :root
           |
           v
    Every component re-renders with new colors
    (no page reload, instant)
```

The user's preference is persisted in `localStorage` and restored on next visit.

---

## Designing a theme

### Anatomy of a well-designed token set

```
    ┌─────────────────────────────────────────────┐
    │ Page          bg: color-bg                   │
    │                                              │
    │   ┌──────────────────────────────────────┐   │
    │   │ Card       bg: color-surface          │   │
    │   │            border: color-border       │   │
    │   │                                      │   │
    │   │   Title    color: color-text1        │   │
    │   │   Body     color: color-text2        │   │
    │   │                                      │   │
    │   │   ┌──────────────────────────────┐   │   │
    │   │   │ Nested    bg: color-surface2 │   │   │
    │   │   │           border: color-border│   │   │
    │   │   └──────────────────────────────┘   │   │
    │   │                                      │   │
    │   │   [ Button ]  bg: color-accent       │   │
    │   │               text: white            │   │
    │   │                                      │   │
    │   │   Link        color: color-accent    │   │
    │   │   Warning     color: color-amber     │   │
    │   │   Success     color: color-teal      │   │
    │   │   Error       color: color-accent2   │   │
    │   └──────────────────────────────────────┘   │
    └─────────────────────────────────────────────┘
```

### Contrast rules

For readability, maintain sufficient contrast between:

```
    Background layer        Text on it         Minimum contrast
    ──────────────          ──────────         ────────────────
    color-bg                color-text1        7:1 (WCAG AAA)
    color-surface           color-text1        7:1
    color-surface           color-text2        4.5:1 (WCAG AA)
    color-accent (bg)       white text         4.5:1
    color-accent2 (bg)      white text         4.5:1
```

Use a contrast checker (e.g. webaim.org/resources/contrastchecker) to verify.

### Color relationships

```
    Semantic meaning        Token              Typical values
    ────────────────        ─────              ──────────────

    Light mode:
    ┌─ background ───────── color-bg           #fafafa  (near-white)
    ├─ card surface ──────── color-surface      #ffffff  (white)
    ├─ nested/hover ──────── color-surface2     #f0f0f6  (very light gray)
    ├─ subtle line ───────── color-border       rgba(0,0,0,0.06)
    ├─ visible line ──────── color-border2      rgba(0,0,0,0.12)
    ├─ primary action ────── color-accent       #6c5ce7  (vivid)
    ├─ danger/error ──────── color-accent2      #e84855  (warm red)
    ├─ warning ───────────── color-amber        #d48806  (orange)
    ├─ success ───────────── color-teal         #0d9488  (green)
    ├─ body text ─────────── color-text1        #1a1a2e  (near-black)
    └─ caption/label ─────── color-text2        #64648c  (mid-gray)

    Dark mode (invert the luminance, keep the hue):
    ┌─ background ───────── color-bg           #0e0e11  (near-black)
    ├─ card surface ──────── color-surface      #16161a  (dark gray)
    ├─ nested/hover ──────── color-surface2     #1e1e24  (slightly lighter)
    ├─ subtle line ───────── color-border       rgba(255,255,255,0.07)
    ├─ visible line ──────── color-border2      rgba(255,255,255,0.14)
    ├─ primary action ────── color-accent       #7c6dfa  (brighter for dark bg)
    ├─ body text ─────────── color-text1        #e8e8f0  (near-white)
    └─ caption/label ─────── color-text2        #a0a0b8  (light gray)
```

## Embedding a theme in a HyperSkill

When you export a skill (recipe) from the Composer, the theme is embedded
in the `?hs=` URL:

```json
{
  "version": "1.0",
  "name": "my-skill",
  "theme": {
    "color-accent": "#58cc02",
    "color-bg": "#f7f7f7"
  },
  "blocks": [...]
}
```

When someone opens the URL, the ThemeProvider applies the embedded theme
overrides. This means **every shared skill carries its own look and feel**.

```
    Designer creates skill         User opens ?hs= URL
    with custom theme              
         |                              |
         v                              v
    Composer encodes               Viewer/Composer decodes
    theme + blocks                 theme + blocks
    into ?hs= param                    |
         |                              v
         v                         ThemeProvider applies
    Shareable URL                  embedded theme overrides
                                       |
                                       v
                                   Components render with
                                   the designer's colors
```

---

## Which components use which tokens

Every component in the library reads tokens from CSS variables. Here is the
mapping:

```
Component           bg          border       text         accent
────────────────    ──────────  ───────────  ───────────  ──────────
Card                surface     border       —            —
Panel               surface     border       text2 (hdr)  —
StatBlock           surface     border       text1/text2  teal/accent2
KVBlock             surface     border       text1/text2  —
ChartBlock          surface     border       text2        accent
Chart (rich)        surface     border       text1/text2  palette[0]
DataTable           surface     border       text1/text2  accent (sort)
ProfileCard         surface     border       text1/text2  accent (stats)
Hemicycle           surface     border       text1        per-group
Timeline            surface     border       text1/text2  teal/amber
Cards               surface     border       text1/text2  —
Gallery             surface     border       —            —
Carousel            surface     border       text1/text2  accent (dots)
StatCard            surface     border       text1        teal/accent2
AlertBlock          surface     accent2/amber text1       level-based
CodeBlock           bg          border       teal         —
TagsBlock           surface     border/teal  text2/teal   teal (active)
ActionsBlock        surface     border       text2        accent (primary)
LogViewer           bg          border       text2        teal/amber/accent2
JsonViewer          bg          border       accent       —
MapView             surface     border       text2        accent
Sankey              surface     border       text1        palette
GridData            surface     border       text1/text2  surface2 (highlight)
Trombinoscope       surface     border       text1/text2  per-person
Pane (WM)           surface     border       text1        accent
BlockRenderer       —           —            text2        — (fallback)
```

**Rule of thumb**: change `color-accent` to rebrand everything. Change
`color-bg` and `color-surface` to shift the overall lightness. Change
`color-text1` to adjust readability.

## Advanced: component-level overrides

Beyond global tokens, individual components accept style overrides through
their data/spec props. For example, a Chart's color palette:

```json
{
  "type": "chart-rich",
  "data": {
    "title": "Revenue",
    "type": "bar",
    "labels": ["Q1", "Q2", "Q3", "Q4"],
    "data": [
      { "label": "2025", "values": [120, 145, 160, 180], "color": "#58cc02" },
      { "label": "2024", "values": [100, 110, 130, 150], "color": "#afafaf" }
    ]
  }
}
```

The per-dataset `color` overrides the global palette for that specific chart
without affecting other components.

## Fonts

Fonts are loaded via Google Fonts in the layout. To change fonts:

1. Update the `<link>` tag in your `+layout.svelte`:

```html
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet" />
```

2. Update your Tailwind config or the `body` rule in `app.css`:

```css
body { font-family: 'Inter', system-ui, sans-serif; }
```

The Tailwind preset defines `font-sans` and `font-mono` families. All
components use `font-sans` for UI text and `font-mono` for code/data.

```
[ ] color-bg and color-surface have enough contrast (bg is darker/lighter)
[ ] color-text1 on color-surface passes WCAG AA (4.5:1 ratio)
[ ] color-text2 on color-surface passes WCAG AA (4.5:1 ratio)
[ ] color-accent on white/dark background passes WCAG AA
[ ] color-accent and color-accent2 are visually distinct
[ ] color-teal reads as "positive/success"
[ ] color-amber reads as "warning/attention"
[ ] color-accent2 reads as "error/danger"
[ ] Dark mode overrides tested (if provided)
[ ] Fonts loaded and applied
```

# Theming -- Agent Guide

> This document is designed to be injected into an AI agent's context. It contains everything needed to create a theme.json for webmcp-auto-ui.

## What is theme.json?

A `theme.json` is a JSON object that defines color tokens for a webmcp-auto-ui interface. It is consumed by the `ThemeProvider` Svelte component, which injects the tokens as CSS custom properties (`--color-*`) on the document root element.

The ThemeProvider applies tokens in three layers (highest priority wins):
1. **Built-in tokens** for the current mode (light/dark)
2. **theme.json `tokens`** (light base) + `dark` overrides when in dark mode
3. **Inline `overrides`** prop (runtime overrides)

When you provide a `theme.json`, its `tokens` are applied on top of the built-in defaults. If the user switches to dark mode, the `dark` object is merged on top.

## Format

```json
{
  "name": "my-theme",
  "tokens": {
    "color-bg": "#ffffff",
    "color-surface": "#f5f5f5",
    "color-accent": "#3b82f6"
  },
  "dark": {
    "color-bg": "#0a0a0f",
    "color-surface": "#141419"
  }
}
```

- `name` (optional): human-readable theme name
- `tokens` (required): base tokens applied in both light and dark mode
- `dark` (optional): overrides applied only when dark mode is active

## The 11 Tokens

| Token | Role | Typical usage |
|-------|------|---------------|
| `color-bg` | Page background | `<body>` or root container background |
| `color-surface` | Card/panel background | Primary content areas, cards, modals |
| `color-surface2` | Secondary surface | Nested panels, table headers, hover states |
| `color-border` | Primary border | Card outlines, dividers (subtle) |
| `color-border2` | Secondary border | Stronger borders, active states, separators |
| `color-accent` | Primary accent | Buttons, links, active indicators, chart bars |
| `color-accent2` | Secondary accent / danger | Error states, destructive actions, secondary highlights |
| `color-amber` | Amber / warning | Warning alerts, caution badges, warm highlights |
| `color-teal` | Teal / success | Success states, positive trends, confirmation |
| `color-text1` | Primary text | Headings, body text, values |
| `color-text2` | Secondary text | Labels, captions, muted descriptions |

All tokens are consumed as CSS variables: `var(--color-bg)`, `var(--color-accent)`, etc.

## Workflow

When a designer says "I want a corporate blue theme":

1. Pick a primary blue for `color-accent` (e.g. `#2563eb`)
2. Set `color-bg` to a clean white/off-white
3. Set `color-surface` to white, `color-surface2` slightly gray
4. Set borders using low-opacity black: `rgba(0,0,0,0.08)` and `rgba(0,0,0,0.14)`
5. Pick `color-accent2` as a contrasting warm color (red/coral)
6. Keep `color-amber` warm, `color-teal` green/teal
7. Set `color-text1` dark, `color-text2` medium gray
8. Add a `dark` section: invert background to dark, surface to dark gray, adjust text to light, keep accent colors vibrant

## Example Themes

### Corporate (blue/white)

```json

  "name": "corporate",
  "tokens": {
    "color-bg": "#f8fafc",
    "color-surface": "#ffffff",
    "color-surface2": "#f1f5f9",
    "color-border": "rgba(0,0,0,0.08)",
    "color-border2": "rgba(0,0,0,0.16)",
    "color-accent": "#2563eb",
    "color-accent2": "#dc2626",
    "color-amber": "#d97706",
    "color-teal": "#0d9488",
    "color-text1": "#0f172a",
    "color-text2": "#64748b"
  },
  "dark": {
    "color-bg": "#0c1222",
    "color-surface": "#131c31",
    "color-surface2": "#1a2540",
    "color-border": "rgba(255,255,255,0.07)",
    "color-border2": "rgba(255,255,255,0.14)",
    "color-accent": "#3b82f6",
    "color-accent2": "#ef4444",
    "color-text1": "#e2e8f0",
    "color-text2": "#94a3b8"
  }
}
```

### Nature (green/beige)

```json
{
  "name": "nature",
  "tokens": {
    "color-bg": "#faf8f1",
    "color-surface": "#fffdf7",
    "color-surface2": "#f0ece2",
    "color-border": "rgba(90,70,40,0.1)",
    "color-border2": "rgba(90,70,40,0.2)",
    "color-accent": "#2d6a4f",

  },

    "color-surface": "#12231a",
    "color-surface2": "#1a3025",

    "color-border2": "rgba(255,255,255,0.12)",
    "color-accent": "#40916c",

```

### Neon (purple/black)

```json
{
  "name": "neon",
  "tokens": {
    "color-bg": "#0a0a12",

    "color-border2": "rgba(255,255,255,0.12)",

    "color-accent2": "#f43f5e",
    "color-amber": "#fbbf24",
    "color-teal": "#22d3ee",
    "color-text1": "#f0e6ff",
    "color-text2": "#9d8ab8"
  },
  "dark": {
    "color-bg": "#050508",
    "color-surface": "#0a0a14",
    "color-surface2": "#111120",
    "color-accent": "#c084fc",
    "color-accent2": "#fb7185",
    "color-text1": "#f5f0ff",
    "color-text2": "#a896c4"
  }
}
```

## Dark Mode

Add a `dark` key to your theme.json. It only needs to contain the tokens you want to override -- tokens not listed inherit from `tokens`.

Typically you override:
- `color-bg`, `color-surface`, `color-surface2` (dark backgrounds)
- `color-border`, `color-border2` (white-based opacity instead of black-based)
- `color-text1`, `color-text2` (light text on dark backgrounds)

Accent colors often stay the same or shift slightly brighter for dark mode.

```json
{
  "tokens": { "color-accent": "#6c5ce7" },
  "dark": { "color-accent": "#7c6dfa" }
}
```

## Embedding a Theme in a Skill

When creating a skill/recipe, include the theme tokens in the `theme` field:

```json
{
  "name": "my-dashboard",
  "blocks": [...],
  "theme": {
    "color-accent": "#2563eb",
    "color-bg": "#f8fafc"
  }
}
```

The `theme` field in a skill uses the flat token map (same as `tokens`), not the full `theme.json` structure.

## Constraints

- **WCAG contrast**: `color-text1` on `color-bg` must have a contrast ratio of at least 4.5:1. `color-text2` on `color-surface` should be at least 3:1.
- **All 11 tokens must be defined** in the `tokens` section. Missing tokens fall back to built-in defaults, which may clash with your palette.
- `color-text2` must be readable on both `color-bg` and `color-surface`.
- `color-accent` must be visible on `color-surface` (buttons, links).
- Borders (`color-border`, `color-border2`) should be subtle -- use rgba values.

## Common Mistakes

| Mistake | Consequence | Fix |
|---------|-------------|-----|
| No `dark` section | Dark mode falls back to built-in dark tokens, clashing with your custom accent colors | Always provide a `dark` section |
| `color-border` and `color-border2` too similar | Borders lose their visual hierarchy | Use opacity 0.08 for border and 0.14+ for border2 |
| `color-text2` too light on light theme | Labels and captions become unreadable | Test text2 on both bg and surface backgrounds |
| Using hex for borders | No transparency, harsh lines on colored surfaces | Use rgba values for borders |
| `color-accent` too dark | Buttons and links invisible on dark surfaces | Ensure accent has enough brightness for dark mode |
| Forgetting `color-amber`/`color-teal` | Alerts and trend indicators use wrong colors | Always define all semantic colors |

# Composer des UIs -- Guide Agent

> Ce document est concu pour etre injecte dans le contexte d'un agent IA. Il contient tout le necessaire pour composer une UI a partir de blocs avec webmcp-auto-ui.

## Qu'est-ce qu'une UI composee ?

Une UI composee est une collection de **blocs** arranges en sequence. Chaque bloc a un `type` et un objet `data`. Le `BlockRenderer` rend chaque bloc visuellement en dispatchant vers le widget correspondant.

## Workflow complet (v0.7.0) : Layers -> Prompt -> Tools -> LLM -> component() -> Render

```
App                      Agent Package                     LLM
 |                            |                             |
 |  1. Construit ToolLayer[]  |                             |
 |    - McpLayer (par serveur)|                             |
 |    - UILayer (+ adapter)   |                             |
 |                            |                             |
 |  2. buildSystemPrompt()    |                             |
 |  ----layers, toolMode----> |                             |
 |  <--- prompt structure --- |                             |
 |       ## mcp / ## webmcp   |                             |
 |                            |                             |
 |  3. buildToolsFromLayers() |                             |
 |  ----layers, toolMode----> |                             |
 |  <--- AnthropicTool[] ---  |                             |
 |                            |                             |
 |  4. runAgentLoop(msg, {layers})                          |
 |  ------------------------------------->  prompt + tools  |
 |                            |             |               |
 |                            |   5. component("help")      |
 |                            |   <----------------------   |
 |                            |   --- liste composants -->  |
 |                            |             |               |
 |                            |   6. query_sql({sql})       |
 |                            |   <----------------------   |
 |                   MCP call |   --- donnees ----------->  |
 |                            |             |               |
 |                            |   7. component("table",     |
 |                            |      {rows, columns})       |
 |  <-- onBlock(type, data) - |   <----------------------   |
 |  Canvas affiche le bloc    |                             |
```

### Etape par etape

1. **L'app construit des `ToolLayer[]`** -- un `McpLayer` par serveur MCP connecte + un `UILayer`
2. **`buildSystemPrompt(layers, { toolMode })`** genere le prompt francais structure en `## mcp` / `## webmcp`
3. **`buildToolsFromLayers(layers, toolMode)`** produit les `AnthropicTool[]` selon le mode
4. **`runAgentLoop(msg, { layers, toolMode })`** lance la boucle iterative
5. En mode smart : le LLM voit 1 tool `component()` + N tools MCP
6. Le LLM appelle `component("help")` pour decouvrir, puis `component("nom", {params})` pour rendre
7. Les recettes WebMCP guident le LLM sur comment presenter les donnees

### Exemple concret

```ts
import { runAgentLoop, buildToolsFromLayers, buildSystemPrompt } from '@webmcp-auto-ui/agent';
import type { McpLayer, UILayer, ToolLayer } from '@webmcp-auto-ui/agent';

// 1. Construire les layers
const mcpLayer: McpLayer = {
  source: 'mcp',
  serverUrl: 'https://mcp.code4code.eu/mcp',
  serverName: 'Tricoteuses',
  tools: await client.listTools(),
  recipes: [{ name: 'profil-depute', description: 'Fiche complete depute' }],
};

const uiLayer: UILayer = {
  source: 'ui',
  recipes: webmcpRecipes,  // recettes filtrees par serveur
};

const layers: ToolLayer[] = [mcpLayer, uiLayer];

// 4. Lancer la boucle
const result = await runAgentLoop('Qui est le depute de Paris 1er ?', {
  provider,
  layers,
  toolMode: 'smart',
  callbacks: {
    onBlock: (type, data) => canvas.addBlock(type, data),
    onText: (text) => console.log(text),
  },
});
```

## Les 24 types de blocs

### Blocs simples (9)

| Type | Description | Data minimal |
|------|-------------|-------------|
| `stat` | Metrique unique avec trend | `{"label":"Revenue","value":"
  <script>
42K","trend":"+12%","trendDir":"up"}` |
| `kv` | Liste cle-valeur | `{"title":"Info","rows":[["Status","Active"],["Uptime","99.9%"]]}` |
| `list` | Liste a puces | `{"title":"Tasks","items":["Deploy API","Run tests"]}` |
| `chart` | Bar chart simple | `{"title":"Sales","bars":[["Q1",80],["Q2",120],["Q3",95]]}` |
| `alert` | Banniere d'alerte | `{"title":"Warning","message":"Disk 90%","level":"warn"}` |
| `code` | Bloc de code | `{"lang":"json","content":"{\"key\": \"value\"}"}` |
| `text` | Paragraphe texte | `{"content":"Description paragraph."}` |
| `actions` | Boutons d'action | `{"buttons":[{"label":"Approve","primary":true},{"label":"Reject"}]}` |
| `tags` | Collection de tags | `{"label":"Tags","tags":[{"text":"prod","active":true},{"text":"v2.1"}]}` |

### Blocs riches (15)

| Type | Description | Data minimal |
|------|-------------|-------------|
| `stat-card` | Stat avec couleur variante | `{"label":"Users","value":8204,"variant":"success","trend":"up"}` |
| `data-table` | Table triable | `{"title":"Users","columns":[...],"rows":[...]}` |
| `timeline` | Timeline verticale | `{"title":"History","events":[{"date":"2024-01","title":"Launch","status":"done"}]}` |
| `profile` | Fiche profil | `{"name":"Jane Doe","subtitle":"Engineer","fields":[...]}` |
| `trombinoscope` | Grille de personnes | `{"title":"Team","people":[{"name":"Alice","subtitle":"Lead"}]}` |
| `json-viewer` | Arbre JSON interactif | `{"title":"Response","data":{"status":"ok"}}` |
| `hemicycle` | Hemicycle parlementaire | `{"title":"Assembly","groups":[{"id":"a","label":"Left","seats":150,"color":"#ef4444"}]}` |
| `chart-rich` | Chart multi-type (bar/line/area/pie/donut) | `{"title":"Revenue","type":"line","labels":[...],"data":[...]}` |
| `cards` | Grille de cards | `{"title":"Products","cards":[{"title":"Widget","description":"..."}]}` |
| `grid-data` | Grille spreadsheet | `{"title":"Matrix","columns":[...],"rows":[[1,2],[3,4]]}` |
| `sankey` | Diagramme de flux | `{"title":"Traffic","nodes":[...],"links":[...]}` |
| `map` | Carte Leaflet | `{"title":"Offices","center":{"lat":48.85,"lng":2.35},"markers":[...]}` |
| `log` | Viewer de logs | `{"title":"Logs","entries":[{"level":"error","message":"..."}]}` |
| `gallery` | Galerie d'images | `{"title":"Photos","images":[{"src":"url","caption":"..."}]}` |
| `carousel` | Carousel de slides | `{"title":"Slides","slides":[...],"autoPlay":true}` |

## Composer avec component() (mode smart)

En mode smart, le LLM n'a qu'un seul outil UI : `component()`. Trois modes d'appel :

```
component("help")                        -> liste de tous les composants
component("help", "stat-card")           -> schema detaille d'un composant
component("stat-card", {label, value})   -> rend le composant
```

Actions canvas via noms courts :

| Nom court | Equivalent |
|-----------|-----------|
| `clear` | `clear_canvas` |
| `update` | `update_block` |
| `move` | `move_block` |
| `resize` | `resize_block` |
| `style` | `style_block` |

Les noms utilisent des tirets (`stat-card`). Les noms `render_*` sont acceptes en backward compat.

### Tous les composants enregistres

`component("help")` retourne **tous** les composants (56), pas seulement les widgets renderables :

- **renderable: true** -- tous les block types `render_*` + actions canvas. Renderables via `executeComponent`.
- **renderable: false** -- composants Svelte (primitives, base UI, layouts, agent UI, theme). Retournent leur schema et un hint d'usage.

## Composer une recette (skill)

Une skill est un objet JSON combinant blocs + metadata :

```json
{
  "name": "kpi-dashboard",
  "description": "Key metrics overview",
  "mcp": "https://mcp.example.com/mcp",
  "mcpName": "my-server",
  "llm": "claude-sonnet",
  "tags": ["kpi", "dashboard"],
  "theme": { "color-accent": "#2563eb" },
  "blocks": [
    { "type": "stat", "data": { "label": "Revenue", "value": "
  <script>
42K" } },
    { "type": "chart", "data": { "title": "Monthly Revenue", "bars": [["Jan",80],["Feb",95]] } }
  ]
}
```

## HyperSkill URL Encoding

Les skills sont encodees en `?hs=` pour le partage :
- JSON serialise -> base64
- Si >= 6KB : gzip + prefix `gz.`
- URL : `https://domain.com/viewer?hs=<base64>`

## Exemples de composition

### Dashboard KPI (3 stats + chart)

```json
{
  "blocks": [
    { "type": "stat", "data": { "label": "Revenue", "value": "
  <script>
42K", "trend": "+12.4%", "trendDir": "up" } },
    { "type": "stat", "data": { "label": "Users", "value": "8,204", "trend": "+3.2%", "trendDir": "up" } },
    { "type": "stat", "data": { "label": "Churn", "value": "2.1%", "trend": "-0.4%", "trendDir": "down" } },
    { "type": "chart-rich", "data": { "title": "Revenue Trend", "type": "area", "labels": ["Jan","Feb","Mar","Apr"], "data": [{ "label": "2024", "values": [98,112,128,142] }] } }
  ]
}
```

### Profil utilisateur

```json
{
  "blocks": [
    { "type": "profile", "data": { "name": "Jane Doe", "subtitle": "Senior Engineer", "badge": { "text": "Active", "variant": "success" }, "fields": [{ "label": "Email", "value": "jane@example.com" }], "stats": [{ "label": "Projects", "value": "12" }] } },
    { "type": "timeline", "data": { "title": "Activity", "events": [{ "date": "2024-03-15", "title": "Promoted", "status": "done" }] } }
  ]
}
```

### Monitoring

```json
{
  "blocks": [
    { "type": "alert", "data": { "title": "Database degraded", "message": "High latency.", "level": "warn" } },
    { "type": "kv", "data": { "title": "Service Status", "rows": [["API","OK"],["Database","Degraded"]] } },
    { "type": "log", "data": { "title": "Recent Logs", "entries": [{ "level": "error", "message": "Connection timeout" }] } }
  ]
}
```

## Contraintes

- Le `type` de bloc doit etre un des 24 types valides.
- Les blocs sont rendus dans l'ordre, de haut en bas.
- Taille max skill ~6KB avant gzip pour l'encodage HyperSkill URL.
- `stat` : groupes de 2-4 pour le rythme visuel.
- `data-table` : max 200 lignes affichees.

## Erreurs courantes

| Erreur | Consequence | Correction |
|--------|-------------|-----------|
| `chart` pour plusieurs datasets | `chart` = single-series bars | Utiliser `chart-rich` |
| Trop de blocs (10+) | UI surchargee | Scinder en skills focalisees |
| `type` manquant sur un bloc | `[undefined]` | Toujours inclure `type` |
| Mauvaise shape `data` | Widget vide | Verifier l'interface attendue |
| `chart-rich` ecrit comme `chart` | Ignore pie/line config | Utiliser le type `chart-rich` |
