# Widgets UI -- Guide Agent

> Ce document est concu pour etre injecte dans le contexte d'un agent IA. Catalogue exhaustif des widgets webmcp-auto-ui avec props et exemples.

## Comment ca marche

### Mode smart (defaut v0.7.0)

En mode smart, le LLM n'a qu'un seul outil UI : **`component()`**. Il decouvre les composants via `component("help")` et les rend via `component("nom", {params})`.

```
LLM appelle component("help")
  -> liste de 56 composants avec schemas

LLM appelle component("stat-card", {label: "Users", value: 8204})
  -> bloc rendu sur le canvas
```

### Mode explicit

En mode explicit, le LLM voit les 31 `render_*` tools individuels + `component()`. Plus verbeux mais utile pour les modeles WASM qui ont besoin d'exemples concrets.

### BlockRenderer

Le `BlockRenderer` recoit `{ type, data }` et dispatche vers le widget :
- Blocs simples : data via la prop `data`
- Blocs riches : data via la prop `spec`
- Types inconnus : placeholder `[type]`

Chaque bloc auto-enregistre des tools WebMCP (`block_<id>_get`, `block_<id>_update`, `block_<id>_remove`) quand `navigator.modelContext` est disponible.

# Integration MCP -- Guide Agent

> Ce document est concu pour etre injecte dans le contexte d'un agent IA. Il couvre la connexion multi-MCP, les ToolLayers, et les recettes serveur.

## Qu'est-ce que MCP ?

MCP (Model Context Protocol) est un protocole JSON-RPC 2.0 qui permet aux agents IA de decouvrir et appeler des outils exposes par des serveurs distants. Dans webmcp-auto-ui, MCP est le pont entre les sources de donnees et l'UI.

## Architecture v0.7.0 : ToolLayers

```
User prompt --> Agent Loop --> LLM (Claude/Gemma/Ollama)
                  |                    |
                  |              tool_use blocks
                  |                    |
         +--------+--------+          |
         |                  |          v
    McpLayer 1         McpLayer 2     UILayer
    (Tricoteuses)      (iNaturalist)  (component())
         |                  |
    MCP Client 1       MCP Client 2
         |                  |
    MCP Server 1       MCP Server 2
```

Chaque serveur MCP connecte produit un `McpLayer` avec ses outils et ses recettes serveur. Le tout est agrege dans un `ToolLayer[]` passe a `runAgentLoop`.

### Construction des layers

```ts
import type { McpLayer, UILayer, ToolLayer } from '@webmcp-auto-ui/agent';
import { WEBMCP_RECIPES, filterRecipesByServer } from '@webmcp-auto-ui/agent';

// Layer MCP pour chaque serveur connecte
const mcpLayer1: McpLayer = {
  source: 'mcp',
  serverUrl: 'https://mcp.code4code.eu/mcp',
  serverName: 'Tricoteuses',
  tools: await client1.listTools(),
  recipes: [
    { name: 'profil-depute', description: 'Fiche complete depute' },
    { name: 'scrutin-detail', description: 'Analyse scrutin public' },
  ],
};

const mcpLayer2: McpLayer = {
  source: 'mcp',
  serverUrl: 'https://other-mcp.example.com/mcp',
  serverName: 'iNaturalist',
  tools: await client2.listTools(),
};

// Layer UI avec recettes filtrees par serveurs connectes
const serverNames = ['Tricoteuses', 'iNaturalist'];
const uiLayer: UILayer = {
  source: 'ui',
  recipes: filterRecipesByServer(WEBMCP_RECIPES, serverNames),
};

const layers: ToolLayer[] = [mcpLayer1, mcpLayer2, uiLayer];
```

### Ce que le LLM voit (prompt genere)

```
## mcp (Tricoteuses, iNaturalist)

### outils DATA (12)
- query_sql: Execute une requete SQL
- list_tables: Liste les tables disponibles
- describe_table: Schema d'une table
- search_recipes: Recherche des recettes
...

### recettes serveur (2)
- profil-depute: Fiche complete depute
- scrutin-detail: Analyse scrutin public

## webmcp

### component() -- seul outil UI
Appelle component("nom", {params}) pour rendre un composant.
Composants disponibles : stat, kv, list, chart, alert, ...
```

## McpClient et McpMultiClient

### McpClient (connexion simple)

```ts
import { McpClient } from '@webmcp-auto-ui/core';

const client = new McpClient('https://mcp.example.com/mcp', {
  clientName: 'my-app',
  clientVersion: '1.0.0',
  timeout: 30000,
  headers: { 'Authorization': 'Bearer <token>' },
  autoReconnect: true,
  maxReconnectAttempts: 3,
});

await client.connect();
const tools = await client.listTools();
const result = await client.callTool('query_sql', { sql: 'SELECT 1' });
await client.disconnect();
```

### McpMultiClient (multi-serveur)

Gere les connexions simultanees a plusieurs serveurs MCP. Agrege les listes d'outils et route les appels vers le bon serveur :

```ts
import { McpMultiClient } from '@webmcp-auto-ui/core';

const multi = new McpMultiClient();
await multi.addServer('https://mcp1.example.com/mcp');
await multi.addServer('https://mcp2.example.com/mcp');

const allTools = multi.listAllTools();
const result = await multi.callTool('query_sql', { sql: 'SELECT 1' });

await multi.removeServer('https://mcp1.example.com/mcp');
await multi.disconnectAll();
```

## Recettes serveur (MCP recipes)

Les recettes MCP viennent du serveur et decrivent ce que les outils retournent et comment les combiner. Elles sont distinctes des recettes WebMCP (UI) qui guident le LLM sur la presentation.

### Obtenir les recettes

```ts
// Certains serveurs exposent list_recipes / get_recipe
const recipesResult = await client.callTool('list_recipes', {});
const mcpRecipes: McpRecipe[] = JSON.parse(recipesResult.content[0].text);

// Ajouter au McpLayer
const mcpLayer: McpLayer = {
  source: 'mcp',
  serverUrl: client.url,
  serverName: 'Tricoteuses',
  tools: await client.listTools(),
  recipes: mcpRecipes,
};
```

### Difference WebMCP vs MCP recipes

| | Recette WebMCP (UI) | Recette MCP (serveur) |
|--|---------------------|----------------------|
| Source | Package agent (fichiers .md) | Serveur MCP (`list_recipes`) |
| Contenu | Comment presenter avec component() | Ce que les outils retournent |
| Section prompt | `## webmcp > recettes UI` | `## mcp > recettes serveur` |
| Type | `Recipe` | `McpRecipe` |
| Porte par | `UILayer.recipes` | `McpLayer.recipes` |

## Transport : Streamable HTTP

Le client MCP utilise HTTP POST avec JSON-RPC 2.0 :

- **Content-Type** : `application/json`
- **Accept** : `application/json, text/event-stream`
- **Session** : header `Mcp-Session-Id` gere automatiquement
- **Auto-reconnect** : re-initialise sur 404 (session expiree), backoff exponentiel
- **SSE** : le client parse les reponses `text/event-stream`

## Pattern : generation auto d'UI

```
1. L'utilisateur connecte un serveur MCP
2. L'app appelle client.listTools() -> decouverte des outils
3. L'app construit les ToolLayers (McpLayer + UILayer)
4. L'utilisateur pose une question en langage naturel
5. runAgentLoop:
   - LLM appelle un outil MCP (donnees)
   - LLM appelle component() (affichage)
   - Repete jusqu'a end_turn
6. Resultat : dashboard genere sans composition manuelle
```

### Exemple complet

```ts
import { McpClient } from '@webmcp-auto-ui/core';
import { runAgentLoop, WEBMCP_RECIPES, filterRecipesByServer } from '@webmcp-auto-ui/agent';
import type { McpLayer, UILayer } from '@webmcp-auto-ui/agent';

// 1. Connecter
const client = new McpClient('https://mcp.code4code.eu/mcp');
await client.connect();
const tools = await client.listTools();

// 2. Construire les layers
const mcpLayer: McpLayer = {
  source: 'mcp',
  serverUrl: 'https://mcp.code4code.eu/mcp',
  serverName: 'Tricoteuses',
  tools,
};

const uiLayer: UILayer = {
  source: 'ui',
  recipes: filterRecipesByServer(WEBMCP_RECIPES, ['Tricoteuses']),
};

// 3. Lancer
const result = await runAgentLoop('Liste les deputes du groupe Ecologiste', {
  provider: claudeProvider,
  layers: [mcpLayer, uiLayer],
  toolMode: 'smart',
  callbacks: {
    onBlock: (type, data) => blocks.push({ type, data }),
    onText: (text) => console.log('Assistant:', text),
  },
});
```

## Authentification

```ts
const client = new McpClient('https://mcp.example.com/mcp', {
  headers: { 'Authorization': 'Bearer eyJhbGci...' },
});
```

Le token est envoye avec chaque requete (initialize, tools/list, tools/call).

## Options McpClient

```ts
interface McpClientOptions {
  clientName?: string;
  clientVersion?: string;
  timeout?: number;               // default: 30000
  headers?: Record<string, string>;
  autoReconnect?: boolean;        // default: true
  maxReconnectAttempts?: number;  // default: 3
}
```

## Contraintes

- Le serveur MCP doit supporter Streamable HTTP (POST JSON-RPC 2.0).
- `connect()` obligatoire avant `listTools()` ou `callTool()`.
- Les resultats sont text-based : parser le JSON depuis `content[0].text`.
- La boucle agent tronque les resultats a 10 000 caracteres.
- CORS : le serveur doit autoriser les requetes depuis votre domaine.

## Erreurs courantes

| Erreur | Consequence | Correction |
|--------|-------------|-----------|
| `listTools()` avant `connect()` | Erreur session | Toujours `connect()` d'abord |
| Header `Authorization` manquant | 401/403 | Passer le Bearer token |
| Ignorer `isError` sur les resultats | Donnees incorrectes affichees | Verifier `result.isError` |
| `timeout` trop bas | Requete abortee | Augmenter pour les queries lourdes (60000+) |
| Pas de `disconnect()` | Fuite de session serveur | Appeler au unmount |

# Recettes et Skills -- Guide Agent

> Ce document est concu pour etre injecte dans le contexte d'un agent IA. Il couvre les recettes WebMCP (UI), les recettes MCP (serveur), et les skills (format HyperSkill).

## Vue d'ensemble

Le systeme a deux types de recettes + un format de persistence :

| Concept | Source | Role |
|---------|--------|------|
| **Recette WebMCP** | Package agent (fichiers `.md`) | Guide le LLM sur comment presenter les donnees avec les composants UI |
| **Recette MCP** | Serveur MCP (`list_recipes`/`get_recipe`) | Decrit ce que les outils retournent et comment les combiner |
| **Skill** | SDK (localStorage/HyperSkill URL) | Persistence : blocs + metadata + theme, encodable en URL |

## Recettes WebMCP (UI)

Les recettes WebMCP guident le LLM sur le choix des composants. Elles sont des fichiers `.md` avec un frontmatter YAML, parsees au build et injectees dans le prompt via `UILayer.recipes`.

### Format

```markdown
---
id: composer-tableau-de-bord-kpi
name: Composer un tableau de bord KPI
components_used: [stat-card, chart, table, kv]
when: les donnees contiennent des metriques numeriques
servers: []
layout:
  type: grid
  columns: 3
  arrangement: stat-cards en ligne, chart + table en dessous
---

## Quand utiliser
Les resultats MCP contiennent des metriques numeriques...

## Comment
1. Identifier les 3-5 KPIs principaux
2. Afficher chaque KPI en stat-card
3. Ajouter un chart si series temporelles
```

### Type Recipe

```ts
interface Recipe {
  id: string;
  name: string;
  description?: string;
  components_used?: string[];
  layout?: { type: string; columns?: number; arrangement?: string };
  when: string;            // condition de declenchement (texte libre)
  servers?: string[];      // serveurs MCP cibles (vide = universel)
  body: string;            // contenu markdown
}
```

### API

```ts
import {
  WEBMCP_RECIPES,           // 8+ recettes built-in, auto-enregistrees
  parseRecipe,               // parser un .md brut -> Recipe
  parseRecipes,              // parser un lot de .md -> Recipe[]
  recipeRegistry,            // registre singleton read-only
  registerRecipes,           // ajouter au registre
  filterRecipesByServer,     // filtrer par nom de serveur connecte
  formatRecipesForPrompt,    // formater pour injection prompt (<500 tokens/5 recettes)
} from '@webmcp-auto-ui/agent';
```

### Recettes built-in

| ID | Quand | Composants |
|----|-------|-----------|
| `composer-tableau-de-bord-kpi` | Metriques numeriques, compteurs, totaux | stat-card, chart, table, kv |
| `afficher-oeuvres-art-collection-musee` | Collection d'images/oeuvres | gallery, cards, carousel |
| `analyser-actualites-hacker-news` | Articles/actualites | cards, table, stat-card |
| `cartographier-observations-biodiversite` | Donnees geographiques/observations | map, stat-card, table |
| `explorer-dossiers-legislatifs` | Parcours legislatif | timeline, kv, table |
| `gallery-images` | Images multiples | gallery, carousel |
| `parlementaire-profile` | Profil depute/senateur | profile, hemicycle, timeline |
| `rechercher-textes-juridiques` | Textes de loi | list, kv, code |
| `weather-viz` | Donnees meteo | stat-card, chart |
| `cross-server` | Donnees de plusieurs serveurs MCP | table, chart, kv |

### Filtrage par serveur

Les recettes ont un champ `servers[]` optionnel. La fonction `filterRecipesByServer` fait un matching substring (insensible a la casse) :

```ts
const recipes = filterRecipesByServer(WEBMCP_RECIPES, ['tricoteuses']);
// Retourne les recettes dont servers contient "tricoteuses" + les universelles (servers: [])
```

### Injection dans le prompt

Les recettes sont injectees dans la section `## webmcp` du prompt via `formatRecipesForPrompt()` :

```
### recettes UI (3)
- Composer un tableau de bord KPI: les donnees contiennent des metriques numeriques [stat-card, chart, table, kv]
- Afficher oeuvres art: collection d'images [gallery, cards, carousel]
- Parlementaire profile: profil depute [profile, hemicycle, timeline]
```

## Recettes MCP (serveur)

Les recettes MCP viennent du serveur connecte via les outils `list_recipes` et `get_recipe`. Elles decrivent ce que les outils retournent et comment les combiner.

### Type McpRecipe

```ts
interface McpRecipe {
  name: string;
  description?: string;
}
```

### Utilisation dans les layers

```ts
const mcpLayer: McpLayer = {
  source: 'mcp',
  serverUrl: 'https://mcp.code4code.eu/mcp',
  serverName: 'Tricoteuses',
  tools: await client.listTools(),
  recipes: [
    { name: 'profil-depute', description: 'Fiche complete avec votes et mandats' },
    { name: 'scrutin-detail', description: 'Analyse detaillee d\'un scrutin public' },
  ],
};
```

Elles apparaissent dans le prompt sous :

```
## mcp (Tricoteuses)
### recettes serveur (2)
- profil-depute: Fiche complete avec votes et mandats
- scrutin-detail: Analyse detaillee d'un scrutin public
```

### Comment les obtenir

Beaucoup de serveurs MCP exposent les outils `list_recipes` et `get_recipe`. L'app peut les appeler au moment de la connexion :

```ts
const recipesResult = await client.callTool('list_recipes', {});
const mcpRecipes: McpRecipe[] = JSON.parse(recipesResult.content[0].text);
```

## Skills (format HyperSkill)

Les skills sont le format de persistence. Un skill combine des blocs, des metadata, et un theme optionnel.

### Format Skill

```ts
interface Skill {
  id: string;                        // auto-genere
  name: string;                      // requis
  description?: string;
  mcp?: string;                      // URL serveur MCP
  mcpName?: string;
  llm?: string;                      // modele prefere
  tags?: string[];
  theme?: Record<string, string>;    // overrides CSS tokens
  blocks: SkillBlock[];              // requis
  createdAt: number;
  updatedAt: number;
}
```

### CRUD

```ts
import { createSkill, getSkill, listSkills, updateSkill, deleteSkill } from '@webmcp-auto-ui/sdk';

const skill = createSkill({ name: 'sales-dashboard', blocks: [...] });
const all = listSkills();
const updated = updateSkill(skill.id, { name: 'v2' });
deleteSkill(skill.id);
```

### Encodage HyperSkill URL

```ts
import { encode, decode, getHsParam } from '@webmcp-auto-ui/sdk';

// Encoder
const url = await encode('https://app.com/viewer', JSON.stringify(hsSkill));
// "https://app.com/viewer?hs=eyJtZXRhIjp7..."

// Decoder
const { content: raw } = await decode(hsParam);
const skill = JSON.parse(raw);
```

Regles d'encodage :
- JSON -> base64
- Si > 6KB : gzip + prefix `gz.`
- Points d'entree : `/viewer?hs=` (lecture seule) ou `/flex?hs=` (editable)

### Provenance et summary

```ts
import { summarizeChat } from '@webmcp-auto-ui/agent';

const hsSkill: HyperSkill = {
  meta: {
    title: 'Dashboard',
    chatSummary: summarizeChat(messages),
    provenance: { model: 'claude-sonnet', mcp: 'https://mcp.example.com', timestamp: Date.now() },
  },
  content: blocks,
};
```

### Hashing et diff

```ts
import { hash, diff } from '@webmcp-auto-ui/sdk';

const h = await hash('https://app.com/viewer', JSON.stringify(skill.content));
const changed = diff(oldContent, newContent); // ["blocks", "meta"]
```

## Workflow : Creer une skill

> Avec `component()`, l'agent decouvre les composants via `component("help")` puis rend via `component("nom", {params})`.

1. **Definir l'objectif** : quelles donnees, quel besoin
2. **Choisir les blocs** : 2-5 types (voir composing.md)
3. **Ecrire les data** : remplir chaque bloc
4. **Ajouter les metadata** : name, description, tags, MCP, LLM
5. **Theme** (optionnel) : overrides couleurs
6. **Creer** : `createSkill()` 
7. **Encoder** (optionnel) : `encode()` pour URL partageable

## Contraintes

- `name` requis, non vide.
- `blocks` requis, au moins un bloc.
- `type` de bloc = un des 24 types valides.
- Taille HyperSkill URL : ~2-8KB selon navigateur, gzip au-dela de 6KB.
- `theme` : cles plates (`"color-accent"`, pas d'objet imbrique).

## Erreurs courantes

| Erreur | Consequence | Correction |
|--------|-------------|-----------|
| Data trop volumineuses (1000 lignes) | URL depasse limites navigateur | Limiter les donnees, paginer cote serveur |
| `blocks` manquant | Skill vide | Toujours inclure >= 1 bloc |
| Oublier `await` sur encode/decode | Promise au lieu de valeur | Les deux sont async |
| Confondre recette WebMCP et skill | Recette = guide pour le LLM, skill = donnees persistees | Les recettes guident, les skills stockent |

  </script>

  <script>

    (function () {
      'use strict';

      var contentEl = document.getElementById('content');
      var sidebarEl = document.getElementById('sidebar');
      var overlayEl = document.getElementById('sidebar-overlay');
      var hamburgerEl = document.getElementById('hamburger');
      var navEl = document.getElementById('nav');
      var currentPage = null;

      // Read inlined markdown from script tags
      var inlinedPages = {};
      var mdBlocks = document.querySelectorAll('script[type="text/markdown"]');
      for (var i = 0; i < mdBlocks.length; i++) {
        inlinedPages[mdBlocks[i].dataset.page] = mdBlocks[i].textContent;
      }

      marked.setOptions({
        gfm: true,
        breaks: false,
        highlight: function (code, lang) {
          if (lang && hljs.getLanguage(lang)) {
            try { return hljs.highlight(code, { language: lang }).value; }
            catch (e) {}
          }
          return hljs.highlightAuto(code).value;
        }
      });

      function getPageFromHash() {
        var hash = window.location.hash.replace('#', '');
        return inlinedPages[hash] ? hash : 'install';
      }

      function setActiveLink(page) {
        var links = navEl.querySelectorAll('a[data-page]');
        for (var i = 0; i < links.length; i++) {
          links[i].classList.toggle('active', links[i].dataset.page === page);
        }
      }

      function closeSidebar() {
        sidebarEl.classList.remove('open');
        overlayEl.classList.remove('open');
      }

      function loadPage(page) {
        if (page === currentPage) return;
        currentPage = page;
        setActiveLink(page);
        closeSidebar();

        var md = inlinedPages[page];
        if (!md) {
          contentEl.innerHTML = '<div class="error"><h2>Page not found</h2><p>The requested page "' + page + '" does not exist.</p></div>';
          return;
        }
        contentEl.innerHTML = marked.parse(md);
        var blocks = contentEl.querySelectorAll('pre code');
        for (var i = 0; i < blocks.length; i++) {
          hljs.highlightElement(blocks[i]);
        }
        window.scrollTo({ top: 0, behavior: 'instant' });
      }

      window.addEventListener('hashchange', function () { loadPage(getPageFromHash()); });
      hamburgerEl.addEventListener('click', function () {
        if (sidebarEl.classList.contains('open')) { closeSidebar(); }
        else { sidebarEl.classList.add('open'); overlayEl.classList.add('open'); }
      });
      overlayEl.addEventListener('click', closeSidebar);
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeSidebar(); });

      loadPage(getPageFromHash());
    })();
  </script>
</body>
</html>
