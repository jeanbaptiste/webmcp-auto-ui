<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>webmcp-auto-ui -- Documentation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #6c5ce7;
      --accent-light: #a29bfe;
      --bg: #f8f8fc;
      --surface: #ffffff;
      --border: #e8e8f0;
      --text1: #1a1a2e;
      --text2: #64648c;
      --sidebar-w: 280px;
      --header-h: 56px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text1);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- Header ---- */
    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 100;
    }
    .site-header .logo {
      font-weight: 700;
      font-size: 16px;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.3px;
    }
    .site-header .logo span { color: var(--text2); font-weight: 400; }
    .hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      margin-right: 12px;
    }
    .hamburger svg { display: block; }

    /* ---- Sidebar ---- */
    .sidebar {
      position: fixed;
      top: var(--header-h);
      left: 0;
      bottom: 0;
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px 0;
      z-index: 90;
    }
    .sidebar nav { padding: 0 16px; }
    .sidebar .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text2);
      padding: 16px 12px 6px;
    }
    .sidebar .section-title:first-child { padding-top: 0; }
    .sidebar a {
      display: block;
      padding: 6px 12px;
      font-size: 14px;
      color: var(--text1);
      text-decoration: none;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }
    .sidebar a:hover { background: var(--bg); }
    .sidebar a.active {
      background: #6c5ce714;
      color: var(--accent);
      font-weight: 500;
    }
    .sidebar a.sub {
      padding-left: 28px;
      font-size: 13px;
      color: var(--text2);
    }
    .sidebar a.sub:hover { color: var(--text1); }
    .sidebar a.sub.active { color: var(--accent); }

    /* ---- Overlay for mobile ---- */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 80;
    }
    .sidebar-overlay.open { display: block; }

    /* ---- Main content ---- */
    .main {
      margin-left: var(--sidebar-w);
      margin-top: var(--header-h);
      min-height: calc(100vh - var(--header-h));
    }
    .content {
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 32px 80px;
    }

    /* ---- Markdown rendered content ---- */
    .content h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }
    .content h2 {
      font-size: 24px;
      font-weight: 600;
      margin-top: 40px;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }
    .content h3 {
      font-size: 18px;
      font-weight: 600;
      margin-top: 28px;
      margin-bottom: 8px;
    }
    .content h4 {
      font-size: 15px;
      font-weight: 600;
      margin-top: 20px;
      margin-bottom: 6px;
    }
    .content p { margin-bottom: 14px; }
    .content ul, .content ol {
      margin-bottom: 14px;
      padding-left: 24px;
    }
    .content li { margin-bottom: 4px; }
    .content a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .content a:hover { border-bottom-color: var(--accent); }
    .content code {
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.88em;
      background: #f0eef8;
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--accent);
    }
    .content pre {
      margin-bottom: 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow-x: auto;
    }
    .content pre code {
      display: block;
      padding: 16px 20px;
      background: #fafaff;
      color: var(--text1);
      font-size: 13px;
      line-height: 1.6;
      border-radius: 8px;
    }
    .content blockquote {
      border-left: 3px solid var(--accent);
      padding: 8px 16px;
      margin-bottom: 14px;
      background: #f0eef8;
      border-radius: 0 6px 6px 0;
      color: var(--text2);
    }
    .content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .content th {
      text-align: left;
      font-weight: 600;
      padding: 8px 12px;
      background: var(--bg);
      border-bottom: 2px solid var(--border);
    }
    .content td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    .content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }
    .content img {
      max-width: 100%;
      border-radius: 8px;
    }

    /* ---- Loading state ---- */
    .loading {
      text-align: center;
      padding: 80px 0;
      color: var(--text2);
      font-size: 14px;
    }
    .loading::after {
      content: '';
      display: block;
      width: 24px;
      height: 24px;
      margin: 16px auto 0;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Error state ---- */
    .error {
      text-align: center;
      padding: 80px 32px;
      color: var(--text2);
    }
    .error h2 { color: var(--text1); margin-bottom: 8px; }

    /* ---- Mobile ---- */
    @media (max-width: 768px) {
      :root { --sidebar-w: 280px; }
      .hamburger { display: block; }
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.25s ease;
      }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .content { padding: 24px 16px 60px; }
      .content h1 { font-size: 26px; }
      .content h2 { font-size: 20px; }
      .content pre code { font-size: 12px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="5" x2="17" y2="5"/>
        <line x1="3" y1="10" x2="17" y2="10"/>
        <line x1="3" y1="15" x2="17" y2="15"/>
      </svg>
    </button>
    <a href="#install" class="logo">webmcp-auto-ui <span>docs</span></a>
  </header>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <nav id="nav">
      <div class="section-title">Getting Started</div>
      <a href="#install" data-page="install">Installation</a>
      <a href="#architecture" data-page="architecture">Architecture</a>

      <div class="section-title">Packages</div>
      <a href="#core" data-page="core">Core</a>
      <a href="#ui" data-page="ui">UI</a>
      <a href="#sdk" data-page="sdk">SDK</a>
      <a href="#agent" data-page="agent">Agent</a>

      <div class="section-title">Tutorials</div>
      <a href="#deploy" data-page="deploy">Deploy</a>
      <a href="#themed-demo" data-page="themed-demo">Themed Demo</a>

      <div class="section-title">Reference</div>
      <a href="#theming" data-page="theming">Theming</a>
      <div class="section-title" style="padding-top:8px;font-size:10px;">Agent Guides</div>
      <a href="#agents-theming" data-page="agents-theming" class="sub">Theming</a>
      <a href="#agents-composing" data-page="agents-composing" class="sub">Composing</a>
      <a href="#agents-ui-widgets" data-page="agents-ui-widgets" class="sub">UI Widgets</a>
      <a href="#agents-mcp" data-page="agents-mcp" class="sub">MCP</a>
      <a href="#agents-skills" data-page="agents-skills" class="sub">Skills</a>
    </nav>
  </aside>

  <!-- Main content -->
  <div class="main">
    <div class="content" id="content">
      <div class="loading">Loading documentation...</div>
    </div>
  </div>

  <!-- Dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>

  <script>
    (function () {
      'use strict';

      // ---- Page registry: hash -> markdown file path (relative to site/) ----
      var pages = {
        'install':          '../install.md',
        'architecture':     '../architecture.md',
        'core':             '../packages/core.md',
        'ui':               '../packages/ui.md',
        'sdk':              '../packages/sdk.md',
        'agent':            '../packages/agent.md',
        'deploy':           '../tutorials/deploy.md',
        'themed-demo':      '../tutorials/themed-demo.md',
        'theming':          '../theming.md',
        'agents-theming':   '../agents/theming.md',
        'agents-composing': '../agents/composing.md',
        'agents-ui-widgets':'../agents/ui-widgets.md',
        'agents-mcp':       '../agents/mcp.md',
        'agents-skills':    '../agents/skills.md'
      };

      var contentEl = document.getElementById('content');
      var sidebarEl = document.getElementById('sidebar');
      var overlayEl = document.getElementById('sidebar-overlay');
      var hamburgerEl = document.getElementById('hamburger');
      var navEl = document.getElementById('nav');
      var currentPage = null;
      var cache = {};

      // ---- Markdown rendering ----
      marked.setOptions({
        gfm: true,
        breaks: false,
        highlight: function (code, lang) {
          if (lang && hljs.getLanguage(lang)) {
            try { return hljs.highlight(code, { language: lang }).value; }
            catch (e) { /* fall through */ }
          }
          return hljs.highlightAuto(code).value;
        }
      });

      // ---- Navigation ----
      function getPageFromHash() {
        var hash = window.location.hash.replace('#', '');
        return pages[hash] ? hash : 'install';
      }

      function setActiveLink(page) {
        var links = navEl.querySelectorAll('a[data-page]');
        for (var i = 0; i < links.length; i++) {
          links[i].classList.toggle('active', links[i].dataset.page === page);
        }
      }

      function closeSidebar() {
        sidebarEl.classList.remove('open');
        overlayEl.classList.remove('open');
      }

      function loadPage(page) {
        if (page === currentPage) return;
        currentPage = page;
        setActiveLink(page);
        closeSidebar();

        // Check cache
        if (cache[page]) {
          renderMarkdown(cache[page]);
          return;
        }

        // Show loading
        contentEl.innerHTML = '<div class="loading">Loading documentation...</div>';

        var url = pages[page];
        if (!url) {
          showError('Page not found', 'The requested page "' + page + '" does not exist.');
          return;
        }

        fetch(url)
          .then(function (res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.text();
          })
          .then(function (md) {
            cache[page] = md;
            // Only render if still the current page (user may have navigated away)
            if (currentPage === page) {
              renderMarkdown(md);
            }
          })
          .catch(function (err) {
            if (currentPage === page) {
              showError(
                'Could not load page',
                'Failed to load <code>' + url + '</code>.<br>' +
                'If you are viewing this via <code>file://</code>, some browsers block fetch for local files. ' +
                'Try serving the docs with a local server:<br><br>' +
                '<code>npx serve docs/</code> or <code>python3 -m http.server -d docs/</code>'
              );
            }
          });
      }

      function renderMarkdown(md) {
        contentEl.innerHTML = marked.parse(md);
        // Re-highlight any code blocks that marked did not catch
        var blocks = contentEl.querySelectorAll('pre code');
        for (var i = 0; i < blocks.length; i++) {
          hljs.highlightElement(blocks[i]);
        }
        // Scroll to top
        window.scrollTo({ top: 0, behavior: 'instant' });
      }

      function showError(title, message) {
        contentEl.innerHTML =
          '<div class="error">' +
          '<h2>' + title + '</h2>' +
          '<p>' + message + '</p>' +
          '</div>';
      }

      // ---- Event listeners ----

      // Hash change
      window.addEventListener('hashchange', function () {
        loadPage(getPageFromHash());
      });

      // Sidebar link clicks
      navEl.addEventListener('click', function (e) {
        var link = e.target.closest('a[data-page]');
        if (!link) return;
        // Let the hash change handler do the work
      });

      // Hamburger
      hamburgerEl.addEventListener('click', function () {
        var isOpen = sidebarEl.classList.contains('open');
        if (isOpen) {
          closeSidebar();
        } else {
          sidebarEl.classList.add('open');
          overlayEl.classList.add('open');
        }
      });

      // Overlay click closes sidebar
      overlayEl.addEventListener('click', closeSidebar);

      // Keyboard: Escape closes sidebar
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeSidebar();
      });

      // ---- Initial load ----
      loadPage(getPageFromHash());
    })();
  </script>
</body>
</html>
