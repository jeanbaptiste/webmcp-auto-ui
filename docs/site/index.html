# Installation Guide

Get WebMCP Auto-UI running locally in under 5 minutes.

## Prerequisites

- **Node.js 22+** (`node -v`)
- **npm 10+** (`npm -v`)
- An **Anthropic API key** (for LLM-powered chat features)

## Clone and install

```bash
git clone https://github.com/jeanbaptiste/webmcp-auto-ui.git
cd webmcp-auto-ui
npm install
```

`npm install` resolves all workspaces automatically (packages + apps).

## Project structure

```
webmcp-auto-ui/
  packages/
    core/       @webmcp-auto-ui/core   — W3C WebMCP polyfill + MCP client
    sdk/        @webmcp-auto-ui/sdk    — HyperSkill format, skills registry, canvas store
    agent/      @webmcp-auto-ui/agent  — LLM agent loop + providers + UI tools
    ui/         @webmcp-auto-ui/ui     — 34+ Svelte 5 components
  apps/
    home/       Landing page + app launcher
    flex/       Canvas drag & resize, multi-MCP, ephemeral chat
    todo/       Todo app demo (MCP-powered)
    viewer/     HyperSkill URL viewer / renderer
    showcase/   Component showcase + WebMCP tool demos
```

## Build packages

Packages must be built in dependency order:

```bash
# 1. core (no deps)
npm -w packages/core run build

# 2. sdk (no package deps, but shares types)
npm -w packages/sdk run build

# 3. agent (depends on core)
npm -w packages/agent run build

# 4. ui (standalone, but build last for safety)
npm -w packages/ui run build
```

## Run dev servers

Run all apps at once:

```bash
npm run dev
```

Or run a single app:

```bash
npm run dev:home
npm run dev:flex
npm run dev:todo
npm run dev:viewer
npm run dev:showcase
```

## Port mapping

| App       | Port | URL                    |
|-----------|------|------------------------|
| home      | 5173 | http://localhost:5173   |
| todo      | 5175 | http://localhost:5175   |
| viewer    | 5176 | http://localhost:5176   |
| showcase  | 5177 | http://localhost:5177   |
| flex      | 5179 | http://localhost:5179   |

## Environment variables

| Variable           | Used by        | Purpose                                      |
|--------------------|----------------|----------------------------------------------|
| `ANTHROPIC_API_KEY`| flex, todo | Server-side proxy for Anthropic Claude API    |
| `PUBLIC_BASE_URL`  | home           | Base URL for app links (default: localhost)    |

Set them in each app's `.env` file or export in your shell:

```bash
export ANTHROPIC_API_KEY="sk-ant-..."
```

## Common issues

**`Cannot find module '@webmcp-auto-ui/core'`**
Build core first: `npm -w packages/core run build`

**Port already in use**
Kill the process on that port: `lsof -ti:5173 | xargs kill` or change the port in `vite.config.ts`.

**`ERR_MODULE_NOT_FOUND` on agent imports**
The agent package uses `file:../core` as a dev dependency. Make sure core is built before running agent-dependent apps.

**Svelte check errors in UI package**
Run `npm -w packages/ui run check` to see detailed type diagnostics. Peer dependencies (`svelte`, `d3`, `leaflet`) must be installed at the root.

## Deploying to production

Use the deploy script — it handles build order, correct deploy paths, and cleanup:

```bash
./scripts/deploy.sh              # deploy all apps
./scripts/deploy.sh flex         # deploy one app
```

See [Deploy Tutorial](tutorials/deploy.md) for full details.

**Do NOT deploy manually with scp** — the deploy paths differ per app
(flex deploys to root, viewer deploys to `build/`). The script
knows the correct path for each app.

# Architecture

Monorepo structure, package dependencies, and key design decisions.

## Monorepo layout

```
webmcp-auto-ui/
 |
 +-- packages/
 |    +-- core/          W3C WebMCP polyfill + MCP Streamable HTTP client
 |    +-- sdk/           HyperSkill format, skills CRUD, canvas store (Svelte 5)
 |    +-- agent/         LLM agent loop, Anthropic + Gemma providers, UI tools
 |    +-- ui/            34+ Svelte 5 components (primitives, widgets, WM)
 |
 +-- apps/
 |    +-- home/          Landing page, app launcher (port 5173)
 |    +-- todo/          MCP-powered todo demo (port 5175)
 |    +-- viewer/        HyperSkill URL renderer (port 5176)
 |    +-- showcase/      Component showcase + WebMCP tool demos (port 5177)
 |    +-- flex/          Canvas drag & resize, multi-MCP, chat (port 5179)
 |
 +-- docs/               Documentation
 +-- package.json        Root workspace config
```

## Package dependency graph

```
                +----------+
                |   core   |  (zero deps, framework-agnostic)
                +----+-----+
                     |
              +------+------+
              |             |
         +----v----+   +----v----+
         |   sdk   |   |  agent  |
         +---------+   +---------+
              |
         (Svelte 5 runes)

         +---------+
         |   ui    |  (standalone — no internal deps)
         +---------+
```

- **core** has zero external dependencies. Pure TypeScript.
- **sdk** depends on Svelte 5 (peer) for the canvas store. No dependency on core.
- **agent** depends on core (`@webmcp-auto-ui/core`) for `McpClient`, `sanitizeSchema`, and types.
- **ui** is standalone. Peer dependencies: `svelte ^5`, `d3 ^7`, `leaflet >=1.9`.

## App descriptions

| App | Purpose |
|-----|---------|
| **home** | Landing page with links to all other apps. Configurable via `PUBLIC_BASE_URL`. |
| **flex** | Canvas drag & resize, multi-MCP, ephemeral chat, HyperSkills export, Gemma WASM local. The most complete demo. |
| **todo** | Minimal todo app demonstrating MCP tool integration for CRUD operations. |
| **viewer** | Decodes a HyperSkill URL (`?hs=...`) and renders the embedded skill read-only. |
| **showcase** | Interactive catalog of all UI components. Also demonstrates WebMCP tool registration and postMessage bridge. |

## Technology stack

| Layer | Technology |
|-------|-----------|
| Framework | SvelteKit (apps), Svelte 5 (components) |
| Styling | Tailwind CSS 4 + CSS variables theming |
| UI base | bits-ui (shadcn-svelte pattern), tailwind-variants |
| Charting | D3.js v7 (Chart, Sankey, Hemicycle, D3Widget) |
| Maps | Leaflet (MapView) |
| LLM | Anthropic Claude API (via server proxy), Gemma E2B (in-browser worker) |
| Protocol | MCP Streamable HTTP (JSON-RPC 2.0) |
| Build | TypeScript, svelte-package, Vite |

## Key design decisions

### CSS variables theming

Theme tokens (colors, radii, fonts) are defined as CSS custom properties in `ThemeProvider`. Two built-in modes (`light`, `dark`) with full override support via `theme.json` or the canvas store's `themeOverrides`. Components read tokens from CSS variables, making theming work without recompilation.

### FONC message bus

Components never call each other directly. The `bus` singleton implements Alan Kay's "messaging not calling" principle: components register on named channels and exchange `BusMessage` objects. This decouples senders from receivers and enables composition without tight coupling.

### BlockRenderer dispatch

`BlockRenderer` is a single Svelte component that takes a `{ type, data }` block and dispatches rendering to the correct widget. The agent loop emits blocks via callbacks; the canvas store holds them; `BlockRenderer` renders them. This creates a clean pipeline: **LLM -> tool call -> block -> store -> renderer**.

### HyperSkill URL format

A skill (blocks + MCP URL + LLM choice + theme) is serialized to JSON, base64-encoded, and appended as `?hs=...` query parameter. Skills larger than 6KB are gzip-compressed (prefix `gz.`). Each version carries a SHA-256 hash for traceability and chaining.

### Agent loop architecture

The agent loop (`runAgentLoop`) runs an iterative LLM -> tool call -> LLM cycle. UI tools (`render_*`) are executed locally via callbacks (no MCP roundtrip). Data tools are forwarded to the MCP server via `McpClient.callTool()`. The loop stops on `end_turn` or `max_iterations`.

# @webmcp-auto-ui/core

W3C WebMCP polyfill and MCP Streamable HTTP client. Zero dependencies, framework-agnostic, SSR-safe.

## What it does

- Implements the W3C WebMCP Draft CG Report (2026-03-27) as a polyfill on `navigator.modelContext`
- Provides `McpClient` for connecting to MCP servers over Streamable HTTP (JSON-RPC 2.0)
- Includes a postMessage bridge for cross-frame tool invocation
- Ships result builders and a lightweight skill registry for WebMCP tool registration

## Exports

### Polyfill

```ts
import {
  initializeWebMCPPolyfill,
  cleanupWebMCPPolyfill,
  hasNativeWebMCP,
  executeToolInternal,
} from '@webmcp-auto-ui/core';
```

**`initializeWebMCPPolyfill(options?)`** — Installs the polyfill on `navigator.modelContext`. Call once at app startup.

```ts
initializeWebMCPPolyfill({
  confirmationPolicy: 'auto', // 'auto' | 'always' | 'never'
});
```

**`cleanupWebMCPPolyfill()`** — Removes the polyfill and restores previous descriptors.

**`hasNativeWebMCP()`** — Returns `true` if the browser has native WebMCP support.

**`executeToolInternal(name, args)`** — Executes a registered tool by name. Used internally by the polyfill.

### MCP Client

```ts
import { McpClient } from '@webmcp-auto-ui/core';
```

Streamable HTTP client for MCP servers. Uses native `fetch`, no dependencies.

```ts
const client = new McpClient('https://mcp.example.com/mcp', {
  clientName: 'my-app',
  clientVersion: '1.0.0',
  timeout: 30000,
  headers: { Authorization: 'Bearer ...' },
});

// Connect (sends initialize + notifications/initialized)
const info = await client.connect();
console.log(info.serverInfo.name);

// List available tools
const tools = await client.listTools();

// Call a tool
const result = await client.callTool('get_weather', { city: 'Paris' });
console.log(result.content);

// Disconnect
await client.disconnect();
```

#### McpClient API

| Method | Returns | Description |
|--------|---------|-------------|
| `connect()` | `McpInitializeResult` | Initializes the MCP session |
| `listTools()` | `McpTool[]` | Lists all tools from the server |
| `callTool(name, args?)` | `McpToolResult` | Calls a tool with optional arguments |
| `disconnect()` | `void` | Ends the session |

### postMessage bridge

```ts
import {
  listenForAgentCalls,
  stopListening,
  callToolViaPostMessage,
  isWebMCPEvent,
} from '@webmcp-auto-ui/core';
```

**`listenForAgentCalls(handler)`** — Listens for `webmcp:call-tool` events from iframes or other windows.

```ts
const cleanup = listenForAgentCalls(async (event) => {
  const result = await executeToolInternal(event.name, event.args);
  return result;
});
// later: cleanup()
```

**`callToolViaPostMessage(target, name, args)`** — Sends a tool call to a parent/child window via postMessage.

```ts
const result = await callToolViaPostMessage(window.parent, 'get_data', { id: 42 });
```

**`isWebMCPEvent(event)`** — Type guard for WebMCP postMessage events.

### Utilities

```ts
import {
  dispatchAndWait,
  signalCompletion,
  sanitizeSchema,
  createToolGroup,
} from '@webmcp-auto-ui/core';
```

**`dispatchAndWait(eventName, detail?, options?)`** — Dispatches a CustomEvent and waits for a matching completion event. Solves the "execute must return after UI updates" pattern.

**`signalCompletion(requestId, result?)`** — Fires the completion event for `dispatchAndWait`.

**`sanitizeSchema(schema)`** — Cleans a JSON Schema for Anthropic API compatibility (removes unsupported fields).

**`createToolGroup(prefix, tools)`** — Groups related tools under a common prefix for registration.

### Result builders and skill registry

```ts
import {
  textResult,
  jsonResult,
  registerSkill,
  unregisterSkill,
  getSkill,
  listSkills,
  clearSkills,
} from '@webmcp-auto-ui/core';
```

**`textResult(text)`** — Creates a `ToolExecuteResult` with a text content block.

```ts
return textResult('Operation completed successfully');
```

**`jsonResult(data)`** — Creates a `ToolExecuteResult` with JSON-stringified content.

```ts
return jsonResult({ count: 42, items: ['a', 'b'] });
```

**`registerSkill(skill)`** — Exposes a skill as a WebMCP tool on `navigator.modelContext`, making it discoverable and invocable by an agent.

```ts
registerSkill({
  id: 'weather',
  name: 'Weather Dashboard',
  description: 'Shows local weather conditions',
  component: 'WeatherDash',
});
```

### Validation

```ts
import { validateJsonSchema } from '@webmcp-auto-ui/core';

const result = validateJsonSchema(someSchema);
if (!result.valid) {
  console.error(result.errors);
}
```

## Types

All types are exported and documented via JSDoc. Key types:

- `ModelContext`, `ModelContextTool` — W3C WebMCP spec types
- `McpClient`, `McpTool`, `McpToolResult` — MCP protocol types
- `WebMCPCallToolEvent`, `PostMessageBridgeOptions` — bridge types
- `JsonSchema`, `JsonSchemaObject` — schema validation types
- `SkillDef` — skill registry entry

# @webmcp-auto-ui/ui

34+ Svelte 5 components: theme system, primitives, block widgets, rich visualizations, and a window manager.

## Component catalog

### Theme

| Export | Type | Description |
|--------|------|-------------|
| `ThemeProvider` | Component | Wraps the app, injects CSS variables for theming |
| `getTheme()` | Function | Returns current theme tokens from context |
| `DARK_TOKENS` | Object | Dark mode token values |
| `LIGHT_TOKENS` | Object | Light mode token values |
| `THEME_MAP` | Object | Maps theme names to token sets |

### Base (shadcn-svelte pattern)

Built on `bits-ui` + `tailwind-variants`. Drop-in accessible primitives.

| Component | Description |
|-----------|-------------|
| `Button` | Button with variants (default, destructive, outline, ghost, link) |
| `Input` | Text input with label/error states |
| `Badge` | Inline badge with color variants |
| `NativeSelect` | Native `<select>` wrapper |
| `Tooltip` | Hover tooltip |
| `Dialog` | Modal dialog (+ `DialogTrigger`, `DialogContent`, `DialogHeader`, `DialogFooter`, `DialogTitle`, `DialogDescription`) |

### Primitives

Layout and container components.

| Component | Description |
|-----------|-------------|
| `Card` | Themed card container with optional header/footer |
| `GridLayout` | CSS grid wrapper with responsive columns |
| `List` | Ordered/unordered list renderer |
| `Panel` | Collapsible panel with title bar |

## FONC message bus

Inter-component messaging inspired by Alan Kay's FONC/STEPS. Components never call each other directly.

```ts
import { bus } from '@webmcp-auto-ui/ui';
import type { BusMessage } from '@webmcp-auto-ui/ui';
```

### Register a component

```ts
const unregister = bus.register(
  'my-chart',        // unique ID
  'Chart',           // component type
  ['data', 'theme'], // channels to listen on
  (msg: BusMessage) => {
    console.log(`Received ${msg.channel} from ${msg.from}:`, msg.payload);
  }
);
// later: unregister()
```

### Send a message

```ts
// To a specific component
bus.send('my-panel', 'my-chart', 'data', { values: [1, 2, 3] });

// Broadcast to all listeners on a channel
bus.broadcast('my-panel', 'theme', { mode: 'dark' });
```

### Subscribe without registering a component

```ts
const unsub = bus.subscribe(['data'], (msg) => {
  console.log('Data update:', msg.payload);
});
```

### Inspect the bus

```ts
bus.listPeers();  // [{ id: 'my-chart', type: 'Chart' }, ...]
bus.peerCount;    // 3
bus.lastMessage;  // most recent BusMessage or null
```

### BusMessage shape

```ts
interface BusMessage {
  from: string;       // sender ID
  to: string | '*';   // target ID or broadcast
  channel: string;    // channel name
  payload: unknown;   // message data
  timestamp: number;  // Date.now()
}
```

# @webmcp-auto-ui/sdk

HyperSkill encode/decode, skills registry, and Svelte 5 canvas store.

## What it does

- Encodes/decodes HyperSkill URLs (base64 + optional gzip for skills > 6KB)
- Provides an in-memory skills CRUD registry with change notifications
- Exposes a reactive canvas store (Svelte 5 runes) for blocks, chat, MCP state, and theme

## HyperSkill format

A HyperSkill URL embeds a complete skill definition in the `?hs=` query parameter.

The SDK re-exports `encode`, `decode`, `hash`, `diff`, and `getHsParam` directly from the [`hyperskills`](https://www.npmjs.com/package/hyperskills) NPM package. Apps should import from `@webmcp-auto-ui/sdk` (not from `hyperskills` directly).

```ts
import {
  encode,
  decode,
  hash,
  diff,
  getHsParam,
} from '@webmcp-auto-ui/sdk';
```

### Types

```ts
interface HyperSkillMeta {
  title?: string;
  description?: string;
  version?: string;
  created?: string;
  mcp?: string;
  mcpName?: string;
  llm?: string;
  tags?: string[];
  theme?: Record<string, string>;
  hash?: string;
  previousHash?: string;
}

interface HyperSkill {
  meta: HyperSkillMeta;
  content: unknown;
}

interface HyperSkillVersion {
  hash: string;
  previousHash?: string;
  timestamp: number;
  skill: HyperSkill;
}
```

### Encode

```ts
import type { HyperSkill } from '@webmcp-auto-ui/sdk';

const skill: HyperSkill = {
  meta: {
    title: 'Weather Dashboard',
    mcp: 'https://mcp.example.com/mcp',
    llm: 'haiku',
  },
  content: [
    { type: 'stat', data: { label: 'Temp', value: '14C' } },
    { type: 'chart', data: { title: 'Forecast', bars: [['Mon', 12], ['Tue', 15]] } },
  ],
};

const url = await encode('https://app.example.com/viewer', JSON.stringify(skill));
// https://app.example.com/viewer?hs=eyJtZXRhIjp7...
```

Skills larger than 6KB are automatically gzip-compressed (prefix `gz.`).

### Decode

```ts
const { content: raw } = await decode('https://app.example.com/viewer?hs=eyJtZXRh...');
const skill = JSON.parse(raw);
console.log(skill.meta.title);  // "Weather Dashboard"
console.log(skill.content);     // [{ type: 'stat', ... }, ...]
```

Also accepts a raw `hs` parameter value (without the full URL).

### Hashing and versioning

```ts
const h = await hash('https://app.example.com', JSON.stringify(skill.content));
```

Each version carries a SHA-256 hash for traceability. Versions can be chained via `previousHash`.

### Utilities

- **`getHsParam(url)`** -- Extracts the raw `hs` parameter from a URL.
- **`diff(a, b)`** -- Compares two objects and returns an array of changed top-level keys.

## Skills registry

In-memory CRUD for skills. Each skill is a set of instructions that help an agent use tools.

```ts
import {
  createSkill,
  updateSkill,
  deleteSkill,
  getSkill,
  listSkills,
  clearSkills,
  loadSkills,
  loadDemoSkills,
  onSkillsChange,
} from '@webmcp-auto-ui/sdk';
```

### Types

```ts
interface SkillBlock {
  type: string;
  data: Record<string, unknown>;
}

interface Skill {
  id: string;
  name: string;
  description?: string;
  mcp?: string;
  mcpName?: string;
  llm?: string;
  tags?: string[];
  theme?: Record<string, string>;
  blocks: SkillBlock[];
  createdAt: number;
  updatedAt: number;
}
```

### CRUD operations

```ts
// Create
const skill = createSkill({
  name: 'kpi-dashboard',
  description: 'Revenue and user metrics',
  mcp: 'https://mcp.example.com/mcp',
  blocks: [
    { type: 'stat', data: { label: 'Revenue', value: '
  <script>
42K' } },
    { type: 'stat', data: { label: 'Users', value: '8,204' } },
  ],
});

// Update
updateSkill(skill.id, { description: 'Updated KPI dashboard' });

// Get
const s = getSkill(skill.id);

// List (sorted by createdAt descending)
const all = listSkills();

// Delete
deleteSkill(skill.id);

// Clear all
clearSkills();

// Bulk load (replaces all)
loadSkills(skillArray);
```

### Demo skills

```ts
loadDemoSkills();
// Loads 3 built-in skills: weather-dashboard, kpi-overview, status-monitor
// No-op if skills already exist
```

### Change listener

```ts
const unsubscribe = onSkillsChange(() => {
  console.log('Skills changed:', listSkills().length);
});
// later: unsubscribe()
```

## Canvas store

Svelte 5 runes-based reactive store. Browser-only (must be imported in Svelte components).

```ts
import { canvas } from '@webmcp-auto-ui/sdk/canvas';
```

### Reactive state

| Property | Type | Description |
|----------|------|-------------|
| `canvas.blocks` | `Block[]` | All blocks on the canvas |
| `canvas.mode` | `'auto' \| 'drag' \| 'chat'` | Current interaction mode |
| `canvas.llm` | `'haiku' \| 'sonnet' \| 'gemma-e2b' \| 'gemma-e4b'` | Selected LLM |
| `canvas.mcpUrl` | `string` | MCP server URL |
| `canvas.mcpConnected` | `boolean` | MCP connection status |
| `canvas.mcpConnecting` | `boolean` | Connection in progress |
| `canvas.mcpName` | `string` | Connected server name |
| `canvas.mcpTools` | `McpToolInfo[]` | Available MCP tools |
| `canvas.messages` | `ChatMsg[]` | Chat message history |
| `canvas.generating` | `boolean` | LLM is generating |
| `canvas.statusText` | `string` | Status bar text |
| `canvas.statusColor` | `string` | Status bar color class |
| `canvas.blockCount` | `number` | Number of blocks (derived) |
| `canvas.isEmpty` | `boolean` | No blocks on canvas (derived) |
| `canvas.themeOverrides` | `Record<string, string>` | Theme CSS variable overrides |

### Block operations

```ts
canvas.addBlock('stat', { label: 'Users', value: '1,204' });
canvas.removeBlock('b_abc123');
canvas.updateBlock('b_abc123', { value: '1,300' });
canvas.moveBlock('b_abc123', 'b_def456');  // reorder
canvas.clearBlocks();
canvas.setBlocks(newBlockArray);
```

### Chat operations

```ts
canvas.addMsg('user', 'Show me the revenue data');
canvas.updateMsg('m_abc123', 'Updated content');
canvas.clearMessages();
```

### MCP state

```ts
canvas.setMcpUrl('https://mcp.example.com/mcp');
canvas.setMcpConnecting(true);
canvas.setMcpConnected(true, 'code4code', tools);
canvas.setMcpError('Connection refused');
```

### HyperSkill integration

```ts
// Export current canvas as a skill JSON
const json = canvas.buildSkillJSON();

// Export as base64 param for URL embedding
const param = canvas.buildHyperskillParam();

// Load a skill from a base64 param
canvas.loadFromParam(hsParam);  // returns true on success
```

# @webmcp-auto-ui/agent

LLM agent loop with Anthropic and Gemma providers, plus 22 UI tools for rendering blocks and a unified `component()` tool exposing 56 components.

## What it does

- Runs an iterative LLM agent loop: prompt -> tool calls -> LLM -> repeat until done
- Provides two LLM providers: `AnthropicProvider` (cloud) and `GemmaProvider` (in-browser Web Worker)
- Defines 22 `render_*` UI tools that the LLM calls to compose visual blocks on the canvas
- Bridges MCP server tools and UI tools into a unified tool set for the LLM

## Providers

### AnthropicProvider

Calls the Anthropic Claude API through a server-side proxy (SvelteKit `+server.ts`).

```ts
import { AnthropicProvider } from '@webmcp-auto-ui/agent';

const provider = new AnthropicProvider({
  proxyUrl: '/api/chat',          // your SvelteKit proxy endpoint
  model: 'claude-haiku-4-5-20251001',  // optional, defaults to Haiku
  apiKey: 'sk-ant-...',          // optional, injected as __apiKey in body
});

// Switch model at runtime
provider.setModel('claude-sonnet');
```

Built-in model mapping:

| ModelId | Anthropic model |
|---------|----------------|
| `claude-haiku` | `claude-haiku-4-5-20251001` |
| `claude-sonnet` | `claude-sonnet-4-6` |

### GemmaProvider

Runs Gemma locally in a Web Worker via Hugging Face Transformers.js. No API key needed.

```ts
import { GemmaProvider } from '@webmcp-auto-ui/agent';

const provider = new GemmaProvider({
  workerUrl: '/gemma.worker.js',
  onProgress: (pct, status) => console.log(`${pct}% — ${status}`),
  onStatusChange: (status) => console.log('Status:', status),
  // status: 'idle' | 'loading' | 'ready' | 'error'
});

await provider.initialize();  // downloads model weights on first run
```

### LLMProvider interface

Both providers implement:

```ts
interface LLMProvider {
  readonly name: string;
  readonly model: ModelId;
  chat(
    messages: ChatMessage[],
    tools: AnthropicTool[],
    options?: { signal?: AbortSignal; cacheEnabled?: boolean; system?: string }
  ): Promise<LLMResponse>;
}
```

## Agent loop

```ts
import { runAgentLoop, buildSystemPrompt, mcpToolsToAnthropic, fromMcpTools } from '@webmcp-auto-ui/agent';
```

### runAgentLoop

Runs the LLM -> tool call -> LLM cycle until `end_turn` or `maxIterations`.

```ts
const result = await runAgentLoop('Show me revenue by quarter', {
  provider,
  client: mcpClient,         // optional McpClient instance
  mcpTools: tools,           // tools from client.listTools()
  maxIterations: 10,         // default: 10
  cacheEnabled: true,        // enable prompt caching
  systemPrompt: customPrompt, // override the default system prompt
  signal: abortController.signal,
  callbacks: {
    onBlock: (type, data) => canvas.addBlock(type, data),
    onText: (text) => console.log('LLM:', text),
    onToolCall: (call) => console.log('Tool:', call.name, call.result),
    onClear: () => canvas.clearBlocks(),
  },
});

console.log(result.text);           // final LLM text
console.log(result.toolCalls);      // all tool calls made
console.log(result.metrics);        // token usage, latency, iterations
console.log(result.stopReason);     // 'end_turn' | 'max_iterations' | 'error'
```

### AgentLoopOptions

```ts
interface AgentLoopOptions {
  client?: McpClient;
  provider: LLMProvider;
  mcpTools?: McpToolDef[];
  maxIterations?: number;
  cacheEnabled?: boolean;
  systemPrompt?: string;
  callbacks?: AgentCallbacks;
  signal?: AbortSignal;
}
```

### AgentCallbacks

```ts
interface AgentCallbacks {
  onBlock?: (type: string, data: Record<string, unknown>) => void;
  onText?: (text: string) => void;
  onToolCall?: (call: ToolCall) => void;
  onClear?: () => void;
}
```

### AgentResult

```ts
interface AgentResult {
  text: string;
  toolCalls: ToolCall[];
  metrics: AgentMetrics;
  stopReason: 'end_turn' | 'max_iterations' | 'error';
}

interface AgentMetrics {
  totalTokens: number;
  promptTokens: number;
  completionTokens: number;
  totalLatencyMs: number;
  toolCalls: number;
  iterations: number;
  cacheHits: number;
}
```

### Helper functions

**`buildSystemPrompt(mcpTools)`** — Generates the default system prompt listing all DATA and UI tools available to the LLM.

**`mcpToolsToAnthropic(tools)`** — Converts MCP tool definitions to Anthropic API format (sanitizes schemas).

**`fromMcpTools(mcpTools)`** — Alias/helper for converting MCP tools for use in the agent loop.

## UI tools

22 render tools + 1 canvas action, exposed to the LLM. Each `render_*` tool maps to a block type in `@webmcp-auto-ui/ui`.

```ts
import { UI_TOOLS, isUITool, executeUITool } from '@webmcp-auto-ui/agent';
```

### Tool list

#### Simple blocks

| Tool | Block type | Required params |
|------|-----------|-----------------|
| `render_stat` | `stat` | `label`, `value` |
| `render_kv` | `kv` | `rows` (array of `[key, value]`) |
| `render_list` | `list` | `items` (string array) |
| `render_chart` | `chart` | `bars` (array of `[label, number]`) |
| `render_alert` | `alert` | `title` |
| `render_code` | `code` | `content` |
| `render_text` | `text` | `content` |
| `render_actions` | `actions` | `buttons` (array of `{ label, primary? }`) |
| `render_tags` | `tags` | `tags` (array of `{ text, active? }`) |

#### Rich widgets

| Tool | Block type | Required params |
|------|-----------|-----------------|
| `render_table` | `data-table` | `rows` |
| `render_timeline` | `timeline` | `events` (array of `{ title, date?, status? }`) |
| `render_profile` | `profile` | `name` |
| `render_trombinoscope` | `trombinoscope` | `people` (array of `{ name, subtitle?, badge? }`) |
| `render_json` | `json-viewer` | `data` (any JSON) |
| `render_hemicycle` | `hemicycle` | `groups` (array of `{ id, label, seats, color }`) |
| `render_chart_rich` | `chart-rich` | `data` (array of `{ values, label?, color? }`) |
| `render_cards` | `cards` | `cards` (array of `{ title, description? }`) |
| `render_sankey` | `sankey` | `nodes`, `links` |
| `render_log` | `log` | `entries` (array of `{ message, level?, timestamp? }`) |
| `render_gallery` | `gallery` | `images` (array of `{ src, alt?, caption? }`) |
| `render_carousel` | `carousel` | `slides` |
| `render_d3` | `d3` | `preset`, `data` |

#### Canvas actions

| Tool | Description |
|------|-------------|
| `clear_canvas` | Clears all blocks from the canvas |

### Checking and executing UI tools

```ts
if (isUITool('render_stat')) {
  const result = executeUITool('render_stat', { label: 'Users', value: '42' }, {
    onBlock: (type, data) => canvas.addBlock(type, data),
  });
  // result: "Rendered stat block"
}
```

## Unified `component()` tool

In addition to the individual `render_*` tools, the agent package provides a single unified `component()` tool that exposes **56 components** (31 renderable, 25 non-renderable) through a consistent interface.

This approach was inspired by [Emmanuel Raviart](https://www.tricoteuses.fr/mcp), creator of the Moulineuse MCP server, who suggested consolidating the tool surface into a single discoverable entry point.

```ts
import { COMPONENT_TOOL, executeComponent, componentRegistry } from '@webmcp-auto-ui/agent';
```

### Three modes

| Mode | Call | Returns |
|------|------|---------|
| **List all** | `component("help")` | Array of all 56 components with name, description, and `renderable` flag |
| **Inspect one** | `component("help", "stat-card")` | Schema, description, and renderability of a single component |
| **Render** | `component("stat-card", { label: "Revenue", value: "
  <script>
42K" })` | Renders the component (renderable ones only) |

### Component categories

- **Renderable (31)** -- all `render_*` block types plus canvas actions (`clear`, `update`, `move`, `resize`, `style`). These can be rendered through the agent tool pipeline via `executeComponent`.
- **Non-renderable (25)** -- primitives, base UI components, layouts, agent UI widgets, and theme provider. These are Svelte components available for direct import from `@webmcp-auto-ui/ui`. Calling render on them returns their schema and a usage hint.

Component names use dashes (e.g., `stat-card`). The original `render_*` names are also accepted for backward compatibility.

### Coexistence with `render_*` tools

Both approaches work simultaneously. The individual `render_*` tools remain available and fully functional. The `component()` tool is an additional entry point that provides discoverability (via `help` mode) and a uniform interface.

### Custom components

The `componentRegistry` is a mutable `Map<string, ComponentEntry>`. Apps can register additional components at runtime:

```ts
import { componentRegistry, type ComponentEntry } from '@webmcp-auto-ui/agent';

componentRegistry.set('my-widget', {
  name: 'my-widget',
  toolName: 'my-widget',
  description: 'Custom widget for my app.',
  inputSchema: { type: 'object', properties: { title: { type: 'string' } } },
  renderable: false,
});
```

For the full list of all 56 components and their schemas, see [composing.md](../agents/composing.md#unified-component-tool).

## Workflow

The standard agent workflow:

1. User sends a message
2. `buildSystemPrompt` lists available DATA tools (from MCP) and UI tools
3. `runAgentLoop` sends the message + tools to the LLM
4. LLM calls a DATA tool (e.g., `query_sql`) -> forwarded to MCP server via `McpClient`
5. LLM receives data, calls a UI tool (e.g., `render_chart`) -> executed locally via callbacks
6. Block appears on the canvas via `onBlock` callback
7. Loop continues until LLM sends `end_turn`

# Deploy to Production

## Quick deploy (recommended)

```bash
./scripts/deploy.sh                # deploy all apps
./scripts/deploy.sh flex           # deploy one app
./scripts/deploy.sh home viewer    # deploy specific apps
```

The script handles everything: builds packages, **builds apps**, cleans old
files on the server, copies to the correct location, **verifies sha256
integrity**, restarts services, and confirms.

**Always use this script. Never deploy manually with scp.**

---

## Server architecture

```
/opt/webmcp-demos/
  home/              # static — nginx serves directly
  todo/              # static — nginx serves directly
  showcase/          # static — nginx serves directly
  flex/              # Node — systemd runs: node index.js
  viewer/build/      # Node — systemd runs: node build/index.js
```

### CRITICAL: Deploy paths are NOT the same for all Node apps

| App | systemd ExecStart | Deploy destination | Why |
|-----|-------------------|--------------------|-----|
| **flex** | `node index.js` | `/opt/webmcp-demos/flex/` (root) | ExecStart has no `build/` prefix |
| **viewer** | `node build/index.js` | `/opt/webmcp-demos/viewer/build/` | ExecStart includes `build/` |
| home | static (nginx) | `/opt/webmcp-demos/home/` | — |
| todo | static (nginx) | `/opt/webmcp-demos/todo/` | — |
| showcase | static (nginx) | `/opt/webmcp-demos/showcase/` | — |

**If you deploy to the wrong path, the old code keeps running and your
changes appear to not take effect.** This is the #1 deployment pitfall.

### Why the paths differ

The systemd services were created at different times. Flex
uses `ExecStart=/usr/bin/node index.js` (working directory is the app root).
Viewer uses `ExecStart=/usr/bin/node build/index.js`. The deploy script
abstracts this difference — use the script.

---

## Manual deploy (if you must)

### Static apps (home, todo, showcase)

```bash
# Build with production base URL (REQUIRED for home)
PUBLIC_BASE_URL=https://demos.hyperskills.net npm -w apps/home run build

# Clean old assets and copy
ssh bot "rm -rf /opt/webmcp-demos/home/_app"
scp -r apps/home/build/* bot:/opt/webmcp-demos/home/
```

### Node apps — flex (root deploy)

```bash
npm -w apps/flex run build

# MUST clean old files first — stale chunks cause the old version to be served
ssh bot "cd /opt/webmcp-demos/flex && rm -f index.js handler.js env.js shims.js && rm -rf client server"
scp -r apps/flex/build/* bot:/opt/webmcp-demos/flex/
ssh bot "systemctl restart webmcp-flex"
```

### Node apps — viewer (build/ deploy)

```bash
npm -w apps/viewer run build

ssh bot "rm -rf /opt/webmcp-demos/viewer/build"
ssh bot "mkdir -p /opt/webmcp-demos/viewer/build"
scp -r apps/viewer/build/* bot:/opt/webmcp-demos/viewer/build/
ssh bot "systemctl restart webmcp-viewer"
```

---

## Common mistakes

### 1. Deploying to the wrong path

**Symptom**: You deploy, restart the service, but the old version still shows.

**Cause**: You copied files to `flex/build/` but the service runs
`node index.js` from `flex/` — it uses the old `index.js` at root.

**Fix**: Use `./scripts/deploy.sh` or check the ExecStart path in the
systemd service file.

### 2. Not cleaning old chunks

**Symptom**: New code is deployed but the browser shows a mix of old and
new behavior.

**Cause**: SvelteKit produces hashed chunk filenames. `scp` copies new
chunks but doesn't remove old ones. The browser may load cached old chunks.

**Fix**: Always delete old files before copying:
```bash
ssh bot "rm -rf /opt/webmcp-demos/flex/{client,server,index.js,handler.js}"
```

### 3. Forgetting PUBLIC_BASE_URL for home

**Symptom**: Home page links point to `localhost:5173`.

**Cause**: SvelteKit adapter-static bakes `PUBLIC_BASE_URL` at build time.

**Fix**: Build with `PUBLIC_BASE_URL=https://demos.hyperskills.net`.

### 4. Missing .env after deploy

**Symptom**: Service crashes with "ANTHROPIC_API_KEY is not defined".

**Cause**: The .env file was in the app root and got deleted during cleanup.

**Fix**: The deploy script preserves .env files. If deploying manually,
don't delete .env:
```bash
# DO NOT do: rm -rf /opt/webmcp-demos/flex/*
# DO this instead: rm specific files, keep .env
```

### 5. Using rsync instead of scp

**Never use rsync.** `rsync --delete` has previously wiped `.env` files
containing API keys from production. Use `scp -r` only.

### 6. Deploying without rebuilding the app (fixed in script)

**Symptom**: You fix a Svelte bug, deploy, the bug is still there. Services
show `active`. No error anywhere.

**Cause**: The old `deploy.sh` rebuilt packages (`packages/*/dist/`) but
copied the existing `apps/*/build/` without rebuilding it. Any change to
`apps/*/src/` was silently ignored.

**Fix applied**: `deploy.sh` now runs `npm run build` inside each app before
copying. The sha256 check then verifies the deployed file matches the local
build.

**How to detect manually**:
```bash
sha256sum apps/flex/build/index.js
ssh bot "sha256sum /opt/webmcp-demos/flex/index.js"
# These must match. If they differ, the wrong file was deployed.
```

See [contributing.md](../contributing.md) for the full debug checklist.

```bash
# All pages return 200
for p in / /flex/ /viewer/ /showcase/ /todo/; do
  echo "$(curl -s -o /dev/null -w '%{http_code}' -L https://demos.hyperskills.net$p) $p"
done

# Chat API works (Node apps)
curl -s https://demos.hyperskills.net/flex/api/chat \
  -X POST -H 'Content-Type: application/json' \
  -d '{"messages":[{"role":"user","content":"hi"}],"model":"claude-haiku-4-5-20251001","max_tokens":5}' \
  | head -c 50

# Services are active
ssh bot "systemctl is-active webmcp-flex webmcp-viewer"
```

## Environment

| Variable | Apps | Location on server |
|----------|------|--------------------|
| `ANTHROPIC_API_KEY` | flex, viewer | `/opt/webmcp-demos/{app}/.env` |
| `PUBLIC_BASE_URL` | home (build-time only) | Set in shell before `npm run build` |
| `PORT` | flex(3004), viewer(3002) | systemd `Environment=PORT=...` |

# Build a Themed Demo from Scratch

This tutorial walks through creating a complete themed demo using webmcp-auto-ui. We will build a "Nature Observatory" dashboard that displays wildlife sightings with a nature-inspired color palette.

By the end, you will have a working SvelteKit page with themed components, wired together with the FONC event bus, exportable as a shareable HyperSkill URL.

## Prerequisites

- The monorepo is cloned and `npm install` has been run
- Packages are built (see the [Deploy tutorial](./deploy.md), Step 1)
- Basic familiarity with Svelte 5 and JSON

## Step 1: Create the theme

Create a file `theme.json` at the root of your app (for example, `apps/showcase/theme.json`):

```json
{
  "name": "nature-observatory",
  "tokens": {
    "color-bg":       "#f4f1eb",
    "color-surface":  "#ffffff",
    "color-surface2": "#ede8df",
    "color-border":   "rgba(101, 78, 50, 0.10)",
    "color-border2":  "rgba(101, 78, 50, 0.20)",
    "color-accent":   "#2d6a4f",
    "color-accent2":  "#bc4749",
    "color-amber":    "#b07d1e",
    "color-teal":     "#40916c",
    "color-text1":    "#2b2118",
    "color-text2":    "#7a6e5d"
  },
  "dark": {
    "color-bg":       "#1a1612",
    "color-surface":  "#252019",
    "color-surface2": "#302a21",
    "color-border":   "rgba(210, 190, 160, 0.10)",
    "color-border2":  "rgba(210, 190, 160, 0.20)",
    "color-accent":   "#52b788",
    "color-text1":    "#ede8df",
    "color-text2":    "#a89b88"
  }
}
```

This theme uses earthy greens and browns:
- **accent** (`#2d6a4f`): deep forest green for primary actions and links
- **accent2** (`#bc4749`): warm red for alerts (endangered species warnings)
- **teal** (`#40916c`): lighter green for success states
- **amber** (`#b07d1e`): golden brown for warnings

      />

## Step 5: Wire the FONC bus between components

FONC (Functions On Named Channels) is the event system built into webmcp-auto-ui. Every block rendered by `BlockRenderer` auto-registers WebMCP tools when `navigator.modelContext` is available. But you can also wire blocks together manually for inter-component communication.

### How it works

Each block rendered via `BlockRenderer` exposes three WebMCP tools:
- `block_<id>_get` -- read the block's current data
- `block_<id>_update` -- update the block's data
- `block_<id>_remove` -- remove the block

To make blocks react to each other, give them explicit IDs and use the update tools:

```svelte
<script lang="ts">
  import { BlockRenderer } from '@webmcp-auto-ui/ui';
  import { onMount } from 'svelte';

  let selectedSpecies = $state('all');
  let tableData = $state(skillJson.blocks[4].data);
  let allRows = skillJson.blocks[4].data.rows;

  function filterBySpecies(species: string) {
    selectedSpecies = species;
    if (species === 'all') {
      tableData = { ...skillJson.blocks[4].data, rows: allRows };
    } else {
      tableData = {
        ...skillJson.blocks[4].data,
        rows: allRows.filter(r => r.species === species)
      };
    }
  }
<\/script>

<!-- Tags block for filtering -->
<BlockRenderer
  type="tags"
  data={{
    label: "Filter by species",
    tags: [
      { text: "All", active: selectedSpecies === 'all' },
      { text: "Red-tailed Hawk", active: selectedSpecies === 'Red-tailed Hawk' },
      { text: "River Otter", active: selectedSpecies === 'River Otter' },
      { text: "Bald Eagle", active: selectedSpecies === 'Bald Eagle' }
    ]
  }}
  on:tagClick={(e) => filterBySpecies(e.detail.text === 'All' ? 'all' : e.detail.text)}
/>

<!-- Filtered data table -->
<BlockRenderer type="data-table" data={tableData} />
```

This pattern lets you build interactive dashboards where selecting a tag filters the table, clicking a map marker highlights a row, or toggling a stat drills down into the chart.

## Step 6: Export as a HyperSkill URL

Once your demo looks right, export it as a portable HyperSkill URL that anyone can open.

The SDK re-exports `encode` and `decode` from the [`hyperskills`](https://www.npmjs.com/package/hyperskills) NPM package:

```typescript
import { encode, decode } from '@webmcp-auto-ui/sdk';

// Encode a skill into a shareable URL
const url = await encode('https://app.example.com/viewer', JSON.stringify(skillData));

// Decode from a URL
const { content } = await decode(url);
const skill = JSON.parse(content);
```

### Using the SDK

```typescript
import { encode } from '@webmcp-auto-ui/sdk';

const skill = {
  version: '1.0',
  name: 'nature-observatory',
  description: 'Wildlife sighting dashboard for North Ridge Reserve',
  theme: themeJson.tokens,
  blocks: skillJson.blocks
};

const shareUrl = await encode('https://demos.hyperskills.net/viewer', JSON.stringify(skill));

console.log(shareUrl);
// Copy this URL -- anyone who opens it will see the full themed dashboard
```

### Using the Composer UI

1. Open the Composer at `http://localhost:5174`
2. Import the skill JSON (paste or drag-and-drop)
3. Click "Export" and copy the generated URL
4. The URL contains the theme + all blocks, base64-encoded (gzip-compressed if > 6 KB)

### How the URL works

```
https://demos.hyperskills.net/viewer?hs=eyJ2ZXJzaW9uIjoiMS4wI...

                                        ^^^^^^^^^^^^^^^^^^^^^^^^^
                                        base64(JSON.stringify(skill))
                                        or gz.base64(gzip(JSON.stringify(skill)))
                                        if the payload exceeds 6 KB
```

When someone opens the URL:
1. The Viewer reads the `hs` query parameter
2. Decodes base64 (decompresses gzip if `gz.` prefix)
3. Parses the JSON skill object
4. ThemeProvider applies the embedded `theme` tokens
5. BlockRenderer renders each block in sequence

# Theming Guide

This guide explains how to define and apply a custom design system to any
webmcp-auto-ui project. No Svelte knowledge is required — you write a single
JSON file and the entire UI adapts.

---

## How it works

```
                          theme.json
                      (you write this)
                              |
              +---------------+---------------+
              |               |               |
              v               v               v
        ThemeProvider     Tailwind CSS      Components
        (runtime)        (build-time)      (auto-adapt)
              |               |               |
              v               v               v
        Sets CSS vars    Generates        Read vars via
        on :root         utility classes  bg-surface, etc.
              |               |               |
              +-------+-------+               |
                      |                       |
                      v                       v
               Every element on the page picks up
               the same tokens — one change, everything updates
```

There is **one source of truth**: CSS custom properties on `:root`. The
`theme.json` file defines what those properties should be. The ThemeProvider
injects them at runtime. Tailwind reads them at build time. Every component
— whether it's a simple StatBlock or a complex Hemicycle — consumes them
automatically.

---

## Quick start

### 1. Create `theme.json` at your project root

```json
{
  "name": "my-dashboard",
  "tokens": {
    "color-bg":       "#fafafa",
    "color-surface":  "#ffffff",
    "color-surface2": "#f5f5f5",
    "color-border":   "rgba(0,0,0,0.06)",
    "color-border2":  "rgba(0,0,0,0.12)",
    "color-accent":   "#6c5ce7",
    "color-accent2":  "#e84855",
    "color-amber":    "#d48806",
    "color-teal":     "#0d9488",
    "color-text1":    "#1a1a2e",
    "color-text2":    "#8c8ca0"
  }
}
```

### 2. Pass it to ThemeProvider in your layout

```svelte
<script>
  import { ThemeProvider } from '@webmcp-auto-ui/ui';
  import themeJson from '../theme.json';

  let { children } = $props();
<\/script>

<ThemeProvider defaultMode="light" overrides={themeJson.tokens}>
  {@render children()}
</ThemeProvider>
```

### 3. Done

Every component in the page now uses your colors, automatically.

---

## Token reference

### Core tokens

Every token maps to a CSS custom property `--{token-name}` and a Tailwind
utility class.

```
Token name        CSS variable          Tailwind class     Used for
─────────────────────────────────────────────────────────────────────
color-bg          --color-bg            bg-bg              Page background
color-surface     --color-surface       bg-surface         Card/panel bg
color-surface2    --color-surface2      bg-surface2        Nested surfaces,
                                                           table headers,
                                                           hover states
color-border      --color-border        border-border      Subtle borders
color-border2     --color-border2       border-border2     Stronger borders,
                                                           active states
color-accent      --color-accent        text-accent        Primary accent,
                                        bg-accent          links, buttons
color-accent2     --color-accent2       text-accent2       Destructive/error
                                        bg-accent2         accent
color-amber       --color-amber         text-amber         Warnings, trends
color-teal        --color-teal          text-teal          Success, positive
                                                           trends
color-text1       --color-text1         text-text1         Primary text
color-text2       --color-text2         text-text2         Secondary/muted
                                                           text
```

### How tokens flow through the UI

```
    theme.json                 CSS                    Component
    ──────────                 ───                    ─────────

    "color-accent":    -->   --color-accent    -->   class="text-accent"
    "#6c5ce7"                on :root                 |
                                                      v
                                                   color: var(--color-accent)
                                                      |
                                                      v
                                                   rendered as #6c5ce7
```

When you change the token value, **every component** using that token
updates — buttons, charts, links, stat cards, borders, everything.

---

## Dark mode

Add a `dark` key to override tokens for dark mode:

```json
{
  "name": "my-dashboard",
  "tokens": {
    "color-bg":      "#fafafa",
    "color-surface": "#ffffff",
    "color-text1":   "#1a1a2e"
  },
  "dark": {
    "color-bg":      "#0e0e11",
    "color-surface": "#16161a",
    "color-text1":   "#e8e8f0"
  }
}
```

Only override what changes — tokens not listed in `dark` keep their light
values. The toggle is handled by ThemeProvider:

```
    User clicks toggle
           |
           v
    ThemeProvider.toggle()
           |
           v
    Swaps token set (light <-> dark)
           |
           v
    Updates CSS variables on :root
           |
           v
    Every component re-renders with new colors
    (no page reload, instant)
```

The user's preference is persisted in `localStorage` and restored on next visit.

---

## Designing a theme

### Anatomy of a well-designed token set

```
    ┌─────────────────────────────────────────────┐
    │ Page          bg: color-bg                   │
    │                                              │
    │   ┌──────────────────────────────────────┐   │
    │   │ Card       bg: color-surface          │   │
    │   │            border: color-border       │   │
    │   │                                      │   │
    │   │   Title    color: color-text1        │   │
    │   │   Body     color: color-text2        │   │
    │   │                                      │   │
    │   │   ┌──────────────────────────────┐   │   │
    │   │   │ Nested    bg: color-surface2 │   │   │
    │   │   │           border: color-border│   │   │
    │   │   └──────────────────────────────┘   │   │
    │   │                                      │   │
    │   │   [ Button ]  bg: color-accent       │   │
    │   │               text: white            │   │
    │   │                                      │   │
    │   │   Link        color: color-accent    │   │
    │   │   Warning     color: color-amber     │   │
    │   │   Success     color: color-teal      │   │
    │   │   Error       color: color-accent2   │   │
    │   └──────────────────────────────────────┘   │
    └─────────────────────────────────────────────┘
```

### Contrast rules

For readability, maintain sufficient contrast between:

```
    Background layer        Text on it         Minimum contrast
    ──────────────          ──────────         ────────────────
    color-bg                color-text1        7:1 (WCAG AAA)
    color-surface           color-text1        7:1
    color-surface           color-text2        4.5:1 (WCAG AA)
    color-accent (bg)       white text         4.5:1
    color-accent2 (bg)      white text         4.5:1
```

Use a contrast checker (e.g. webaim.org/resources/contrastchecker) to verify.

### Color relationships

```
    Semantic meaning        Token              Typical values
    ────────────────        ─────              ──────────────

    Light mode:
    ┌─ background ───────── color-bg           #fafafa  (near-white)
    ├─ card surface ──────── color-surface      #ffffff  (white)
    ├─ nested/hover ──────── color-surface2     #f0f0f6  (very light gray)
    ├─ subtle line ───────── color-border       rgba(0,0,0,0.06)
    ├─ visible line ──────── color-border2      rgba(0,0,0,0.12)
    ├─ primary action ────── color-accent       #6c5ce7  (vivid)
    ├─ danger/error ──────── color-accent2      #e84855  (warm red)
    ├─ warning ───────────── color-amber        #d48806  (orange)
    ├─ success ───────────── color-teal         #0d9488  (green)
    ├─ body text ─────────── color-text1        #1a1a2e  (near-black)
    └─ caption/label ─────── color-text2        #64648c  (mid-gray)

    Dark mode (invert the luminance, keep the hue):
    ┌─ background ───────── color-bg           #0e0e11  (near-black)
    ├─ card surface ──────── color-surface      #16161a  (dark gray)
    ├─ nested/hover ──────── color-surface2     #1e1e24  (slightly lighter)
    ├─ subtle line ───────── color-border       rgba(255,255,255,0.07)
    ├─ visible line ──────── color-border2      rgba(255,255,255,0.14)
    ├─ primary action ────── color-accent       #7c6dfa  (brighter for dark bg)
    ├─ body text ─────────── color-text1        #e8e8f0  (near-white)
    └─ caption/label ─────── color-text2        #a0a0b8  (light gray)
```

## Example: Language dashboard theme

To build a dashboard like a language-learning stats page with clean white
cards, subtle shadows, and colorful charts:

```json
{
  "name": "language-dashboard",
  "tokens": {
    "color-bg":       "#f7f7f7",
    "color-surface":  "#ffffff",
    "color-surface2": "#f0f0f0",
    "color-border":   "rgba(0,0,0,0.05)",
    "color-border2":  "rgba(0,0,0,0.10)",
    "color-accent":   "#58cc02",
    "color-accent2":  "#ff4b4b",
    "color-amber":    "#ffc800",
    "color-teal":     "#49c0b6",
    "color-text1":    "#3c3c3c",
    "color-text2":    "#afafaf"
  },
  "dark": {
    "color-bg":       "#131f24",
    "color-surface":  "#1a2b32",
    "color-surface2": "#223a44",
    "color-border":   "rgba(255,255,255,0.08)",
    "color-border2":  "rgba(255,255,255,0.15)",

    "color-text2":    "#8ea0a4"

```

This produces:

```
    Light mode                          Dark mode

    ┌─────────────────────┐             ┌─────────────────────┐
    │ #f7f7f7 background  │             │ #131f24 background  │
    │                     │             │                     │
    │  ┌───────────────┐  │             │  ┌───────────────┐  │
    │  │ #fff card     │  │             │  │ #1a2b32 card  │  │
    │  │               │  │             │  │               │  │
    │  │ #3c3c3c text  │  │             │  │ #e5e5e5 text  │  │
    │  │ #afafaf label │  │             │  │ #8ea0a4 label │  │
    │  │               │  │             │  │               │  │
    │  │ [#58cc02 btn] │  │             │  │ [#58cc02 btn] │  │
    │  └───────────────┘  │             │  └───────────────┘  │
    └─────────────────────┘             └─────────────────────┘
```

## Embedding a theme in a HyperSkill

When you export a skill (recipe) from the Composer, the theme is embedded
in the `?hs=` URL:

```json
{
  "version": "1.0",
  "name": "my-skill",
  "theme": {
    "color-accent": "#58cc02",
    "color-bg": "#f7f7f7"
  },
  "blocks": [...]
}
```

When someone opens the URL, the ThemeProvider applies the embedded theme
overrides. This means **every shared skill carries its own look and feel**.

```
    Designer creates skill         User opens ?hs= URL
    with custom theme              
         |                              |
         v                              v
    Composer encodes               Viewer/Composer decodes
    theme + blocks                 theme + blocks
    into ?hs= param                    |
         |                              v
         v                         ThemeProvider applies
    Shareable URL                  embedded theme overrides
                                       |
                                       v
                                   Components render with
                                   the designer's colors
```

---

## Which components use which tokens

Every component in the library reads tokens from CSS variables. Here is the
mapping:

```
Component           bg          border       text         accent
────────────────    ──────────  ───────────  ───────────  ──────────
Card                surface     border       —            —
Panel               surface     border       text2 (hdr)  —
StatBlock           surface     border       text1/text2  teal/accent2
KVBlock             surface     border       text1/text2  —
ChartBlock          surface     border       text2        accent
Chart (rich)        surface     border       text1/text2  palette[0]
DataTable           surface     border       text1/text2  accent (sort)
ProfileCard         surface     border       text1/text2  accent (stats)
Hemicycle           surface     border       text1        per-group
Timeline            surface     border       text1/text2  teal/amber
Cards               surface     border       text1/text2  —
Gallery             surface     border       —            —
Carousel            surface     border       text1/text2  accent (dots)
StatCard            surface     border       text1        teal/accent2
AlertBlock          surface     accent2/amber text1       level-based
CodeBlock           bg          border       teal         —
TagsBlock           surface     border/teal  text2/teal   teal (active)
ActionsBlock        surface     border       text2        accent (primary)
LogViewer           bg          border       text2        teal/amber/accent2
JsonViewer          bg          border       accent       —
MapView             surface     border       text2        accent
Sankey              surface     border       text1        palette
GridData            surface     border       text1/text2  surface2 (highlight)
Trombinoscope       surface     border       text1/text2  per-person
Pane (WM)           surface     border       text1        accent
BlockRenderer       —           —            text2        — (fallback)
```

**Rule of thumb**: change `color-accent` to rebrand everything. Change
`color-bg` and `color-surface` to shift the overall lightness. Change
`color-text1` to adjust readability.

---

## Advanced: component-level overrides

Beyond global tokens, individual components accept style overrides through
their data/spec props. For example, a Chart's color palette:

```json
{
  "type": "chart-rich",
  "data": {
    "title": "Revenue",
    "type": "bar",
    "labels": ["Q1", "Q2", "Q3", "Q4"],
    "data": [
      { "label": "2025", "values": [120, 145, 160, 180], "color": "#58cc02" },
      { "label": "2024", "values": [100, 110, 130, 150], "color": "#afafaf" }
    ]
  }
}
```

The per-dataset `color` overrides the global palette for that specific chart
without affecting other components.

---

## Fonts

Fonts are loaded via Google Fonts in the layout. To change fonts:

1. Update the `<link>` tag in your `+layout.svelte`:

```html
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet" />
```

2. Update your Tailwind config or the `body` rule in `app.css`:

```css
body { font-family: 'Inter', system-ui, sans-serif; }
```

The Tailwind preset defines `font-sans` and `font-mono` families. All
components use `font-sans` for UI text and `font-mono` for code/data.

---

## Checklist for a new theme

```
[ ] color-bg and color-surface have enough contrast (bg is darker/lighter)
[ ] color-text1 on color-surface passes WCAG AA (4.5:1 ratio)
[ ] color-text2 on color-surface passes WCAG AA (4.5:1 ratio)
[ ] color-accent on white/dark background passes WCAG AA
[ ] color-accent and color-accent2 are visually distinct
[ ] color-teal reads as "positive/success"
[ ] color-amber reads as "warning/attention"
[ ] color-accent2 reads as "error/danger"
[ ] Dark mode overrides tested (if provided)
[ ] Fonts loaded and applied
```

# Theming -- Agent Guide

> This document is designed to be injected into an AI agent's context. It contains everything needed to create a theme.json for webmcp-auto-ui.

## What is theme.json?

A `theme.json` is a JSON object that defines color tokens for a webmcp-auto-ui interface. It is consumed by the `ThemeProvider` Svelte component, which injects the tokens as CSS custom properties (`--color-*`) on the document root element.

The ThemeProvider applies tokens in three layers (highest priority wins):
1. **Built-in tokens** for the current mode (light/dark)
2. **theme.json `tokens`** (light base) + `dark` overrides when in dark mode
3. **Inline `overrides`** prop (runtime overrides)

When you provide a `theme.json`, its `tokens` are applied on top of the built-in defaults. If the user switches to dark mode, the `dark` object is merged on top.

## Format

```json
{
  "name": "my-theme",
  "tokens": {
    "color-bg": "#ffffff",
    "color-surface": "#f5f5f5",
    "color-accent": "#3b82f6"
  },
  "dark": {
    "color-bg": "#0a0a0f",
    "color-surface": "#141419"
  }
}
```

- `name` (optional): human-readable theme name
- `tokens` (required): base tokens applied in both light and dark mode
- `dark` (optional): overrides applied only when dark mode is active

## The 11 Tokens

| Token | Role | Typical usage |
|-------|------|---------------|
| `color-bg` | Page background | `<body>` or root container background |
| `color-surface` | Card/panel background | Primary content areas, cards, modals |
| `color-surface2` | Secondary surface | Nested panels, table headers, hover states |
| `color-border` | Primary border | Card outlines, dividers (subtle) |
| `color-border2` | Secondary border | Stronger borders, active states, separators |
| `color-accent` | Primary accent | Buttons, links, active indicators, chart bars |
| `color-accent2` | Secondary accent / danger | Error states, destructive actions, secondary highlights |
| `color-amber` | Amber / warning | Warning alerts, caution badges, warm highlights |
| `color-teal` | Teal / success | Success states, positive trends, confirmation |
| `color-text1` | Primary text | Headings, body text, values |
| `color-text2` | Secondary text | Labels, captions, muted descriptions |

All tokens are consumed as CSS variables: `var(--color-bg)`, `var(--color-accent)`, etc.

## Workflow

When a designer says "I want a corporate blue theme":

1. Pick a primary blue for `color-accent` (e.g. `#2563eb`)
2. Set `color-bg` to a clean white/off-white
3. Set `color-surface` to white, `color-surface2` slightly gray
4. Set borders using low-opacity black: `rgba(0,0,0,0.08)` and `rgba(0,0,0,0.14)`
5. Pick `color-accent2` as a contrasting warm color (red/coral)
6. Keep `color-amber` warm, `color-teal` green/teal
7. Set `color-text1` dark, `color-text2` medium gray
8. Add a `dark` section: invert background to dark, surface to dark gray, adjust text to light, keep accent colors vibrant

## Example Themes

### Corporate (blue/white)

```json
{
  "name": "corporate",
  "tokens": {
    "color-bg": "#f8fafc",
    "color-surface": "#ffffff",
    "color-surface2": "#f1f5f9",
    "color-border": "rgba(0,0,0,0.08)",
    "color-border2": "rgba(0,0,0,0.16)",
    "color-accent": "#2563eb",
    "color-accent2": "#dc2626",
    "color-amber": "#d97706",
    "color-teal": "#0d9488",
    "color-text1": "#0f172a",
    "color-text2": "#64748b"
  },
  "dark": {
    "color-bg": "#0c1222",
    "color-surface": "#131c31",
    "color-surface2": "#1a2540",
    "color-border": "rgba(255,255,255,0.07)",
    "color-border2": "rgba(255,255,255,0.14)",
    "color-accent": "#3b82f6",
    "color-accent2": "#ef4444",
    "color-text1": "#e2e8f0",
    "color-text2": "#94a3b8"
  }
}
```

### Nature (green/beige)

```json
{
  "name": "nature",
  "tokens": {
    "color-bg": "#faf8f1",
    "color-surface": "#fffdf7",
    "color-surface2": "#f0ece2",
    "color-border": "rgba(90,70,40,0.1)",

  }

### Neon (purple/black)

```json
{
  "name": "neon",
  "tokens": {
    "color-bg": "#0a0a12",
    "color-surface": "#12121e",
    "color-surface2": "#1a1a2e",
    "color-border": "rgba(255,255,255,0.06)",
    "color-border2": "rgba(255,255,255,0.12)",

    "color-amber": "#fbbf24",
    "color-teal": "#22d3ee",
    "color-text1": "#f0e6ff",
    "color-text2": "#9d8ab8"
  },
  "dark": {
    "color-bg": "#050508",
    "color-surface": "#0a0a14",
    "color-surface2": "#111120",
    "color-accent": "#c084fc",
    "color-accent2": "#fb7185",
    "color-text1": "#f5f0ff",
    "color-text2": "#a896c4"
  }
}
```

## Dark Mode

Add a `dark` key to your theme.json. It only needs to contain the tokens you want to override -- tokens not listed inherit from `tokens`.

Typically you override:
- `color-bg`, `color-surface`, `color-surface2` (dark backgrounds)
- `color-border`, `color-border2` (white-based opacity instead of black-based)
- `color-text1`, `color-text2` (light text on dark backgrounds)

Accent colors often stay the same or shift slightly brighter for dark mode.

```json
{
  "tokens": { "color-accent": "#6c5ce7" },
  "dark": { "color-accent": "#7c6dfa" }
}
```

## Embedding a Theme in a Skill

When creating a skill/recipe, include the theme tokens in the `theme` field:

```json
{
  "name": "my-dashboard",
  "blocks": [...],
  "theme": {
    "color-accent": "#2563eb",
    "color-bg": "#f8fafc"
  }
}
```

The `theme` field in a skill uses the flat token map (same as `tokens`), not the full `theme.json` structure.

## Constraints

- **WCAG contrast**: `color-text1` on `color-bg` must have a contrast ratio of at least 4.5:1. `color-text2` on `color-surface` should be at least 3:1.
- **All 11 tokens must be defined** in the `tokens` section. Missing tokens fall back to built-in defaults, which may clash with your palette.
- `color-text2` must be readable on both `color-bg` and `color-surface`.
- `color-accent` must be visible on `color-surface` (buttons, links).
- Borders (`color-border`, `color-border2`) should be subtle -- use rgba values.

## Common Mistakes

| Mistake | Consequence | Fix |
|---------|-------------|-----|
| No `dark` section | Dark mode falls back to built-in dark tokens, clashing with your custom accent colors | Always provide a `dark` section |
| `color-border` and `color-border2` too similar | Borders lose their visual hierarchy | Use opacity 0.08 for border and 0.14+ for border2 |
| `color-text2` too light on light theme | Labels and captions become unreadable | Test text2 on both bg and surface backgrounds |
| Using hex for borders | No transparency, harsh lines on colored surfaces | Use rgba values for borders |
| `color-accent` too dark | Buttons and links invisible on dark surfaces | Ensure accent has enough brightness for dark mode |
| Forgetting `color-amber`/`color-teal` | Alerts and trend indicators use wrong colors | Always define all semantic colors |

# Composing UIs -- Agent Guide

> This document is designed to be injected into an AI agent's context. It contains everything needed to compose a UI from blocks using webmcp-auto-ui.

## What is a Composed UI?

A composed UI is a collection of **blocks** arranged in sequence. Each block is a set of instructions for specific tools, expressed as a `type` and a `data` object. The `BlockRenderer` component renders each block visually by dispatching it to the appropriate widget based on its type.

## The 24 Block Types

### Simple Blocks (9)

| Type | Description | Minimal data |
|------|-------------|-------------|
| `stat` | Single metric with optional trend | `{"label":"Revenue","value":"
  <script>
42K","trend":"+12%","trendDir":"up"}` |
| `kv` | Key-value pair list | `{"title":"Info","rows":[["Status","Active"],["Uptime","99.9%"]]}` |
| `list` | Bulleted text list | `{"title":"Tasks","items":["Deploy API","Run tests"]}` |
| `chart` | Simple bar chart | `{"title":"Sales","bars":[["Q1",80],["Q2",120],["Q3",95]]}` |
| `alert` | Alert banner with level | `{"title":"Warning","message":"Disk usage at 90%","level":"warn"}` |
| `code` | Syntax-highlighted code block | `{"lang":"json","content":"{\"key\": \"value\"}"}` |
| `text` | Plain text paragraph | `{"content":"This is a description paragraph."}` |
| `actions` | Row of action buttons | `{"buttons":[{"label":"Approve","primary":true},{"label":"Reject"}]}` |
| `tags` | Tag/chip collection | `{"label":"Tags","tags":[{"text":"prod","active":true},{"text":"v2.1"}]}` |

### Rich Blocks (15)

| Type | Description | Minimal data |
|------|-------------|-------------|
| `stat-card` | Stat with variant color and trend | `{"label":"Users","value":8204,"variant":"success","trend":"up","delta":"+3.2%"}` |
| `data-table` | Sortable data table | `{"title":"Users","columns":[{"key":"name","label":"Name"},{"key":"email","label":"Email"}],"rows":[{"name":"Alice","email":"a@b.com"}]}` |
| `timeline` | Vertical timeline | `{"title":"History","events":[{"date":"2024-01","title":"Launch","status":"done"},{"date":"2024-03","title":"v2.0","status":"active"}]}` |
| `profile` | User profile card | `{"name":"Jane Doe","subtitle":"Engineer","fields":[{"label":"Email","value":"j@co.com"}],"stats":[{"label":"Projects","value":"12"}]}` |
| `trombinoscope` | People grid with avatars | `{"title":"Team","people":[{"name":"Alice","subtitle":"Lead"},{"name":"Bob","subtitle":"Dev"}],"columns":3}` |
| `json-viewer` | Interactive JSON tree | `{"title":"Response","data":{"status":"ok","items":[1,2,3]}}` |
| `hemicycle` | Parliamentary hemicycle chart | `{"title":"Assembly","groups":[{"id":"a","label":"Party A","seats":120,"color":"#3b82f6"},{"id":"b","label":"Party B","seats":80,"color":"#ef4444"}]}` |
| `chart-rich` | Multi-type chart (bar/line/area/pie/donut) | `{"title":"Revenue","type":"line","labels":["Jan","Feb","Mar"],"data":[{"label":"2024","values":[10,20,30]}]}` |
| `cards` | Card grid with images | `{"title":"Products","cards":[{"title":"Widget","description":"A useful widget","tags":["new"]}]}` |
| `grid-data` | Spreadsheet-like grid | `{"title":"Matrix","columns":[{"key":"a","label":"A"},{"key":"b","label":"B"}],"rows":[[1,2],[3,4]]}` |
| `sankey` | Flow diagram (sankey-style) | `{"title":"Traffic","nodes":[{"id":"a","label":"Google"},{"id":"b","label":"Site"}],"links":[{"source":"a","target":"b","value":500}]}` |
| `map` | Interactive Leaflet map | `{"title":"Offices","center":{"lat":48.85,"lng":2.35},"zoom":5,"markers":[{"lat":48.85,"lng":2.35,"label":"Paris"}]}` |
| `log` | Log viewer with levels | `{"title":"Logs","entries":[{"timestamp":"10:30:01","level":"info","message":"Server started"},{"level":"error","message":"Connection refused"}]}` |
| `gallery` | Image gallery with lightbox | `{"title":"Photos","images":[{"src":"https://picsum.photos/400/300","caption":"Sample"}],"columns":3}` |
| `carousel` | Slide carousel with autoplay | `{"title":"Slides","slides":[{"src":"https://picsum.photos/800/400","title":"Slide 1"}],"autoPlay":true,"interval":4000}` |

## Composing a Skill (Recipe)

A skill is a JSON object combining blocks with metadata:

```json
{
  "name": "kpi-dashboard",
  "description": "Key metrics overview",
  "mcp": "https://mcp.example.com/mcp",

Fields:

- `description` (optional): human-readable description
- `mcp` (optional): MCP server URL
- `mcpName` (optional): display name for the MCP server
- `llm` (optional): preferred LLM model (`claude-haiku`, `claude-sonnet`, `gemma-e2b`, `auto`)
- `tags` (optional): array of string tags
- `theme` (optional): flat token overrides (`{"color-accent": "#2563eb"}`)
- `blocks` (required): array of `{ type, data }` objects

## HyperSkill URL Encoding

Skills can be encoded into a URL parameter `?hs=` for sharing:

- The skill is serialized as JSON
- If < 6KB: base64 encoded directly
- If >= 6KB: gzip compressed, then base64 encoded with `gz.` prefix

URL format: `https://domain.com/viewer?hs=<base64>` or `https://domain.com/flex?hs=<base64>`

To decode: read the `hs` query param, check for `gz.` prefix, decompress if needed, base64-decode, JSON.parse.

## Workflow: Building a Dashboard

When a designer says "I want a KPI dashboard":

1. Identify the key metrics -- use `stat` blocks (3-4 max at the top)
2. Add a chart for trends -- use `chart` (simple) or `chart-rich` (multi-series, pie, line)
3. Add a data table for details -- use `data-table` for tabular data
4. Add contextual info -- use `kv` for metadata pairs, `alert` for warnings
5. Wrap with a theme if branding matters

## Unified `component` tool

Instead of calling individual `render_*` tools, you can use the unified `component` tool:

- `component("help")` -- list all available components
- `component("help", "stat-card")` -- get the schema for a specific component
- `component("stat-card", { label: "Revenue", value: "
  <script>
42K" })` -- render a component

Both approaches (individual `render_*` tools and unified `component`) work simultaneously.

The `component` tool also exposes canvas actions under short names:

| Short name | Equivalent tool |
|------------|-----------------|
| `clear` | `clear_canvas` |
| `update` | `update_block` |
| `move` | `move_block` |
| `resize` | `resize_block` |
| `style` | `style_block` |

Component names use dashes instead of underscores (e.g. `stat-card` instead of `render_stat_card`). The original `render_*` names are also accepted for backward compatibility.

### All registered components

The `component("help")` response includes **all** components in the system, not just the renderable widgets. Each entry includes a `renderable` flag:

- **renderable: true** — can be rendered via the agent tool pipeline (all `render_*` tools + canvas actions)
- **renderable: false** — Svelte component available for direct usage via `@webmcp-auto-ui/ui`, but cannot be rendered through `component("name", {...})`. Calling render on these returns their schema and a usage hint instead.

## Constraints

- Block `type` must be one of the 24 valid types listed above.
- Block `data` must match the expected shape for that type (see the ui-widgets.md agent guide for full specs).
- Blocks are rendered in order, top to bottom.
- Keep skill size under ~6KB before gzip for HyperSkill URL encoding (browser URL length limits).
- `stat` blocks work best in groups of 2-4 for visual rhythm.
- `data-table` supports up to 200 displayed rows (overflow is indicated).

## Common Mistakes

| Mistake | Consequence | Fix |
|---------|-------------|-----|
| Using `chart` when you need multiple datasets | `chart` only supports single-series bars | Use `chart-rich` with `data` array for multi-series |
| Putting too many blocks (10+) in one skill | Overwhelming UI, slow rendering | Split into focused skills or use tabs |
| Missing `type` field on a block | BlockRenderer shows `[undefined]` placeholder | Always include `type` on every block |
| Wrong data shape for block type | Widget renders empty or errors silently | Check the expected interface for each type |
| Using `chart-rich` type as `chart` | Renders as simple bar chart, ignoring pie/line config | Use type `chart-rich` for Chart.svelte, `chart` for ChartBlock.svelte |

## How BlockRenderer Works

The `BlockRenderer` component receives `{ type, data }` and dispatches to the correct widget:
- Simple blocks receive data as the `data` prop

  images?: GalleryImage[];
  columns?: number;       // default: 3
  gap?: string;
  emptyMessage?: string;
}
```

```json
{ "type": "gallery", "data": { "title": "Project Screenshots", "columns": 3, "images": [{ "src": "https://picsum.photos/400/300?1", "caption": "Dashboard" }, { "src": "https://picsum.photos/400/300?2", "caption": "Settings" }, { "src": "https://picsum.photos/400/300?3", "caption": "Profile" }] } }
```

Use when: displaying image collections. Supports keyboard navigation in lightbox (Escape, Arrow keys).

### carousel -- Slide Carousel

Horizontal slider with autoplay and touch/swipe support.

```typescript
interface CarouselSlide {
  src?: string;           // image URL
  content?: string;       // text content
  title?: string;
  subtitle?: string;
}
interface CarouselSpec {
  title?: string;
  slides?: CarouselSlide[];
  autoPlay?: boolean;      // default: true
  interval?: number;       // default: 5000 (ms)
}
```

```json
{ "type": "carousel", "data": { "title": "Feature Highlights", "autoPlay": true, "interval": 4000, "slides": [{ "src": "https://picsum.photos/800/400?1", "title": "New Dashboard", "subtitle": "Redesigned for clarity" }, { "src": "https://picsum.photos/800/400?2", "title": "Team View", "content": "See your whole team at a glance" }] } }
```

Use when: showcasing features, images, or content in a rotating view.

---

## Category: Primitives (5)

These are layout components used internally. They are not block types but can be used when building custom layouts:

| Component | Purpose |
|-----------|---------|
| `Window` | Draggable window container with title bar |
| `Card` | Basic card wrapper |
| `Panel` | Panel container |
| `List` | Primitive list |
| `GridLayout` | Grid layout wrapper |

---

## Category: Base Components (7)

UI primitives exported from `@webmcp-auto-ui/ui/base`:

| Component | Purpose |
|-----------|---------|
| `Button` | Styled button with variants |
| `Input` | Text input field |
| `Badge` | Status badge with variants |
| `NativeSelect` | Native select dropdown |
| `Tooltip` | Tooltip wrapper |
| `Dialog` | Modal dialog (Dialog, DialogTrigger, DialogContent, DialogHeader, DialogFooter, DialogTitle, DialogDescription) |

---

## Constraints

- Block `type` must exactly match one of the 24 block types (case-sensitive).
- Simple blocks use `data` prop; rich blocks use `spec` prop. The `BlockRenderer` handles this mapping automatically -- you always pass `data` in the block definition.
- JSON data must be syntactically valid. All strings must be double-quoted.
- Image URLs in `gallery`, `carousel`, `cards`, `profile` must be accessible (CORS-friendly).
- `data-table` renders max 200 rows. Provide the most relevant subset.
- `map` requires Leaflet (loaded dynamically). First render shows a loading state.

## Common Mistakes

| Mistake | Consequence | Fix |
|---------|-------------|-----|
| Using `chart` type for pie/donut | `chart` only renders bars | Use `chart-rich` with `type: "pie"` |
| Passing `rows` as objects to `grid-data` | Grid expects 2D arrays `unknown[][]` | Use `data-table` for object rows, `grid-data` for arrays |
| Missing `id` on hemicycle groups | Click events cannot identify the group | Always include `id` on each group |
| `data-table` columns with wrong `key` | Cells render as empty/null | Column `key` must match the keys in row objects |
| Gallery images without `src` | Broken image placeholders | Ensure every image has a valid `src` URL |
| Using `trend` string on `stat-card` without `delta` | Trend arrow shows but no value text | Set `delta` when `trend` is a simple string, or use the object form |
