# MCP Integration -- Agent Guide

> This document is designed to be injected into an AI agent's context. It contains everything needed to connect and use MCP (Model Context Protocol) servers with webmcp-auto-ui.

## What is MCP?

MCP (Model Context Protocol) is a JSON-RPC 2.0 protocol that allows AI agents and applications to discover and call tools exposed by remote servers. In webmcp-auto-ui, MCP is the bridge between data sources and the UI: you connect to an MCP server, list its tools, call them to fetch data, and display results using UI blocks.

## Architecture Overview

```
User prompt --> Agent Loop --> LLM (Claude/Gemma)
                  |                    |
                  |              tool_use blocks
                  |                    |
                  v                    v
              MCP Client -------> MCP Server (remote)
                  |                    |
              tool results        data/actions
                  |
                  v
              UI Blocks (stat, chart, table, etc.)
```

## McpClient API

The `McpClient` class (from `@webmcp-auto-ui/core`) handles the full MCP lifecycle.

### Connecting

```typescript
import { McpClient } from '@webmcp-auto-ui/core';

const client = new McpClient('https://mcp.example.com/mcp', {
  clientName: 'my-app',
  clientVersion: '1.0.0',
  timeout: 30000,
  headers: {
    'Authorization': 'Bearer <token>'  // optional
  },
  autoReconnect: true,
  maxReconnectAttempts: 3
});

// Initialize the connection (required before any other call)
const initResult = await client.connect();
// initResult: { protocolVersion, capabilities, serverInfo }
```

### Listing Tools

```typescript
const tools = await client.listTools();
// tools: McpTool[]
// Each tool: { name, description, inputSchema, outputSchema, annotations }
```

### Calling a Tool

```typescript
const result = await client.callTool('query_sql', {
  sql: 'SELECT name, revenue FROM products ORDER BY revenue DESC LIMIT 5'
});
// result: { content: [{ type: 'text', text: '...' }], isError?: boolean }
```

### Disconnecting

```typescript
await client.disconnect();
```

## Transport: Streamable HTTP

The MCP client uses HTTP POST with JSON-RPC 2.0 payloads:

- **Content-Type**: `application/json`
- **Accept**: `application/json, text/event-stream`
- **Session management**: The server returns an `Mcp-Session-Id` header on first request. The client sends it back on subsequent requests.
- **Auto-reconnect**: If the server returns 404 (session expired), the client automatically re-initializes with exponential backoff (500ms * attempt).
- **SSE responses**: The server may respond with `text/event-stream`. The client parses `data:` lines and extracts the last complete JSON-RPC response.

### Request Format

```json
{
  "jsonrpc": "2.0",
  "id": 1,
  "method": "tools/call",
  "params": {
    "name": "query_sql",
    "arguments": { "sql": "SELECT 1" }
  }
}
```

### Response Format

```json
{
  "jsonrpc": "2.0",
  "id": 1,
  "result": {
    "content": [{ "type": "text", "text": "[{\"id\":1}]" }]
  }
}
```

## MCP Tool Shape

```typescript
interface McpTool {
  name: string;
  description?: string;
  inputSchema?: JsonSchema;   // JSON Schema for parameters
  outputSchema?: JsonSchema;
  annotations?: {
    readOnlyHint?: boolean;
    destructiveHint?: boolean;
    idempotentHint?: boolean;
    openWorldHint?: boolean;
  };
}
```

## Integrating MCP in a Skill

A skill can reference an MCP server via the `mcp` and `mcpName` fields:

```json
{
  "name": "sales-dashboard",
  "mcp": "https://mcp.example.com/mcp",
  "mcpName": "sales-api",
  "blocks": [
    { "type": "stat", "data": { "label": "Revenue", "value": "
  <script>
42K" } }
  ]
}
```

When a skill has an `mcp` field, the runtime:
1. Creates an `McpClient` and connects to the URL
2. Lists available tools
3. Makes them available to the agent loop alongside UI tools

## The Agent Loop Pattern

The `runAgentLoop` function orchestrates LLM + MCP + UI:

```typescript
import { McpClient } from '@webmcp-auto-ui/core';
import { runAgentLoop, fromMcpTools } from '@webmcp-auto-ui/agent';

// 1. Connect to MCP
const client = new McpClient('https://mcp.example.com/mcp');
await client.connect();
const tools = await client.listTools();

// 2. Run the agent loop
const result = await runAgentLoop('Show me top 5 products by revenue', {
  client,
  provider: myLLMProvider,    // LLMProvider implementation
  mcpTools: fromMcpTools(tools),
  maxIterations: 5,
  callbacks: {
    onBlock: (type, data) => { /* add block to UI */ },
    onText: (text) => { /* display assistant text */ },
    onToolCall: (call) => { /* log tool call */ }
  }
});
```

The loop works as follows:
1. Sends user message + system prompt to LLM
2. LLM returns tool_use blocks (DATA tools or UI tools)
3. DATA tools are executed via `client.callTool()`
4. UI tools are executed locally via callbacks (`onBlock`, `onClear`)
5. Tool results are sent back to LLM
6. Repeat until LLM returns `end_turn` or max iterations reached

### System Prompt

The auto-generated system prompt tells the LLM:
- Which DATA tools are available (from MCP server)
- Which UI tools are available (stat, chart, table, etc.)
- The mandatory workflow: fetch data first, then display with UI tools

> **Tip**: In addition to individual `render_*` tools, the unified `component()` tool provides a single entry point for all 56 UI components (31 renderable, 25 non-renderable). The LLM can call `component("help")` to discover available components at runtime. See the [agent package docs](../packages/agent.md#unified-component-tool) for details.

## Auto-Generated UI Pattern

Connect MCP, list tools, and let the agent auto-generate the UI:

1. User connects to an MCP server URL
2. App calls `client.listTools()` to discover available tools
3. User types a natural language query
4. Agent loop calls MCP tools to fetch data, then UI tools to render blocks
5. Result: a fully generated dashboard without manual block composition

## Example: Connect and Generate

```typescript
// Connect to code4code MCP server
const client = new McpClient('https://mcp.code4code.eu/mcp');
await client.connect();

console.log('Server:', client.getServerInfo());
// { name: "code4code", version: "1.0.0" }

const tools = await client.listTools();
console.log('Available tools:', tools.map(t => t.name));
// ["query_sql", "list_tables", "describe_table", "search_recipes", ...]

// Run agent loop with a user query
const result = await runAgentLoop('List all recipes with their ratings', {
  client,
  provider: claudeProvider,
  mcpTools: fromMcpTools(tools),
  callbacks: {
    onBlock: (type, data) => blocks.push({ type, data }),
    onText: (text) => console.log('Assistant:', text)
  }
});

// result.toolCalls shows what the agent did:
// 1. Called query_sql to fetch recipes
// 2. Called ui_data_table to display results
```

## Authentication

MCP servers can require authentication. Pass a Bearer token in the headers:

```typescript
const client = new McpClient('https://mcp.example.com/mcp', {
  headers: {
    'Authorization': 'Bearer eyJhbGci...'
  }
});
```

The token is sent with every request (initialize, tools/list, tools/call).

## McpClient Options

```typescript
interface McpClientOptions {
  clientName?: string;            // default: 'webmcp-auto-ui'
  clientVersion?: string;         // default: '0.1.0'
  timeout?: number;               // request timeout in ms, default: 30000
  headers?: Record<string, string>; // extra headers (auth, etc.)
  autoReconnect?: boolean;        // reconnect on 404, default: true
  maxReconnectAttempts?: number;  // default: 3
}
```

## Constraints

- The MCP server must support Streamable HTTP transport (POST with JSON-RPC 2.0).
- `connect()` must be called before `listTools()` or `callTool()`.
- Tool results are text-based (`content[].type === 'text'`). Parse JSON from `content[0].text` if needed.
- The agent loop truncates tool results to 10,000 characters to fit LLM context windows.
- CORS: the MCP server must allow requests from your domain.

## Common Mistakes

| Mistake | Consequence | Fix |
|---------|-------------|-----|
| Calling `listTools()` before `connect()` | Error: session not initialized | Always call `connect()` first |
| Missing `Authorization` header | 401 or 403 from server | Pass Bearer token in `headers` option |
| Ignoring `isError` on tool results | Silent failures, incorrect data displayed | Check `result.isError` before using content |
| Not handling SSE responses | Client hangs or parses incorrectly | The McpClient handles SSE automatically -- no action needed |
| Setting `timeout` too low for slow tools | Request aborted mid-execution | Increase `timeout` for heavy queries (60000+) |
| Not calling `disconnect()` | Session leaks on server side | Call `disconnect()` when done or on component unmount |

# Skills -- Agent Guide

> This document is designed to be injected into an AI agent's context. It contains everything needed to create, manage, encode, and share skills in webmcp-auto-ui.

## What is a Skill?

A skill is a set of instructions that help an agent use tools. It can define one or more blocks (each block being a set of instructions for specific tools), reference one or more MCP tools, and refer to other skills (composition via natural-language inclusion). Skills are the fundamental unit of saved agent behavior in webmcp-auto-ui. "Recette" (FR) and "recipe" (EN) are exact synonyms of "skill".

## Skill Format

```typescript
interface SkillBlock {
  type: string;                      // one of the 24 block types
  data: Record<string, unknown>;     // block-specific data
}

interface Skill {
  id: string;                        // auto-generated (e.g. "sk_m1abc2def")
  name: string;                      // required
  description?: string;
  mcp?: string;                      // MCP server URL
  mcpName?: string;                  // MCP server display name
  llm?: string;                      // preferred model: "claude-haiku" | "claude-sonnet" | "gemma-e2b" | "auto"
  tags?: string[];
  theme?: Record<string, string>;    // flat token overrides (e.g. {"color-accent": "#2563eb"})
  blocks: SkillBlock[];              // required
  createdAt: number;                 // auto-set (epoch ms)
  updatedAt: number;                 // auto-set (epoch ms)
}
```

## CRUD Operations

All CRUD functions are available from `@webmcp-auto-ui/sdk`:

### Create

```typescript
import { createSkill } from '@webmcp-auto-ui/sdk';

const skill = createSkill({
  name: 'sales-dashboard',
  description: 'Overview of sales KPIs',
  mcp: 'https://mcp.example.com/mcp',
  mcpName: 'sales-api',
  llm: 'claude-sonnet',
  tags: ['sales', 'kpi'],
  theme: { 'color-accent': '#2563eb' },
  blocks: [
    { type: 'stat', data: { label: 'Revenue', value: '
  <script>
42K', trend: '+12%', trendDir: 'up' } },
    { type: 'stat', data: { label: 'Orders', value: '1,204', trend: '+8%', trendDir: 'up' } },
    { type: 'chart', data: { title: 'Monthly Revenue', bars: [['Jan',80],['Feb',95],['Mar',120]] } }
  ]
});
// skill.id is auto-generated
// skill.createdAt and skill.updatedAt are auto-set
```

### Read

```typescript
import { getSkill, listSkills } from '@webmcp-auto-ui/sdk';

const skill = getSkill('sk_m1abc2def');   // returns Skill | undefined
const allSkills = listSkills();            // returns Skill[], sorted by createdAt desc
```

### Update

```typescript
import { updateSkill } from '@webmcp-auto-ui/sdk';

const updated = updateSkill('sk_m1abc2def', {
  name: 'sales-dashboard-v2',
  blocks: [/* new blocks */]
});
// returns updated Skill | null (null if not found)
// updatedAt is auto-refreshed
```

### Delete

```typescript
import { deleteSkill } from '@webmcp-auto-ui/sdk';

const deleted = deleteSkill('sk_m1abc2def');  // returns boolean
```

### Bulk Operations

```typescript
import { clearSkills, loadSkills, loadDemoSkills } from '@webmcp-auto-ui/sdk';

clearSkills();              // removes all skills
loadSkills(skillArray);     // replaces all skills with provided array
loadDemoSkills();           // loads built-in demo skills (only if registry is empty)
```

### Change Listener

```typescript
import { onSkillsChange } from '@webmcp-auto-ui/sdk';

const unsubscribe = onSkillsChange(() => {
  console.log('Skills changed!');
});
// later: unsubscribe();
```

## HyperSkill Format

HyperSkill is a URL-based encoding for sharing skills. A skill is serialized into a URL parameter `?hs=` that can be pasted, bookmarked, or shared.

The SDK re-exports `encode`, `decode`, `hash`, `diff`, and `getHsParam` directly from the [`hyperskills`](https://www.npmjs.com/package/hyperskills) NPM package. Apps should import from `@webmcp-auto-ui/sdk`:

```typescript
import { encode, decode, hash, diff, getHsParam } from '@webmcp-auto-ui/sdk';
```

### Structure

```typescript
interface HyperSkillMeta {
  title?: string;
  description?: string;
  version?: string;
  created?: string;
  mcp?: string;
  mcpName?: string;
  llm?: string;
  tags?: string[];
  theme?: Record<string, string>;
  hash?: string;
  previousHash?: string;
}

interface HyperSkill {
  meta: HyperSkillMeta;
  content: unknown;       // typically the blocks array or full skill data
}
```

### Encoding

```typescript
import { encode, type HyperSkill } from '@webmcp-auto-ui/sdk';

const skill: HyperSkill = {
  meta: {
    title: 'Sales Dashboard',
    description: 'KPI overview',
    mcp: 'https://mcp.example.com/mcp',
    tags: ['sales']
  },
  content: [
    { type: 'stat', data: { label: 'Revenue', value: '
  <script>
42K' } },
    { type: 'chart', data: { title: 'Trend', bars: [['Q1',80],['Q2',120]] } }
  ]
};

const url = await encode('https://app.example.com/viewer', JSON.stringify(skill));
// "https://app.example.com/viewer?hs=eyJtZXRhIjp7InRpdGxlIjoi..."
```

Encoding rules:
- JSON serialized, then base64-encoded
- If payload > 6KB: gzip-compressed first, prefixed with `gz.`
- The URL is built from the provided source URL + `?hs=` parameter

### Decoding

```typescript
import { decode } from '@webmcp-auto-ui/sdk';

const { content: raw } = await decode('https://app.example.com/viewer?hs=eyJtZXRh...');
const skill = JSON.parse(raw);
// or just the param value:
const { content: raw2 } = await decode('eyJtZXRhIjp7...');
const skill2 = JSON.parse(raw2);

console.log(skill.meta.title);   // "Sales Dashboard"
console.log(skill.content);      // blocks array
```

### Reading from Current URL

```typescript
import { getHsParam, decode } from '@webmcp-auto-ui/sdk';

const param = getHsParam();  // returns the ?hs= value or null
if (param) {
  const { content: raw } = await decode(param);
  const skill = JSON.parse(raw);
}
```

### URL Format

Skills can be shared via two entry points:
- **Viewer**: `https://domain.com/viewer?hs=<encoded>` -- read-only display
- **Flex**: `https://domain.com/flex?hs=<encoded>` -- editable view

### Hashing

HyperSkills support content-addressable versioning via SHA-256 hashes:

```typescript
import { hash } from '@webmcp-auto-ui/sdk';

const h = await hash('https://app.example.com/viewer', JSON.stringify(skill.content));
// h: 64-char hex SHA-256
```

### Diffing

```typescript
import { diff } from '@webmcp-auto-ui/sdk';

const changed = diff(oldContent, newContent);
// returns array of changed top-level keys, e.g. ["blocks", "meta"]
```

## Embedding a Theme

Include theme token overrides in the skill's `theme` field:

```json
{
  "name": "branded-dashboard",
  "theme": {
    "color-accent": "#2563eb",
    "color-accent2": "#dc2626",
    "color-bg": "#f8fafc"
  },
  "blocks": [...]
}
```

The `theme` field uses flat key-value pairs (same format as `tokens` in theme.json). These are applied as CSS custom property overrides when the skill is loaded.

## Demo Skills

Three built-in demo skills are available via `loadDemoSkills()`:

### weather-dashboard
- Blocks: `stat` (temperature) + `kv` (conditions) + `chart` (7-day forecast)
- Tags: `meteo`, `dashboard`

### kpi-overview
- Blocks: 3x `stat` (revenue, users, churn) + `chart` (quarterly revenue)
- Tags: `kpi`, `dashboard`

### status-monitor
- Blocks: `alert` (DB degraded) + `kv` (service status) + `tags` (active filters)
- Tags: `ops`, `monitoring`

## Workflow: Create a Skill from Scratch

> **Note**: Skills can reference components via the unified `component()` tool in addition to the individual `render_*` tools. The `component("help")` call lists all 56 available components with their schemas, making it easier for agents to discover what blocks they can use. See [composing.md](composing.md#unified-component-tool) for details.

1. **Define the purpose**: What data does this skill display? What user need does it serve?
2. **Choose blocks**: Pick 2-5 block types that best represent the data (see composing.md)
3. **Write the data**: Fill in each block's data object with real or placeholder values
4. **Add metadata**: Set name, description, tags, optional MCP/LLM references
5. **Add theme** (optional): Override accent colors to match branding
6. **Create**: Call `createSkill()` with the complete object
7. **Encode** (optional): Call `encode()` to generate a shareable URL
8. **Share**: Send the URL -- recipients load it via `?hs=` parameter

### Example: Full Workflow

```typescript
import { createSkill, encode, type HyperSkill } from '@webmcp-auto-ui/sdk';

// Step 1-5: Define the skill
const skill = createSkill({
  name: 'team-overview',
  description: 'Team members and recent activity',
  tags: ['team', 'hr'],
  theme: { 'color-accent': '#6366f1' },
  blocks: [
    {
      type: 'trombinoscope',
      data: {
        title: 'Engineering Team',
        columns: 4,
        people: [
          { name: 'Alice Martin', subtitle: 'Tech Lead', badge: 'TL' },
          { name: 'Bob Chen', subtitle: 'Backend' },
          { name: 'Carol Silva', subtitle: 'Frontend' }
        ]
      }
    },
    {
      type: 'timeline',
      data: {
        title: 'Recent Activity',
        events: [
          { date: '2024-03-15', title: 'Sprint 12 completed', status: 'done' },
          { date: '2024-03-18', title: 'Sprint 13 started', status: 'active' }
        ]
      }
    },
    {
      type: 'stat',
      data: { label: 'Team Size', value: '8', trend: '+2', trendDir: 'up' }
    }
  ]
});

// Step 7: Encode for sharing
const hsSkill: HyperSkill = {
  meta: { title: skill.name, description: skill.description, tags: skill.tags },
  content: skill.blocks,
};
const hsUrl = await encode('https://app.example.com/viewer', JSON.stringify(hsSkill));
console.log('Share this URL:', hsUrl);
```

## Constraints

- `name` is required. Cannot be empty.
- `blocks` is required. Must contain at least one block.
- Block `type` must be one of the 24 valid types (see composing.md or ui-widgets.md).
- HyperSkill URL size limit: browser URL length is typically ~2KB-8KB depending on the browser. The gzip compression kicks in above 6KB of JSON. For very large skills (many blocks with large data), consider reducing data or splitting into multiple skills.
- `theme` uses flat token keys (`"color-accent"`, not nested objects).
- `id`, `createdAt`, `updatedAt` are auto-managed. Do not set them manually in `createSkill()`.

## Common Mistakes

| Mistake | Consequence | Fix |
|---------|-------------|-----|
| Setting `id` in `createSkill()` | TypeScript error (id is excluded from input type) | Let the registry auto-generate the id |
| Huge blocks data (e.g. 1000-row table) | HyperSkill URL exceeds browser limits | Limit data to what fits visually; paginate server-side |
| Missing `blocks` array | Skill renders empty | Always include at least one block |
| `theme` with nested `dark` key | Dark overrides ignored (flat format only) | Use flat tokens; for dark mode, use the full theme.json in ThemeProvider |
| Forgetting to `await` encode/decode | Returns a Promise, not the actual value | Both `encode` and `decode` are async |
| Using wrong block type string | BlockRenderer shows `[unknown-type]` | Check exact type strings: `stat-card` not `statcard`, `chart-rich` not `chartRich` |

        var md = inlinedPages[page];
        if (!md) {
          contentEl.innerHTML = '<div class="error"><h2>Page not found</h2><p>The requested page "' + page + '" does not exist.</p></div>';
          return;
        }
        contentEl.innerHTML = marked.parse(md);
        var blocks = contentEl.querySelectorAll('pre code');
        for (var i = 0; i < blocks.length; i++) {
          hljs.highlightElement(blocks[i]);
        }
        window.scrollTo({ top: 0, behavior: 'instant' });
      }

      window.addEventListener('hashchange', function () { loadPage(getPageFromHash()); });
      hamburgerEl.addEventListener('click', function () {
        if (sidebarEl.classList.contains('open')) { closeSidebar(); }
        else { sidebarEl.classList.add('open'); overlayEl.classList.add('open'); }
      });
      overlayEl.addEventListener('click', closeSidebar);
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeSidebar(); });

      loadPage(getPageFromHash());
    })();
  </script>
</body>
</html>
