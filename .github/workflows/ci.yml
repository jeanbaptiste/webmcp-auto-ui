name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: rm -rf node_modules package-lock.json && npm install --no-audit --no-fund

      - name: Build packages
        run: |
          npm run build --workspace=packages/core
          npm run build --workspace=packages/sdk &
          npm run build --workspace=packages/agent &
          npm run build --workspace=packages/ui &
          wait

      - name: Generate SvelteKit types
        run: |
          npx -w apps/flex2 svelte-kit sync
          npx -w apps/multi-svelte svelte-kit sync

      - name: Type check (flex2)
        run: npx svelte-check --workspace apps/flex2 --fail-on-warnings false --threshold error

      - name: Type check (multi-svelte)
        run: npx svelte-check --workspace apps/multi-svelte --fail-on-warnings false --threshold error
