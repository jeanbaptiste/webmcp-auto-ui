name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      # Build in dependency order
      - name: Build core
        run: npm run build --workspace=packages/core

      - name: Build ui, agent, sdk
        run: |
          npm run build --workspace=packages/ui &
          npm run build --workspace=packages/agent &
          npm run build --workspace=packages/sdk &
          wait

      # Publish with provenance (OIDC trusted publishing — no token needed)
      - name: Publish core
        run: npm publish --workspace=packages/core --access public --provenance

      - name: Publish ui, agent, sdk
        run: |
          npm publish --workspace=packages/ui --access public --provenance
          npm publish --workspace=packages/agent --access public --provenance
          npm publish --workspace=packages/sdk --access public --provenance
