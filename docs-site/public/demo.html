<!--
  Total: ~116s, then loops.
  Timing map (seconds):
   SCENE_0_TITLE              0  → 4
   SCENE_1A_MCP_SERVER        4  → 10    zoom: 300 200 700 380
   SCENE_1B_MCP_TOOLS        10  → 18    zoom: 100 230 600 280
   SCENE_1C_MCP_RECIPES      18  → 28    zoom: 180 140 920 500
   SCENE_2A_WEBMCP_SERVER    28  → 34    zoom: 300 200 700 380
   SCENE_2B_WIDGETS          34  → 42    zoom: 420 230 760 320
   SCENE_2C_UI_RECIPES       42  → 52    zoom: 120 130 1040 510
   SCENE_3_UNIFIED           52  → 60    zoom: 20 80 1240 480
   SCENE_4_ONE_CALL          60  → 72    zoom: 20 230 1240 460
   SCENE_5_REAL_DEMO         72  → 100
     - 72-75   wide shell
     - 75-79   zoom on prompt (20 60 880 100)
     - 79-82   wide enough to see prompt + panel start
     - 82-90   zoom on tool calls panel (580 140 680 480)
     - 90-96   zoom on canvas (20 130 620 480) — widgets render here
     - 96-100  pull all the way back, contemplate dashboard
   SCENE_6_HYPERSKILLS      100 → 108
   SCENE_7_END              108 → 116

  Animation rule: every element animates ONLY opacity (no transform).
  Camera (viewBox) is animated via SMIL <animate>.
-->
